name: Test

on:
  workflow_call:
    inputs:
      should_skip:
        description: "Whether to skip the workflow"
        required: false
        type: string
        default: "false"
      # Path-based change detection for selective test execution
      webapp_changed:
        description: "Whether webapp files changed"
        required: false
        type: string
        default: "true"
      application_server_changed:
        description: "Whether application-server files changed"
        required: false
        type: string
        default: "true"

jobs:
  tests:
    permissions:
      contents: read
      checks: write
      statuses: write
    name: "${{ matrix.display-name }}"
    # App Server tiers on the free 4-vCPU/16GB arm64 runners (the integration job was CPU-starved on
    # the 2-vCPU default). Webapp jobs stay on ubuntu-latest (Node toolchain).
    runs-on: ${{ startsWith(matrix.test-type, 'application-server-') && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    if: inputs.should_skip != 'true'
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - test-type: application-server-unit
            display-name: "App Server: Unit"
          - test-type: application-server-arch
            display-name: "App Server: Arch"
          - test-type: application-server-integration
            display-name: "App Server: Integration"
          - test-type: webapp-unit
            display-name: "Webapp: Unit"
          - test-type: webapp-storybook
            display-name: "Webapp: Storybook"
          - test-type: webapp-visual
            display-name: "Webapp: Visual"

    steps:
      - name: Determine if test should run
        id: should_run
        run: |
          case "${{ matrix.test-type }}" in
            "webapp-unit"|"webapp-storybook"|"webapp-visual")
              echo "run=${{ inputs.webapp_changed }}" >> $GITHUB_OUTPUT
              ;;
            application-server-*)
              echo "run=${{ inputs.application_server_changed }}" >> $GITHUB_OUTPUT
              ;;
            *)
              # Unknown test type - fail explicitly to catch missing case statements
              echo "::error::Unknown test type '${{ matrix.test-type }}' in ci-tests.yml matrix."
              echo "::error::Please add a case for this test type in the 'Determine if test should run' step."
              echo "run=false" >> $GITHUB_OUTPUT
              exit 1
              ;;
          esac

      - name: Skip notification
        if: steps.should_run.outputs.run != 'true'
        run: echo "⏭️ Skipping ${{ matrix.test-type }} - no relevant files changed"

      - name: Checkout repository
        if: steps.should_run.outputs.run == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history needed only for Chromatic TurboSnap (webapp-visual)
          # Other tests only need HEAD for faster checkout
          fetch-depth: ${{ matrix.test-type == 'webapp-visual' && '0' || '1' }}

      - name: Setup pnpm + Node.js
        if: steps.should_run.outputs.run == 'true'
        uses: ./.github/actions/setup-pnpm-node

      - name: Setup caches
        if: steps.should_run.outputs.run == 'true'
        uses: ./.github/actions/setup-caches
        with:
          cache-type: ${{ matrix.test-type }}
          os: ${{ runner.os }}

      - name: Run tests
        if: steps.should_run.outputs.run == 'true' && startsWith(matrix.test-type, 'application-server-')
        run: |
          cd server
          rm -rf target/surefire-reports/*
          # -Dmaven.test.skip=false overrides the quick profile (auto-activated when cached generated-sources exist).
          # unit / arch are split into parallel jobs; tag filtering is surefire-owned so no tier silently drops tests.
          case "${{ matrix.test-type }}" in
            "application-server-unit") ./mvnw test -Dsurefire.includedGroups="unit" -DskipAfterFailureCount=10 -Dmaven.test.skip=false -T 2C --batch-mode -Dmaven.build.cache.enabled=true ;;
            "application-server-arch") ./mvnw test -Dsurefire.includedGroups="architecture" -DskipAfterFailureCount=10 -Dmaven.test.skip=false -T 2C --batch-mode -Dmaven.build.cache.enabled=true ;;
            # forkCount=2 spreads integration classes across 2 isolated JVMs (each its own Testcontainers
            # Postgres); parallel=none keeps each fork serial (shared DB per fork). (3 forks tipped the
            # StartupBudget per-bean timing ceiling under CPU contention — 2 is stable and still <10 min.)
            "application-server-integration") ./mvnw test -Dsurefire.includedGroups="integration" -Dparallel=none -Dhephaestus.surefire.forkCount=2 -Dhephaestus.surefire.maxHeap=2048m -Dmaven.test.skip=false -T 2C --batch-mode -Dmaven.build.cache.enabled=true ;;
          esac

      - name: Run tests
        if: steps.should_run.outputs.run == 'true' && startsWith(matrix.test-type, 'webapp-')
        run: |
          pnpm install --frozen-lockfile
          cd webapp

          case "${{ matrix.test-type }}" in
            "webapp-unit")
              pnpm run test
              ;;
            "webapp-storybook")
              # Install Playwright browsers (cached in ~/.cache/ms-playwright by setup-caches)
              pnpm exec playwright install chromium --with-deps
              # Root-caused: the previous intermittent "Failed to fetch dynamically imported module" /
              # "Vitest failed to find the runner" deadlock was Vite's dependency optimizer discovering
              # a bare import mid-run and reloading the shared (isolate:false) page out from under an
              # in-flight test. Fixed at the config layer in vitest.config.storybook.ts
              # (optimizeDeps.include pre-bundles every runtime dependency up front, isolate:false, plus
              # the existing fileParallelism:false/server.warmup) and verified with repeated runs,
              # including under artificial CPU contention (taskset -c 0,1, and 24 competing processes
              # on a 20-core box) — 539/539 every time. The outer timeout stays as a defensive backstop
              # for a genuinely new failure mode, but the retry-and-hope loop is gone.
              timeout 5m pnpm run test:storybook
              ;;
            "webapp-visual")
              pnpm run build-storybook
              ;;
          esac

      # Chromatic visual testing
      - name: "Chromatic Visual Testing"
        if: steps.should_run.outputs.run == 'true' && matrix.test-type == 'webapp-visual'
        id: chromatic
        uses: chromaui/action@1cfa065cbdab28f6ca3afaeb3d761383076a35aa # v11
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: webapp
          onlyChanged: true
          zip: true
          skip: "@(dependabot/**|renovate/**)"
          autoAcceptChanges: ${{ github.ref == 'refs/heads/main' && 'main' || '' }}
          exitZeroOnChanges: false
          logLevel: info
          junitReport: true
        env:
          CHROMATIC_BRANCH: ${{ github.head_ref || github.ref_name }}
          CHROMATIC_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

      # Create Storybook status check
      # CRITICAL: For pull_request events, context.sha is the MERGE commit, not the PR head.
      # We must use the PR head SHA for the status to appear on the PR checks page.
      - name: "Create Storybook status check"
        if: steps.should_run.outputs.run == 'true' && matrix.test-type == 'webapp-visual' && always() && startsWith(steps.chromatic.outputs.storybookUrl, 'http')
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            // Use PR head SHA for pull_request events, otherwise use context.sha
            const sha = context.payload.pull_request?.head?.sha || context.sha;
            console.log(`Creating status check on SHA: ${sha}`);
            console.log(`Storybook URL: ${{ steps.chromatic.outputs.storybookUrl }}`);

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: sha,
              state: 'success',
              target_url: '${{ steps.chromatic.outputs.storybookUrl }}',
              description: 'Click Details to view your Storybook',
              context: 'Preview / Storybook'
            });

      # Test result aggregation
      - name: Upload application-server test results
        if: steps.should_run.outputs.run == 'true' && always() && startsWith(matrix.test-type, 'application-server-')
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: "Test Results - ${{ matrix.test-type }}"
          path: "server/target/surefire-reports/TEST-*.xml"
          reporter: java-junit
          fail-on-error: false

      - name: Upload webapp test results
        if: steps.should_run.outputs.run == 'true' && always() && matrix.test-type == 'webapp-unit'
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: "Test Results - ${{ matrix.test-type }}"
          path: "webapp/test-results/junit-*.xml"
          reporter: java-junit
          fail-on-error: false

      - name: Upload webapp-storybook test results
        if: steps.should_run.outputs.run == 'true' && always() && matrix.test-type == 'webapp-storybook'
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: "Test Results - ${{ matrix.test-type }}"
          path: "webapp/test-results/junit-storybook.xml"
          reporter: java-junit
          fail-on-error: false

      - name: Upload Chromatic test results
        if: steps.should_run.outputs.run == 'true' && always() && matrix.test-type == 'webapp-visual' && startsWith(steps.chromatic.outputs.storybookUrl, 'http')
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: "Test Results - ${{ matrix.test-type }}"
          path: "webapp/chromatic-build-*.xml"
          reporter: java-junit
          fail-on-error: false

      # Test Summary for Job Summary
      - name: Generate test summary
        if: steps.should_run.outputs.run == 'true' && always()
        run: |
          echo "### 🧪 ${{ matrix.test-type }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Find and summarize JUnit XML results
          case "${{ matrix.test-type }}" in
            application-server-*)
              if [ -d "server/target/surefire-reports" ]; then
                TESTS=$(find server/target/surefire-reports -name "TEST-*.xml" -exec grep -h 'testsuite' {} \; 2>/dev/null | head -1 || echo "")
                if [ -n "$TESTS" ]; then
                  echo "✅ Tests completed. See **Test Results** tab for details." >> $GITHUB_STEP_SUMMARY
                fi
              fi
              ;;
            webapp-*)
              echo "✅ Webapp tests completed." >> $GITHUB_STEP_SUMMARY
              ;;
          esac
