# Reusable Docker build workflow with registry-based caching
# This is a local version of ls1intum/.github's workflow with caching support
# to significantly speed up CI builds.
#
# Cache strategy: Registry cache (ghcr.io)
# - Stores cache layers in a separate cache image tag (e.g., image:cache)
# - Works across branches (PRs can use main's cache)
# - No size limits (unlike GitHub Actions cache which is 10GB per repo)
# - Persists indefinitely (not evicted like GHA cache)
#
# Performance optimizations:
# - No QEMU: Builds run natively (amd64 on amd64 runner, arm64 on arm64 runner)
# - Docker Hub login: Avoids rate limits on base image metadata resolution
#   (unauthenticated requests can add 2+ minutes of delay per build)
# - Registry cache: Layers are cached in ghcr.io, avoiding rebuild of unchanged layers

name: Docker Build (Cached)

on:
  workflow_call:
    inputs:
      image-name:
        type: string
        required: true
        description: "Full image name (e.g., ls1intum/hephaestus/webapp)"
      docker-file:
        type: string
        required: true
        description: "Path to Dockerfile"
      docker-context:
        type: string
        default: "."
        description: "Docker build context"
      registry:
        type: string
        default: "ghcr.io"
        description: "Container registry"
      tags:
        type: string
        required: false
        description: "Additional tags (one per line)"
      labels:
        type: string
        required: false
        description: "OCI labels"
      build-args:
        type: string
        required: false
        description: "Build arguments"
    outputs:
      manifest-digest:
        description: "Digest (sha256:…) of the multi-arch manifest list. The release workflow records this for production pinning."
        value: ${{ jobs.merge.outputs.manifest-digest }}

jobs:
  build:
    name: Build ${{ matrix.platform }} Docker Image
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      # Note: QEMU is NOT needed because we build natively:
      # - linux/amd64 builds on ubuntu-24.04 (x86_64)
      # - linux/arm64 builds on ubuntu-24.04-arm (aarch64)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          # Use TUM's Docker Hub mirror to avoid rate limits (standard ls1intum approach)
          # See: https://github.com/ls1intum/.github/blob/main/.github/workflows/build-and-push-docker-image.yml
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["https://docker-mirror.ase.in.tum.de:8765"]

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ inputs.registry }}/${{ inputs.image-name }}

      - name: Prepare platform pair
        id: prep
        run: |
          platform=${{ matrix.platform }}
          echo "platform_pair=${platform//\//-}" >> $GITHUB_OUTPUT
          image="${{ inputs.image-name }}"
          echo "image_name=${image//\//-}" >> $GITHUB_OUTPUT

      # Build with registry cache
      # - cache-from: Pull cache from registry (main branch cache + current branch)
      # - cache-to: Push cache to registry (only for non-PR builds to avoid cache pollution)
      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ inputs.docker-context }}
          file: ${{ inputs.docker-file }}
          platforms: ${{ matrix.platform }}
          build-args: ${{ inputs.build-args }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,"name=${{ inputs.registry }}/${{ inputs.image-name }}",push-by-digest=true,name-canonical=true,push=true
          # Registry cache: stores cache in ghcr.io alongside images
          # Use main branch cache as fallback, then current ref
          cache-from: |
            type=registry,ref=${{ inputs.registry }}/${{ inputs.image-name }}:cache-${{ steps.prep.outputs.platform_pair }}
            type=registry,ref=${{ inputs.registry }}/${{ inputs.image-name }}:cache-main-${{ steps.prep.outputs.platform_pair }}
          # Only write cache on main branch or when explicitly building (not PRs)
          # This prevents cache pollution from experimental PR changes
          cache-to: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref={0}/{1}:cache-main-{2},mode=max', inputs.registry, inputs.image-name, steps.prep.outputs.platform_pair) || format('type=registry,ref={0}/{1}:cache-{2},mode=max', inputs.registry, inputs.image-name, steps.prep.outputs.platform_pair) }}

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: digests-${{ steps.prep.outputs.image_name }}-${{ steps.prep.outputs.platform_pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Create manifest
    runs-on: ubuntu-latest
    needs: build
    # id-token: write enables keyless OIDC signing (cosign) + provenance attestations
    # against GHCR. attestations: write lets attest-build-provenance push the
    # attestation as an OCI artifact alongside the image manifest.
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      manifest-digest: ${{ steps.digest.outputs.manifest-digest }}
    steps:
      - name: Prepare
        id: prep
        run: |
          image="${{ inputs.image-name }}"
          echo "image_name=${image//\//-}" >> $GITHUB_OUTPUT

      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ steps.prep.outputs.image_name }}-*
          merge-multiple: true

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Prepare tag configuration
        id: tags
        run: |
          {
            echo "tags<<EOF"
            # Default tags
            echo "type=raw,value=latest,enable={{is_default_branch}}"
            echo "type=ref,event=branch"
            echo "type=ref,event=pr"
            echo "type=sha,prefix="
            # Custom tags from input
            if [ -n "${{ inputs.tags }}" ]; then
              echo "${{ inputs.tags }}" | while IFS= read -r line || [[ -n "$line" ]]; do
                line=$(echo "$line" | xargs)
                if [ -n "$line" ]; then
                  if [[ "$line" == *"type="* ]]; then
                    echo "$line"
                  else
                    IFS=',' read -ra TAG_ARRAY <<< "$line"
                    for tag in "${TAG_ARRAY[@]}"; do
                      tag=$(echo "$tag" | xargs)
                      if [ -n "$tag" ]; then
                        echo "type=raw,value=${tag}"
                      fi
                    done
                  fi
                fi
              done
            fi
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ inputs.registry }}/${{ inputs.image-name }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ inputs.labels }}

      - name: Create manifest and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ inputs.registry }}/${{ inputs.image-name }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ inputs.registry }}/${{ inputs.image-name }}:${{ steps.meta.outputs.version }}

      # Production pulls the multi-arch manifest list, not the per-platform digests
      # exposed by build-push-action. Compute the OCI digest from the raw manifest
      # bytes (sha256sum of the canonical JSON) — that's the spec definition and is
      # immune to changes in `buildx imagetools inspect`'s template fields.
      - name: Capture manifest digest
        id: digest
        env:
          IMAGE_TAG_REF: ${{ inputs.registry }}/${{ inputs.image-name }}:${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          DIGEST="sha256:$(docker buildx imagetools inspect --raw "$IMAGE_TAG_REF" | sha256sum | awk '{print $1}')"
          if [[ ! "$DIGEST" =~ ^sha256:[a-f0-9]{64}$ ]]; then
            echo "::error::Refusing to publish: manifest digest is not a sha256:<64 hex> value (got: ${DIGEST:-<empty>})"
            exit 1
          fi
          echo "manifest-digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Multi-arch manifest digest: $DIGEST"

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ inputs.registry }}/${{ inputs.image-name }}
          subject-digest: ${{ steps.digest.outputs.manifest-digest }}
          push-to-registry: true

      - name: Install cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      # Keyless OIDC signing — verifiable later via:
      #   cosign verify <image>@<digest> --certificate-identity-regexp '^https://github.com/ls1intum/hephaestus/' --certificate-oidc-issuer 'https://token.actions.githubusercontent.com'
      - name: Sign image with cosign
        env:
          IMAGE_REF: ${{ inputs.registry }}/${{ inputs.image-name }}@${{ steps.digest.outputs.manifest-digest }}
        run: |
          cosign sign --yes "$IMAGE_REF"

      # Confirm the signature + attestation we just produced actually verify. Catches
      # OIDC-trust-policy misconfiguration the moment it happens, not a release later.
      - name: Verify signature + attestation
        env:
          IMAGE_REF: ${{ inputs.registry }}/${{ inputs.image-name }}@${{ steps.digest.outputs.manifest-digest }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cosign verify "$IMAGE_REF" \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            > /dev/null
          gh attestation verify "oci://$IMAGE_REF" --owner "${{ github.repository_owner }}"
