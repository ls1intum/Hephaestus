name: Docker

on:
  workflow_call:
    inputs:
      should_skip:
        description: "Whether to skip the workflow"
        required: false
        type: string
        default: "false"
      # Path-based change detection for selective Docker builds
      # These are pre-computed by the caller (cicd.yml) to include CI config fallback
      webapp_changed:
        description: "Whether webapp files changed (or should build for other reasons)"
        required: false
        type: string
        default: "true"
      application_server_changed:
        description: "Whether application-server files changed (or should build for other reasons)"
        required: false
        type: string
        default: "true"
      webhook_ingest_changed:
        description: "Whether webhook-ingest files changed (or should build for other reasons)"
        required: false
        type: string
        default: "true"
      agent_images_changed:
        description: "Whether agent image files changed (or should build for other reasons)"
        required: false
        type: string
        default: "true"

jobs:
  webapp-build:
    name: "Webapp"
    if: inputs.should_skip != 'true' && inputs.webapp_changed == 'true'
    uses: ./.github/workflows/reusable-docker-build.yml
    with:
      image-name: "ls1intum/hephaestus/webapp"
      docker-file: "./webapp/Dockerfile"
      docker-context: "."
      registry: "ghcr.io"
      tags: |
        ${{ github.ref_name }}
        ${{ github.sha }}
        ci-${{ github.run_number }}
        ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'latest' }}
      labels: |
        org.opencontainers.image.title=Hephaestus Webapp
        org.opencontainers.image.description=Web client for Hephaestus
        org.opencontainers.image.vendor=AET TUM
        org.opencontainers.image.licenses=MIT
        hephaestus.component=webapp

  application-server-build:
    name: "App Server"
    if: inputs.should_skip != 'true' && inputs.application_server_changed == 'true'
    uses: ./.github/workflows/reusable-docker-build.yml
    with:
      image-name: "ls1intum/hephaestus/application-server"
      # Paketo Cloud Native Buildpacks via spring-boot:build-image, with Application CDS.
      # See docs/admin/buildpacks-cds-decision.md and pom.xml's <image> block.
      use-buildpacks: true
      maven-module: "server/application-server"
      registry: "ghcr.io"
      tags: |
        ${{ github.ref_name }}
        ${{ github.sha }}
        ci-${{ github.run_number }}
        ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'latest' }}
      labels: |
        org.opencontainers.image.title=Hephaestus Application Server
        org.opencontainers.image.description=Spring Boot server for Hephaestus
        org.opencontainers.image.vendor=AET TUM
        org.opencontainers.image.licenses=MIT
        hephaestus.component=application-server

  webhook-ingest-build:
    name: "Webhook"
    if: inputs.should_skip != 'true' && inputs.webhook_ingest_changed == 'true'
    uses: ./.github/workflows/reusable-docker-build.yml
    with:
      image-name: "ls1intum/hephaestus/webhook-ingest"
      docker-file: "./server/webhook-ingest/Dockerfile"
      # Context = repo root so the Dockerfile can COPY pnpm-lock.yaml,
      # pnpm-workspace.yaml, and the workspace package.json files needed for
      # `pnpm install --filter webhook-ingest...` to resolve the workspace graph.
      docker-context: "."
      registry: "ghcr.io"
      tags: |
        ${{ github.ref_name }}
        ${{ github.sha }}
        ci-${{ github.run_number }}
        ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'latest' }}
      labels: |
        org.opencontainers.image.title=Hephaestus Webhook Ingest
        org.opencontainers.image.description=Hono/TypeScript-based webhook processor for Hephaestus
        org.opencontainers.image.vendor=AET TUM
        org.opencontainers.image.licenses=MIT
        hephaestus.component=webhook-ingest

  agent-pi-build:
    name: "Agent: Pi"
    if: inputs.should_skip != 'true' && inputs.agent_images_changed == 'true'
    uses: ./.github/workflows/reusable-docker-build.yml
    with:
      image-name: "ls1intum/hephaestus/agent-pi"
      docker-file: "./docker/agents/pi/Dockerfile"
      docker-context: "./docker/agents"
      registry: "ghcr.io"
      tags: |
        ${{ github.ref_name }}
        ${{ github.sha }}
        ci-${{ github.run_number }}
        ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'latest' }}
      labels: |
        org.opencontainers.image.title=Hephaestus Agent - Pi
        org.opencontainers.image.description=Sandboxed Pi coding agent for AI-powered code review
        org.opencontainers.image.vendor=AET TUM
        org.opencontainers.image.licenses=MIT
        hephaestus.component=agent-pi

  release-pin-fetcher-build:
    name: "Release Pin Fetcher"
    if: inputs.should_skip != 'true'
    uses: ./.github/workflows/reusable-docker-build.yml
    with:
      image-name: "ls1intum/hephaestus/release-pin-fetcher"
      docker-file: "./docker/release-pin-fetcher/Dockerfile"
      docker-context: "./docker/release-pin-fetcher"
      registry: "ghcr.io"
      tags: |
        ${{ github.ref_name }}
        ${{ github.sha }}
        ci-${{ github.run_number }}
        ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'latest' }}
      labels: |
        org.opencontainers.image.title=Hephaestus Release Pin Fetcher
        org.opencontainers.image.description=Init container that downloads + cosign-verifies the signed release pin asset
        org.opencontainers.image.vendor=AET TUM
        org.opencontainers.image.licenses=MIT
        hephaestus.component=release-pin-fetcher
