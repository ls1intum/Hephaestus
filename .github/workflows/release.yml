name: Release

# Trunk-based continuous deployment
# Every push to main with feat:/fix:/perf: triggers a release
# Staging deploys immediately, Production requires approval

on:
  workflow_run:
    workflows: ["CI/CD"]
    types: [completed]
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_version: ${{ steps.release.outputs.new_release_version }}
      released: ${{ steps.release.outputs.new_release_published }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          token: ${{ secrets.GH_PAT }}
          persist-credentials: false
          fetch-depth: 0

      - name: Create Release
        id: release
        uses: cycjimmy/semantic-release-action@16ca923e6ccbb50770c415a0ccd43709a8c5f7a4 # v4.2.2
        with:
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/github
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Summary
        if: steps.release.outputs.new_release_published == 'true'
        run: |
          echo "## 🚀 Released v${{ steps.release.outputs.new_release_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Staging**: Deploying automatically" >> $GITHUB_STEP_SUMMARY
          echo "- **Production**: Waiting for approval" >> $GITHUB_STEP_SUMMARY

  tag-images:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write
      attestations: write
      contents: write
    outputs:
      agent-pi-digest: ${{ steps.retag.outputs.agent-pi-digest }}
      application-server-digest: ${{ steps.retag.outputs.application-server-digest }}
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag images and capture digests
        id: retag
        env:
          VERSION: ${{ needs.release.outputs.new_version }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          # Authoritative registry-side digest of the manifest list.
          manifest_digest() {
            docker buildx imagetools inspect "$1" --format '{{json .Manifest}}' | jq -r '.digest'
          }

          IMAGES=("webapp" "application-server" "agent-pi" "release-pin-fetcher")

          # Probe all images first; refuse to partial-publish if any is missing.
          for img in "${IMAGES[@]}"; do
            FULL_IMAGE="ghcr.io/ls1intum/hephaestus/$img"
            for i in $(seq 1 24); do
              if docker buildx imagetools inspect "$FULL_IMAGE:$SHA" > /dev/null 2>&1; then break; fi
              if [ "$i" -ge 24 ]; then
                echo "::error::Image $FULL_IMAGE:$SHA not found after 120 s"
                exit 1
              fi
              sleep 5
            done
          done

          for img in "${IMAGES[@]}"; do
            FULL_IMAGE="ghcr.io/ls1intum/hephaestus/$img"
            echo "::group::$img"

            SRC_DIGEST=$(manifest_digest "$FULL_IMAGE:$SHA")
            [[ "$SRC_DIGEST" =~ ^sha256:[a-f0-9]{64}$ ]] || {
              echo "::error::$img source digest is malformed: ${SRC_DIGEST:-<empty>}"; exit 1; }
            echo "$img source digest: $SRC_DIGEST"

            docker buildx imagetools create -t "$FULL_IMAGE:$VERSION" "$FULL_IMAGE:$SHA"

            DST_DIGEST=$(manifest_digest "$FULL_IMAGE:$VERSION")
            if [[ "$SRC_DIGEST" != "$DST_DIGEST" ]]; then
              echo "::error::Retag changed the digest for $img — refusing to publish."
              exit 1
            fi

            case "$img" in
              agent-pi)            echo "agent-pi-digest=$DST_DIGEST" >> "$GITHUB_OUTPUT" ;;
              application-server)  echo "application-server-digest=$DST_DIGEST" >> "$GITHUB_OUTPUT" ;;
            esac
            echo "::endgroup::"
          done

      - name: Smoke-test agent-pi
        env:
          IMAGE: ghcr.io/ls1intum/hephaestus/agent-pi@${{ steps.retag.outputs.agent-pi-digest }}
        run: |
          set -euo pipefail
          docker pull "$IMAGE"
          docker run --rm --entrypoint /bin/sh "$IMAGE" -c 'bun --version && node --version'

      - name: Write release pin asset
        id: pin
        env:
          VERSION: ${{ needs.release.outputs.new_version }}
          AGENT_DIGEST: ${{ steps.retag.outputs.agent-pi-digest }}
        run: |
          set -euo pipefail
          ASSET="release-v${VERSION}.yaml"
          cat > "$ASSET" <<EOF
          hephaestus:
            agent:
              image:
                reference: ghcr.io/ls1intum/hephaestus/agent-pi@${AGENT_DIGEST}
          EOF
          echo "asset-path=$ASSET" >> "$GITHUB_OUTPUT"
          cat "$ASSET"

      - name: Generate subject checksums
        id: subjects
        env:
          ASSET: ${{ steps.pin.outputs.asset-path }}
          APP_DIGEST: ${{ steps.retag.outputs.application-server-digest }}
          AGENT_DIGEST: ${{ steps.retag.outputs.agent-pi-digest }}
        run: |
          # shasum-format: '<hex>  <name>'. Names must be plain identifiers
          # (no URL chars) — actions/attest forwards them verbatim into the
          # in-toto subject.name field.
          set -euo pipefail
          {
            printf '%s  %s\n' "${APP_DIGEST#sha256:}"   "application-server"
            printf '%s  %s\n' "${AGENT_DIGEST#sha256:}" "agent-pi"
            printf '%s  %s\n' "$(sha256sum "$ASSET" | awk '{print $1}')" "$ASSET"
          } > subjects.sha256
          cat subjects.sha256

      - name: Attest release pin
        # Version belongs inside the purl, not as a top-level field.
        # https://github.com/in-toto/attestation/blob/main/spec/predicates/release.md
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: subjects.sha256
          predicate-type: https://in-toto.io/attestation/release/v0.1
          predicate: |
            { "purl": "pkg:github/ls1intum/hephaestus@v${{ needs.release.outputs.new_version }}" }

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign release pin asset
        env:
          ASSET: ${{ steps.pin.outputs.asset-path }}
        run: |
          set -euo pipefail
          cosign sign-blob --yes --bundle "${ASSET}.sigstore.json" "$ASSET"

      - name: Upload release pin asset to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          VERSION: ${{ needs.release.outputs.new_version }}
          ASSET: ${{ steps.pin.outputs.asset-path }}
        run: |
          set -euo pipefail
          # Release assets are immutable: no --clobber, fail loud on re-run.
          gh release upload "v${VERSION}" \
            "$ASSET" "${ASSET}.sigstore.json" \
            --repo "${{ github.repository }}"

  deploy-staging:
    needs: [release, tag-images]
    if: needs.release.outputs.released == 'true'
    uses: ./.github/workflows/deploy-staging.yml
    with:
      image-tag: ${{ needs.release.outputs.new_version }}
      deploy-app: true
      deploy-core: false
      deploy-proxy: false
    secrets: inherit

  deploy-production:
    needs: [release, deploy-staging]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Production Deploy
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-prod.yml',
              ref: 'main',
              inputs: {
                'image-tag': '${{ needs.release.outputs.new_version }}',
                'deploy-app': 'true',
                'deploy-core': 'false',
                'deploy-proxy': 'false'
              }
            });
            console.log('✅ Production deployment triggered for v${{ needs.release.outputs.new_version }}');

      - name: Summary
        run: |
          echo "## 🚀 Production Deployment Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Version **v${{ needs.release.outputs.new_version }}** deployment to production has been triggered." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏳ Waiting for approval in the [Deploy to Production](https://github.com/${{ github.repository }}/actions/workflows/deploy-prod.yml) workflow." >> $GITHUB_STEP_SUMMARY
