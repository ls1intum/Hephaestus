name: Quality

on:
  workflow_call:
    inputs:
      should_skip:
        description: "Whether to skip the workflow"
        required: false
        type: string
        default: "false"
      # Path-based change detection inputs for selective execution
      webapp_changed:
        description: "Whether webapp files changed (or should run for other reasons)"
        required: false
        type: string
        default: "true"
      application_server_changed:
        description: "Whether application-server files changed (or should run for other reasons)"
        required: false
        type: string
        default: "true"
      webhook_ingest_changed:
        description: "Whether webhook-ingest files changed (or should run for other reasons)"
        required: false
        type: string
        default: "true"

jobs:
  quality-gates:
    name: "${{ matrix.display-name }}"
    runs-on: ubuntu-latest
    if: inputs.should_skip != 'true'
    timeout-minutes: ${{ matrix.check == 'database-validation' && 20 || 15 }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - check: application-server-quality
            display-name: "App Server"
          - check: webapp-quality
            display-name: "Webapp"
          - check: webhook-ingest-quality
            display-name: "Webhook"
          - check: openapi-validation
            display-name: "OpenAPI"
          - check: database-validation
            display-name: "Database"
    steps:
      - name: Determine if check should run
        id: should_run
        run: |
          case "${{ matrix.check }}" in
            "webapp-quality")
              echo "run=${{ inputs.webapp_changed }}" >> $GITHUB_OUTPUT
              ;;
            "application-server-quality"|"openapi-validation"|"database-validation")
              echo "run=${{ inputs.application_server_changed }}" >> $GITHUB_OUTPUT
              ;;
            "webhook-ingest-quality")
              echo "run=${{ inputs.webhook_ingest_changed }}" >> $GITHUB_OUTPUT
              ;;
            *)
              # Unknown check type - fail explicitly to catch missing case statements
              echo "::error::Unknown check type '${{ matrix.check }}' in ci-quality-gates.yml matrix."
              echo "::error::Please add a case for this check in the 'Determine if check should run' step."
              echo "run=false" >> $GITHUB_OUTPUT
              exit 1
              ;;
          esac

      - name: Skip notification
        if: steps.should_run.outputs.run != 'true'
        run: echo "⏭️ Skipping ${{ matrix.check }} - no relevant files changed"

      - name: Checkout repository
        if: steps.should_run.outputs.run == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Database checks need full history for git diff on schema/migrations
          # Other quality checks only need HEAD for faster checkout
          fetch-depth: ${{ matrix.check == 'database-validation' && 0 || 1 }}

      - name: Setup Node.js
        if: steps.should_run.outputs.run == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".node-version"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            webapp/package-lock.json

      - name: Setup caches
        if: steps.should_run.outputs.run == 'true'
        uses: ./.github/actions/setup-caches
        with:
          cache-type: ${{ matrix.check }}
          os: ${{ runner.os }}

      - name: Application-server formatting + Pi extension typecheck + runner smoke
        if: steps.should_run.outputs.run == 'true' && matrix.check == 'application-server-quality'
        run: |
          npm ci --prefer-offline --no-audit

          ISSUES_FOUND=()
          FMT_OK=true; TS_OK=true; RUNNER_OK=true

          npm run format:java:check || { FMT_OK=false; ISSUES_FOUND+=("Java formatting failed. Run: npm run format:java"); }
          npm -w server/application-server/agent-extensions run typecheck \
            || { TS_OK=false; ISSUES_FOUND+=("Pi extension TS failed typecheck against @earendil-works/pi-coding-agent. Run: npm -w server/application-server/agent-extensions run typecheck"); }
          node --test server/application-server/src/test/resources/agent/pi-mentor-runner.spec.mjs \
            || { RUNNER_OK=false; ISSUES_FOUND+=("Pi mentor runner smoke test failed. Run: node --test server/application-server/src/test/resources/agent/pi-mentor-runner.spec.mjs"); }

          if [ ${#ISSUES_FOUND[@]} -gt 0 ]; then
            echo "### App Server Quality" >> $GITHUB_STEP_SUMMARY
            echo "| Check | Status | Fix |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|--------|-----|" >> $GITHUB_STEP_SUMMARY
            [[ "$FMT_OK" == "false" ]] && echo "| Java formatting | :x: Failed | \`npm run format:java\` |" >> $GITHUB_STEP_SUMMARY
            [[ "$TS_OK" == "false" ]] && echo "| Pi extension TS | :x: Failed | \`npm -w server/application-server/agent-extensions run typecheck\` |" >> $GITHUB_STEP_SUMMARY
            [[ "$RUNNER_OK" == "false" ]] && echo "| Pi mentor runner smoke | :x: Failed | \`node --test server/application-server/src/test/resources/agent/pi-mentor-runner.spec.mjs\` |" >> $GITHUB_STEP_SUMMARY
            for issue in "${ISSUES_FOUND[@]}"; do echo "::error::$issue"; done
            exit 1
          fi

      - name: Webapp quality
        if: steps.should_run.outputs.run == 'true' && matrix.check == 'webapp-quality'
        working-directory: ./webapp
        run: |
          cd ..
          npm ci --no-audit --progress=false
          node scripts/install-platform-binaries.mjs
          cd webapp

          ISSUES_FOUND=()
          BIOME_OK=true
          TYPES_OK=true

          npm run check || { BIOME_OK=false; ISSUES_FOUND+=("Biome checks failed. Run: cd webapp && npm run check -- --write"); }
          npm run typecheck || { TYPES_OK=false; ISSUES_FOUND+=("TypeScript errors found. Run: cd webapp && npm run typecheck"); }

          if [ ${#ISSUES_FOUND[@]} -gt 0 ]; then
            echo "### Webapp Quality" >> $GITHUB_STEP_SUMMARY
            echo "| Check | Status | Fix |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|--------|-----|" >> $GITHUB_STEP_SUMMARY
            [[ "$BIOME_OK" == "false" ]] && echo "| Biome (lint + format) | :x: Failed | \`cd webapp && npm run check -- --write\` |" >> $GITHUB_STEP_SUMMARY
            [[ "$TYPES_OK" == "false" ]] && echo "| TypeScript | :x: Failed | \`cd webapp && npm run typecheck\` |" >> $GITHUB_STEP_SUMMARY
            for issue in "${ISSUES_FOUND[@]}"; do echo "::error::$issue"; done
            exit 1
          fi

      - name: Webhook-ingest quality
        if: steps.should_run.outputs.run == 'true' && matrix.check == 'webhook-ingest-quality'
        run: |
          # npm ci already handles node_modules cleanup when package-lock.json changes
          npm ci --no-audit --progress=false
          node scripts/install-platform-binaries.mjs

          ISSUES_FOUND=()
          CHECK_OK=true; TYPES_OK=true; TEST_OK=true; BUILD_OK=true

          npm -w server/webhook-ingest run check || { CHECK_OK=false; ISSUES_FOUND+=("Biome check failed. Run: npm -w server/webhook-ingest run check"); }
          npm -w server/webhook-ingest run typecheck || { TYPES_OK=false; ISSUES_FOUND+=("TypeScript failed. Run: npm run typecheck:webhook-ingest"); }
          npm -w server/webhook-ingest run test || { TEST_OK=false; ISSUES_FOUND+=("Tests failed. Run: npm run test:webhook-ingest"); }
          npm -w server/webhook-ingest run build || { BUILD_OK=false; ISSUES_FOUND+=("Build failed. Run: npm run build:webhook-ingest"); }

          if [ ${#ISSUES_FOUND[@]} -gt 0 ]; then
            echo "### Webhook Ingest Quality" >> $GITHUB_STEP_SUMMARY
            echo "| Check | Status | Fix |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|--------|-----|" >> $GITHUB_STEP_SUMMARY
            [[ "$CHECK_OK" == "false" ]] && echo "| Biome (lint + format) | :x: Failed | \`npm -w server/webhook-ingest run check\` |" >> $GITHUB_STEP_SUMMARY
            [[ "$TYPES_OK" == "false" ]] && echo "| TypeScript | :x: Failed | \`npm run typecheck:webhook-ingest\` |" >> $GITHUB_STEP_SUMMARY
            [[ "$TEST_OK" == "false" ]] && echo "| Tests | :x: Failed | \`npm run test:webhook-ingest\` |" >> $GITHUB_STEP_SUMMARY
            [[ "$BUILD_OK" == "false" ]] && echo "| Build | :x: Failed | \`npm run build:webhook-ingest\` |" >> $GITHUB_STEP_SUMMARY
            for issue in "${ISSUES_FOUND[@]}"; do echo "::error::$issue"; done
            exit 1
          fi

      - name: OpenAPI validation
        if: steps.should_run.outputs.run == 'true' && matrix.check == 'openapi-validation'
        env:
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake
          MODEL_NAME: fake:model
        run: |
          npm ci --prefer-offline --no-audit
          cd server/application-server
          mvn compile -DskipTests --quiet -Dmaven.build.cache.enabled=true
          cd ../..

          npm run generate:api
          git add .
          if ! git diff --cached --quiet; then
            echo "::error::OpenAPI out of sync. Run: npm run generate:api"
            echo "### OpenAPI Validation" >> $GITHUB_STEP_SUMMARY
            echo "| Check | Status | Fix |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|--------|-----|" >> $GITHUB_STEP_SUMMARY
            echo "| API specs sync | :x: Out of sync | \`npm run generate:api\` |" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Database validation (schema + ERD + models)
        if: steps.should_run.outputs.run == 'true' && matrix.check == 'database-validation'
        run: |
          # Install dependencies (npm + platform binaries needed for models check)
          npm ci --prefer-offline --no-audit
          node scripts/install-platform-binaries.mjs

          # Start a single shared Postgres instance for all DB checks
          docker run -d --name postgres-db \
            -e POSTGRES_DB=hephaestus -e POSTGRES_PASSWORD=root -e POSTGRES_USER=root \
            -p 5432:5432 postgres:16
          # Guarantee cleanup regardless of how the step exits
          trap 'docker stop postgres-db 2>/dev/null; docker rm postgres-db 2>/dev/null' EXIT
          until docker exec postgres-db pg_isready -U root -d hephaestus; do sleep 2; done

          export SPRING_DATASOURCE_URL="jdbc:postgresql://localhost:5432/hephaestus"
          export SPRING_DATASOURCE_USERNAME="root"
          export SPRING_DATASOURCE_PASSWORD="root"

          # Compile application-server once (shared across all checks)
          if ! (cd server/application-server && mvn compile -DskipTests --quiet -Dmaven.build.cache.enabled=true); then
            echo "::error::Maven compilation failed. This blocks all database validation checks. Fix compilation errors first."
            echo "### Database Validation" >> $GITHUB_STEP_SUMMARY
            echo "| Check | Status | Fix |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|--------|-----|" >> $GITHUB_STEP_SUMMARY
            echo "| Maven compile | :x: Failed | Fix compilation errors in \`server/application-server\` |" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          ISSUES_FOUND=()

          # Check 1: Schema drift
          scripts/db-utils.sh draft-changelog || ISSUES_FOUND+=("Schema check script failed. Run: npm run db:draft-changelog")
          if [ -f "server/application-server/src/main/resources/db/changelog_new.xml" ]; then
            echo "::error::Schema drift detected. Run: npm run db:draft-changelog"
            cat server/application-server/src/main/resources/db/changelog_new.xml
            ISSUES_FOUND+=("Schema drift detected")
          fi

          # Check 2: ERD documentation
          scripts/db-utils.sh generate-erd || ISSUES_FOUND+=("ERD generation failed. Run: npm run db:generate-erd-docs")
          git add docs/contributor/erd/schema.mmd
          if ! git diff --cached --quiet docs/contributor/erd/schema.mmd; then
            echo "::error::ERD outdated. Run: npm run db:generate-erd-docs"
            ISSUES_FOUND+=("ERD outdated")
          fi

          if [ ${#ISSUES_FOUND[@]} -gt 0 ]; then
            echo "### Database Validation" >> $GITHUB_STEP_SUMMARY
            echo "| Check | Status | Fix |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|--------|-----|" >> $GITHUB_STEP_SUMMARY
            for issue in "${ISSUES_FOUND[@]}"; do
              echo "::error::$issue"
              # Extract fix command from "...Run: <command>" format, or show issue directly
              if [[ "$issue" == *"Run:"* ]]; then
                echo "| ${issue%%.*} | :x: Failed | \`${issue##*Run: }\` |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| $issue | :x: Failed | See logs |" >> $GITHUB_STEP_SUMMARY
              fi
            done
            exit 1
          fi

  # Issue #1076 retired a legacy agent runtime image; this job blocks
  # accidental re-introductions in code/CI/docker. The needle is built at
  # runtime so this guard file itself doesn't match its own check.
  legacy-cleanup-guard:
    name: "No legacy agent image"
    if: inputs.should_skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
      - name: Assert no legacy agent-image references
        run: |
          set -euo pipefail
          # MIGRATION.md and the admin doc document the removal; the path filter
          # below excludes those (and the guard's own file) by full path so
          # similarly-named files in subdirectories can't slip through.
          NEEDLE="agent-$(printf 'open\x63ode')"   # split so this guard file doesn't self-match
          if grep -rEnI "$NEEDLE" \
                --exclude-dir=node_modules --exclude-dir=target --exclude-dir=.git \
                . \
              | grep -vE '^\./(MIGRATION\.md|docs/admin/agent-image-digests\.md):' ; then
            echo "::error::Legacy agent image is removed in issue #1076; relocate any new references to MIGRATION.md."
            exit 1
          fi
