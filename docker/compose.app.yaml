services:
  webapp:
    image: "ghcr.io/ls1intum/hephaestus/webapp:${IMAGE_TAG}"
    environment:
      APPLICATION_VERSION: ${IMAGE_TAG}
      APPLICATION_CLIENT_URL: https://${APP_HOSTNAME}
      APPLICATION_SERVER_URL: https://${APP_HOSTNAME}/api
      KEYCLOAK_URL: https://${APP_HOSTNAME}/keycloak
      KEYCLOAK_REALM: hephaestus
      KEYCLOAK_CLIENT_ID: hephaestus
      KEYCLOAK_SKIP_LOGIN: ${KEYCLOAK_SKIP_LOGIN}
      # Imprint/privacy source. Leave unset and bind-mount a host directory
      # onto /usr/share/nginx/html/legal-overrides for forks. Use "tumaet" only
      # for the canonical AET deployment. See docs/admin/legal-pages.mdx.
      LEGAL_PROFILE: ${LEGAL_PROFILE:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT}
      SENTRY_DSN: ${SENTRY_DSN}
      POSTHOG_ENABLED: ${POSTHOG_ENABLED:-false}
      POSTHOG_PROJECT_API_KEY: ${POSTHOG_PROJECT_API_KEY}
      POSTHOG_API_HOST: ${POSTHOG_API_HOST}
      TANSTACK_DEVTOOLS_ENABLED: ${TANSTACK_DEVTOOLS_ENABLED:-false}
    ports:
      - "80"
    depends_on:
      - application-server
    restart: unless-stopped
    networks:
      - shared-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.routers.http-webapp.entryPoints=http"
      - "traefik.http.routers.http-webapp.middlewares=redirect-to-https"
      - "traefik.http.routers.http-webapp.rule=Host(`${APP_HOSTNAME}`) && PathPrefix(`/`)"
      - "traefik.http.routers.http-webapp.service=http-webapp"
      - "traefik.http.routers.https-webapp.entryPoints=https"
      - "traefik.http.routers.https-webapp.rule=Host(`${APP_HOSTNAME}`) && PathPrefix(`/`)"
      - "traefik.http.routers.https-webapp.service=https-webapp"
      - "traefik.http.routers.https-webapp.tls.certresolver=letsencrypt"
      - "traefik.http.routers.https-webapp.tls=true"
      - "traefik.http.services.http-webapp.loadbalancer.server.port=80"
      - "traefik.http.services.https-webapp.loadbalancer.server.port=80"
      - "traefik.http.routers.http-webapp.priority=2"
      - "traefik.http.routers.https-webapp.priority=3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  application-server:
    image: "ghcr.io/ls1intum/hephaestus/application-server:${IMAGE_TAG}"
    ports:
      - "8080"
    environment:
      APP_VERSION: ${IMAGE_TAG}
      SPRING_PROFILES_ACTIVE: prod
      APPLICATION_HOST_URL: https://${APP_HOSTNAME}
      DATABASE_URL: postgresql://postgres:5432/hephaestus
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: root
      INTELLIGENCE_SERVICE_URL: http://intelligence-service:8000
      NATS_SERVER: nats://nats-server:4222
      KEYCLOAK_URL: https://${APP_HOSTNAME}/keycloak
      KEYCLOAK_REALM: hephaestus
      # Internal base URL (includes /keycloak) for container-to-container JWKS fetches
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080/keycloak
      KEYCLOAK_CLIENT_ID: hephaestus-confidential
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_HEPHAESTUS_CONFIDENTIAL_CLIENT_SECRET}
      GH_APP_ID: ${GH_APP_ID}
      GH_APP_PRIVATE_KEY: ${GH_APP_PRIVATE_KEY}
      GH_APP_PRIVATE_KEY_LOCATION: ${GH_APP_PRIVATE_KEY_LOCATION:-}
      GH_APP_INSTALLATION_URL: ${GH_APP_INSTALLATION_URL:-}
      GH_AUTH_TOKEN: ${GH_AUTH_TOKEN}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      NATS_ENABLED: ${NATS_ENABLED}
      NATS_DURABLE_CONSUMER_NAME: ${NATS_DURABLE_CONSUMER_NAME}
      MONITORING_TIMEFRAME: ${MONITORING_TIMEFRAME}
      MONITORING_RUN_ON_STARTUP: ${MONITORING_RUN_ON_STARTUP}
      MONITORING_SYNC_CRON: ${MONITORING_SYNC_CRON}
      MONITORING_SYNC_COOLDOWN_IN_MINUTES: ${MONITORING_SYNC_COOLDOWN_IN_MINUTES}
      MONITORING_BACKFILL_ENABLED: ${MONITORING_BACKFILL_ENABLED:-true}
      MONITORING_BACKFILL_BATCH_SIZE: ${MONITORING_BACKFILL_BATCH_SIZE:-50}
      MONITORING_BACKFILL_RATE_LIMIT_THRESHOLD: ${MONITORING_BACKFILL_RATE_LIMIT_THRESHOLD:-500}
      MONITORING_BACKFILL_INTERVAL_SECONDS: ${MONITORING_BACKFILL_INTERVAL_SECONDS:-60}
      LEADERBOARD_NOTIFICATION_ENABLED: ${LEADERBOARD_NOTIFICATION_ENABLED}
      LEADERBOARD_NOTIFICATION_TEAM: ${LEADERBOARD_NOTIFICATION_TEAM}
      LEADERBOARD_NOTIFICATION_CHANNEL_ID: ${LEADERBOARD_NOTIFICATION_CHANNEL_ID}
      LEADERBOARD_SCHEDULE_DAY: ${LEADERBOARD_SCHEDULE_DAY}
      LEADERBOARD_SCHEDULE_TIME: ${LEADERBOARD_SCHEDULE_TIME}
      SENTRY_DSN: ${SENTRY_DSN}
      POSTHOG_ENABLED: ${POSTHOG_ENABLED:-false}
      POSTHOG_API_HOST: ${POSTHOG_API_HOST:-https://app.posthog.com}
      POSTHOG_PROJECT_ID: ${POSTHOG_PROJECT_ID:-}
      POSTHOG_PERSONAL_API_KEY: ${POSTHOG_PERSONAL_API_KEY:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      WEBHOOK_EXTERNAL_URL: https://${APP_HOSTNAME}/webhooks
      # GitLab integration
      GITLAB_ENABLED: ${GITLAB_ENABLED:-false}
      KEYCLOAK_GITLAB_BASE_URL: ${KEYCLOAK_GITLAB_BASE_URL:-https://gitlab.lrz.de}
      # Agent sandbox (practice review)
      SANDBOX_ENABLED: ${SANDBOX_ENABLED:-false}
      SANDBOX_DOCKER_HOST: ${SANDBOX_DOCKER_HOST:-unix:///var/run/docker.sock}
      SANDBOX_CONTAINER_RUNTIME: ${SANDBOX_CONTAINER_RUNTIME:-}
      SANDBOX_MAX_CONCURRENT: ${SANDBOX_MAX_CONCURRENT:-5}
      SANDBOX_MEMORY_BYTES: ${SANDBOX_MEMORY_BYTES:-4294967296}
      SANDBOX_CPUS: ${SANDBOX_CPUS:-2.0}
      # Agent NATS (job queue for practice review)
      AGENT_NATS_ENABLED: ${AGENT_NATS_ENABLED:-false}
      # Git checkout (bind-mount repos into agent containers)
      GIT_CHECKOUT_ENABLED: ${GIT_CHECKOUT_ENABLED:-false}
      GIT_STORAGE_PATH: /data/git-repos
      # Practice review gate (auto-trigger is now a per-workspace setting)
      PRACTICE_REVIEW_RUN_FOR_ALL: ${PRACTICE_REVIEW_FOR_ALL:-false}
      PRACTICE_REVIEW_SKIP_DRAFTS: ${PRACTICE_REVIEW_SKIP_DRAFTS:-true}
      PRACTICE_REVIEW_DELIVER_TO_MERGED: ${PRACTICE_REVIEW_DELIVER_TO_MERGED:-false}
      PRACTICE_REVIEW_COOLDOWN_MINUTES: ${PRACTICE_REVIEW_COOLDOWN_MINUTES:-15}
      PRACTICE_REVIEW_APP_BASE_URL: ${PRACTICE_REVIEW_APP_BASE_URL:-}
      # Feature flags
      HEPHAESTUS_FEATURES_FLAGS_PRACTICE_REVIEW_FOR_ALL: ${PRACTICE_REVIEW_FOR_ALL:-false}
      HEPHAESTUS_FEATURES_FLAGS_GITLAB_WORKSPACE_CREATION: ${GITLAB_WORKSPACE_CREATION:-false}
      # LLM proxy (generic OpenAI-compatible route)
      LLM_PROXY_OPENAI_URL: ${LLM_PROXY_OPENAI_URL:-https://api.openai.com}
      LLM_PROXY_OPENAI_AUTH_HEADER: ${LLM_PROXY_OPENAI_AUTH_HEADER:-Authorization}
      LLM_PROXY_OPENAI_USE_BEARER: ${LLM_PROXY_OPENAI_USE_BEARER:-true}
      # LLM proxy (dedicated Azure OpenAI route used by Pi)
      LLM_PROXY_AZURE_OPENAI_URL: ${LLM_PROXY_AZURE_OPENAI_URL:-}
      LLM_PROXY_AZURE_OPENAI_AUTH_HEADER: ${LLM_PROXY_AZURE_OPENAI_AUTH_HEADER:-api-key}
      LLM_PROXY_AZURE_OPENAI_USE_BEARER: ${LLM_PROXY_AZURE_OPENAI_USE_BEARER:-false}
    depends_on:
      - postgres
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - git-repos:/data/git-repos
    networks:
      - shared-network
    labels:
      - "traefik.enable=true"
      # Pin Traefik to shared-network: the app-server temporarily joins agent sandbox
      # networks (agent-net-*) during review jobs. Without this label, Traefik can pick
      # the sandbox network IP and route requests to an unreachable internal network.
      - "traefik.docker.network=shared-network"
      - "traefik.http.middlewares.https-application-server-stripprefix.stripprefix.prefixes=/api"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.routers.http-application-server.entryPoints=http"
      - "traefik.http.routers.http-application-server.middlewares=redirect-to-https"
      - "traefik.http.routers.http-application-server.rule=Host(`${APP_HOSTNAME}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.http-application-server.service=http-application-server"
      - "traefik.http.routers.https-application-server.entryPoints=https"
      - "traefik.http.routers.https-application-server.middlewares=https-application-server-stripprefix"
      - "traefik.http.routers.https-application-server.rule=Host(`${APP_HOSTNAME}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.https-application-server.tls.certresolver=letsencrypt"
      - "traefik.http.routers.https-application-server.tls=true"
      - "traefik.http.routers.https-application-server.service=https-application-server"
      - "traefik.http.services.http-application-server.loadbalancer.server.port=8080"
      - "traefik.http.services.https-application-server.loadbalancer.server.port=8080"
      - "traefik.http.routers.http-application-server.priority=5"
      - "traefik.http.routers.https-application-server.priority=10"
    healthcheck:
      test: "wget -qO- http://localhost:8080/actuator/health || exit 1"
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  intelligence-service:
    image: "ghcr.io/ls1intum/hephaestus/intelligence-service:${IMAGE_TAG}"
    environment:
      APP_VERSION: ${IMAGE_TAG}
      NODE_ENV: production
      PORT: 8000
      LOG_LEVEL: info
      DATABASE_URL: postgresql://root:root@postgres:5432/hephaestus
      MODEL_NAME: ${MODEL_NAME}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AZURE_RESOURCE_NAME: ${AZURE_RESOURCE_NAME}
      AZURE_API_KEY: ${AZURE_API_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL}
    depends_on:
      - postgres
    restart: unless-stopped
    ports:
      - "8000"
    networks:
      - shared-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  postgres:
    image: "postgres:16@sha256:5a65324fe84dc41709ff914e90b07f3e2f577073ed27bf917d4873aca0c9ec51"
    environment:
      - POSTGRES_DB=hephaestus
      - POSTGRES_PASSWORD=root
      - POSTGRES_USER=root
    ports:
      - "5432"
    networks:
      shared-network:
        aliases:
          - postgres
    restart: unless-stopped
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 5s
      timeout: 10s
      retries: 10

  # Enforces the 14-day age cap on Docker container logs declared in the
  # privacy statement and the DSMS submission package. See
  # docker/logrotate/README.md and the Dockerfile header for the compliance
  # links. Runs logrotate under BusyBox cron once per day; the json-file
  # driver (per-service `logging:` blocks) handles the size cap.
  logrotate:
    image: "ghcr.io/ls1intum/hephaestus/logrotate:${IMAGE_TAG}"
    restart: unless-stopped
    # The one privileged piece: read-write access to container logs on the
    # host. Container logs are root-owned, so the container runs as root
    # internally; no-new-privileges + cap_drop/ALL keeps the blast radius
    # bounded to what logrotate actually needs.
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:rw
      - logrotate-state:/var/lib/hephaestus-logrotate
    configs:
      - source: logrotate-hephaestus-docker-logs
        target: /etc/logrotate.d/hephaestus-docker-logs
        mode: 0644
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      # Required to truncate root-owned json-file logs owned by the
      # Docker daemon. copytruncate opens with O_WRONLY|O_TRUNC.
      - DAC_OVERRIDE
      - CHOWN
      - FOWNER
    # Not joined to shared-network: the sidecar has no need to reach any
    # other service. Isolating it reduces the blast radius further.
    network_mode: none
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  shared-network:
    name: shared-network
    driver: bridge

volumes:
  postgresql-data:
  git-repos:
  logrotate-state:

# Inline the logrotate rule so a deploy is fully self-contained: the
# compose file is the only artifact pushed to the VM, and the rotation
# policy travels with it. Any change here is a material change to the
# retention cap claimed in docs/admin/dsms/ and must be amended there
# before it is deployed.
#
# - daily        runs once per day (BusyBox cron tick inside the sidecar)
# - rotate 14    keeps 14 daily snapshots — the oldest is auto-deleted,
#                giving the hard 14-day cap
# - copytruncate the Docker daemon keeps the json-file log open and has
#                no re-open signal; rename-then-create would leave the
#                daemon writing to a deleted inode. copytruncate races on
#                a brief window; acceptable for access-log data.
# - dateext      rotated names are dated (e.g. -20260419) to avoid
#                colliding with the numeric suffixes (.1, .2, …) produced
#                by the json-file driver's own size-based rotation
# - compress     gzip archived logs; delaycompress keeps yesterday's
#                archive readable without gunzip
configs:
  logrotate-hephaestus-docker-logs:
    content: |
      /var/lib/docker/containers/*/*-json.log {
          daily
          rotate 14
          missingok
          notifempty
          compress
          delaycompress
          copytruncate
          dateext
          dateformat -%Y%m%d
      }
