services:
  # ─────────────────────────────────────────────────────────────────────────────
  # webhook-server — inbound webhook receiver (same image as application-server,
  # activated with SPRING_PROFILES_ACTIVE=prod,webhook so only the
  # integration.core.webhook beans load). Deployed as a separate container from
  # application-server so an app-server restart doesn't drop incoming webhooks
  # (push events aren't manually redeliverable on GitHub/GitLab). See ADR 0008.
  # ─────────────────────────────────────────────────────────────────────────────
  webhook-server:
    image: "ghcr.io/ls1intum/hephaestus/application-server:${IMAGE_TAG}"
    # Bounds heap sizing to this container; without it the JVM targets host RAM and co-located
    # services oversubscribe and swap. Webhook only receives and republishes, so its heap is small.
    mem_limit: ${WEBHOOK_SERVER_MEM_LIMIT:-1g}
    expose:
      - "8080"
    environment:
      APP_VERSION: ${IMAGE_TAG}
      SPRING_PROFILES_ACTIVE: "prod,webhook"
      HEPHAESTUS_RUNTIME_WEBHOOK_ENABLED: "true"
      HEPHAESTUS_RUNTIME_SERVER_ENABLED: "false"
      HEPHAESTUS_RUNTIME_WORKER_ENABLED: "false"
      SPRING_LIQUIBASE_ENABLED: "false"
      # NATS — reuses the existing `natsConnection` bean to publish inbound events.
      HEPHAESTUS_SYNC_NATS_ENABLED: "true"
      HEPHAESTUS_SYNC_NATS_SERVER: "nats://nats-server:4222"
      # Shared webhook secret used for incoming HMAC / token verification.
      # WEBHOOK_EXTERNAL_URL is only used by auto-registration (server role) and is intentionally
      # not set on the webhook-server pod.
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      # DataSource for the JPA layer (the connection-credential AttributeConverter that the HMAC
      # path reads); the auth web layer and workspace-context filter are gated off this role.
      # Internal, trusted docker-network DB: skip TLS. pgJDBC doesn't validate Postgres' self-signed cert
      # so it adds no authentication, only the SSL handshake's NIO direct buffers that OOM the JVM off-heap
      # default; confidentiality is fine to drop here (creds already sit in plaintext compose env).
      DATABASE_URL: postgresql://postgres:5432/hephaestus?sslmode=disable
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: root
      # CredentialBundleConverter (JPA AttributeConverter) decrypts connection credentials on every role.
      HEPHAESTUS_SECURITY_ENCRYPTION_KEY: ${HEPHAESTUS_SECURITY_ENCRYPTION_KEY}
      # Slack Events API + interactivity are received by this pod under /webhooks/slack*.
      # Interactivity may send Slack follow-ups; OAuth/admin and mentor replies stay on application-server.
      HEPHAESTUS_INTEGRATION_SLACK_ENABLED: ${HEPHAESTUS_INTEGRATION_SLACK_ENABLED:-false}
      HEPHAESTUS_INTEGRATION_SLACK_SIGNING_SECRET: ${HEPHAESTUS_INTEGRATION_SLACK_SIGNING_SECRET:-}
      # Outline change notifications arrive here under /webhooks/outline. The flag gates
      # OutlineWebhookSignatureVerifier + OutlineWebhookSecretSource; without it WebhookIngestPipeline
      # has no verifier for the kind and answers 501 to EVERY delivery, which Outline counts as a
      # failure and auto-disables the subscription after 25 of them. No signing secret here: Outline's
      # secret is per-subscription (minted by OutlineWebhookRegistrar on the server pod, stored
      # encrypted on the connection row) and is read back through JPA, not from the environment.
      # Keep in lockstep with application-server's value.
      HEPHAESTUS_INTEGRATION_OUTLINE_ENABLED: ${HEPHAESTUS_INTEGRATION_OUTLINE_ENABLED:-false}
      # application-prod.yml binds host-url=${APPLICATION_HOST_URL} with no YAML default; compose always
      # supplies it (an unset var fails the boot at placeholder resolution).
      APPLICATION_HOST_URL: https://${APP_HOSTNAME}
      SENTRY_DSN: ${SENTRY_DSN}
      # forward-headers=native (application-prod.yml) → ProxyTrustGuard fails the boot unless pinned.
      HEPHAESTUS_TRUSTED_PROXIES: ${HEPHAESTUS_TRUSTED_PROXIES:-}
      # AgentImagePinGuard loads in any prod pod; set false for non-release deploys that skip the pin.
      HEPHAESTUS_AGENT_IMAGE_REQUIRE_DIGEST: ${HEPHAESTUS_AGENT_IMAGE_REQUIRE_DIGEST:-true}
      # thc healthcheck target: readiness (reports unhealthy while NATS/JetStream is unavailable).
      THC_PORT: "8080"
      THC_PATH: /actuator/health/readiness
    depends_on:
      nats-server:
        condition: service_healthy
    restart: unless-stopped
    # Spring drains HTTP (timeout-per-shutdown-phase 20s) THEN WebhookGracefulShutdown drains
    # NATS (up to 15s). Docker must allow ≥35s before SIGKILL, or the JVM is cut mid-drain.
    stop_grace_period: 40s
    networks:
      - shared-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.gzip.compress=true"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.routers.http-webhook-server.entryPoints=http"
      - "traefik.http.routers.http-webhook-server.middlewares=redirect-to-https"
      - "traefik.http.routers.http-webhook-server.rule=Host(`${APP_HOSTNAME}`) && PathPrefix(`/webhooks`)"
      - "traefik.http.routers.https-webhook-server.entryPoints=https"
      # No stripprefix: the receiver owns the full "/webhooks/{kind}" path (controller + payload-size
      # filter + security chain all bind to /webhooks/**). Stripping it would 404 every delivery.
      - "traefik.http.routers.https-webhook-server.middlewares=gzip"
      - "traefik.http.routers.https-webhook-server.rule=Host(`${APP_HOSTNAME}`) && PathPrefix(`/webhooks`)"
      - "traefik.http.routers.https-webhook-server.tls.certresolver=letsencrypt"
      - "traefik.http.routers.https-webhook-server.tls=true"
      - "traefik.http.routers.http-webhook-server.priority=100"
      - "traefik.http.routers.https-webhook-server.priority=100"
      - "traefik.http.services.https-webhook-server.loadbalancer.server.port=8080"
      # Routing-layer probe: drops a bad backend from the LB pool.
      - "traefik.http.services.https-webhook-server.loadbalancer.healthcheck.path=/actuator/health/readiness"
      - "traefik.http.services.https-webhook-server.loadbalancer.healthcheck.interval=15s"
      - "traefik.http.services.https-webhook-server.loadbalancer.healthcheck.timeout=5s"
    # thc healthcheck (see docker/compose.app.yaml).
    healthcheck:
      test: ["CMD", "/workspace/health-check"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nats-server:
    image: nats:alpine
    restart: unless-stopped
    ports:
      # Loopback-only by default. Set NATS_BIND_HOST=0.0.0.0 (or a specific interface) to let other
      # hosts reach the bus — only on a trusted or firewalled network, as NATS runs unauthenticated.
      - "${NATS_BIND_HOST:-127.0.0.1}:4222:4222"
    command: ["--config", "/etc/nats/nats-server.conf"]
    volumes:
      - nats-data:/data
    configs:
      - source: nats-server.conf
        target: /etc/nats/nats-server.conf
    networks:
      - shared-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8222/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 3s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


networks:
  shared-network:
    name: shared-network
    driver: bridge

volumes:
  nats-data: 

configs:
  nats-server.conf:
    content: |
      listen: "0.0.0.0:4222" 

      http_port: 8222

      jetstream {
        store_dir: "/data"
        max_mem: ${NATS_JS_MAX_MEM:-4G}
        max_file: ${NATS_JS_MAX_FILE:-50G}
      }
