# Local development stack. From the repo root: `pnpm dev` runs `docker compose up -d --wait`
# then starts the server + webapp. After schema changes: `docker compose down -v && docker compose up -d`.
#
# Authentication is Hephaestus-native (no Keycloak — ADR 0017). For local login, register a
# GitHub OAuth app (callback http://localhost:38080/login/oauth2/code/github) and set
# GITHUB_OAUTH_CLIENT_ID / GITHUB_OAUTH_CLIENT_SECRET in server/.env. See
# docs/contributor/local-development.mdx.

services:
  postgres:
    image: 'postgres:16'
    environment:
      POSTGRES_DB: hephaestus
      POSTGRES_PASSWORD: root
      POSTGRES_USER: root
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    networks:
      - app-network
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U root -d hephaestus']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  app-network:
    driver: bridge
