# Local development stack. From the repo root: `pnpm dev` runs `docker compose up -d --wait`
# then starts the server + webapp. Postgres is a bind mount (./postgres-data), so
# `docker compose down -v` won't clear it — use `pnpm dev:reset` to reset the DB.
#
# Authentication is Hephaestus-native (no Keycloak — ADR 0017). For local login, register a
# GitHub OAuth app (callback http://localhost:8080/login/oauth2/code/github) and set
# GITHUB_OAUTH_CLIENT_ID / GITHUB_OAUTH_CLIENT_SECRET in server/.env. See
# docs/contributor/local-development.mdx.

services:
  postgres:
    image: 'postgres:16'
    environment:
      POSTGRES_DB: hephaestus
      POSTGRES_PASSWORD: root
      POSTGRES_USER: root
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    networks:
      - app-network
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U root -d hephaestus']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Available for opt-in agent/webhook pipeline work (set the relevant hephaestus.*.nats.enabled
  # in application-local.yml). Idle otherwise — no Spring connection opens unless enabled.
  nats:
    image: nats:alpine
    command: ['-js', '-m', '8222']
    ports:
      - '${NATS_PORT:-4222}:4222'
    networks:
      - app-network
    healthcheck:
      test: ['CMD', 'wget', '--spider', '--quiet', 'http://localhost:8222/healthz']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

networks:
  app-network:
    driver: bridge
