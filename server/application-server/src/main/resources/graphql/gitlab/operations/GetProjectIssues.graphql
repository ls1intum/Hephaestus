query GetProjectIssues($fullPath: ID!, $first: Int!, $after: String, $updatedAfter: Time) {
    project(fullPath: $fullPath) {
        issues(first: $first, after: $after, updatedAfter: $updatedAfter, sort: UPDATED_DESC) {
            pageInfo {
                hasNextPage
                endCursor
            }
            nodes {
                id
                iid
                title
                description
                state
                confidential
                webUrl
                createdAt
                updatedAt
                closedAt
                author {
                    ...GitLabUserFields
                }
                labels(first: 100) {
                    pageInfo {
                        hasNextPage
                    }
                    nodes {
                        id
                        title
                        color
                    }
                }
                assignees(first: 20) {
                    pageInfo {
                        hasNextPage
                    }
                    nodes {
                        ...GitLabUserFields
                    }
                }
                userNotesCount
            }
        }
    }
}
