# Posts a diff note (inline comment) on a merge request.
# Used by agent feedback delivery to post diff-level practice findings.
# Each note targets a specific file and line in the MR diff.

mutation CreateDiffNote(
    $noteableId: NoteableID!,
    $body: String!,
    $position: DiffPositionInput!
) {
    createDiffNote(input: {
        noteableId: $noteableId,
        body: $body,
        position: $position
    }) {
        note {
            id
        }
        errors
    }
}
