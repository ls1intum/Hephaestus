query GetIssueNotes($fullPath: ID!, $iid: String!, $first: Int!, $after: String) {
    project(fullPath: $fullPath) {
        issue(iid: $iid) {
            notes(first: $first, after: $after) {
                pageInfo {
                    hasNextPage
                    endCursor
                }
                nodes {
                    id
                    body
                    system
                    internal
                    url
                    position {
                        filePath
                    }
                    author {
                        ...GitLabUserFields
                    }
                    createdAt
                    updatedAt
                }
            }
        }
    }
}
