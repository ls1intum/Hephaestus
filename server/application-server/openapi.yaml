            HTTPS. Defaults to https://gitlab.com if not specified.
          example: https://gitlab.example.com
        workspaceSlug:
          type: string
          description: URL-friendly identifier for the workspace
          example: my-workspace
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
