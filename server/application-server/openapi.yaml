components:
  schemas:
    Achievement:
      type: object
      description: Achievement with user-specific progress information
      properties:
        category:
          type: string
          description: Category for grouping achievements
          enum:
          - pull_requests
          - commits
          - communication
          - issues
          - milestones
          example: pull_requests
        id:
          type: string
          $ref: "#/components/schemas/AchievementId"
          description: Unique identifier for the achievement
          example: pr.merged.common.1
        isHidden:
          type: boolean
          description: Whether the achievement should be hidden until unlocked
        parent:
          type: string
          description: Parent achievement in progression chain
          example: first_pull
        progressData:
          description: The structured progress data based on the achievements evaluator
          oneOf:
          - $ref: "#/components/schemas/BinaryAchievementProgress"
          - $ref: "#/components/schemas/LinearAchievementProgress"
        rarity:
          type: string
          description: Visual level tier/rarity for badge styling
          enum:
          - common
