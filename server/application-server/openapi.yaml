                  type: string
                  format: uuid
                message:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    parts:
                      type: array
                      items:
                        anyOf:
                        - type: object
                          properties:
                            text:
                              type: string
                              maxLength: 2000
                              minLength: 1
                            type:
                              type: string
                              enum:
                              - text
                          required:
                          - text
                          - type
                        - type: object
                          properties:
                            mediaType:
                              type: string
                              enum:
                              - image/jpeg
                              - image/png
                            name:
                              type: string
                              maxLength: 100
                              minLength: 1
                            type:
                              type: string
                              enum:
                              - file
                            url:
                              type: string
                              format: uri
                          required:
                          - mediaType
                          - name
                          - type
                          - url
                    role:
                      type: string
                      enum:
                      - user
                  required:
                  - id
                  - parts
                  - role
                previousMessageId:
                  type: string
              required:
              - id
