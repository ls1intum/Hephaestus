openapi: 3.1.0
info:
  contact:
    email: felixtj.dietrich@tum.de
    name: Felix T.J. Dietrich
  description: API documentation for the Hephaestus application server.
  license:
    name: MIT License
    url: https://github.com/ls1intum/Hephaestus/blob/develop/LICENSE
  title: Hephaestus API
  version: 0.0.0-development
servers:
- description: Default Server URL
  url: /
security:
- bearerAuth: []
tags:
- description: User achievement progress and unlocks
  name: Achievements
- description: Global contributor information
  name: Contributors
- description: |-
    Workspace registry endpoints that operate outside of a specific workspace slug.
     These routes stay under the classic /workspaces base path while slugged routes
     live in {@link WorkspaceController WorkspaceController} via <code>@WorkspaceScopedController</code>.
  name: workspace-registry-controller
- description: Read-only access to practice evaluation findings
  name: Practice Findings
- description: Workspace-scoped agent configuration management
  name: Agent Config
- description: |-
    Controller for managing workspace memberships and roles.
     Handles CRUD operations for workspace members and role assignments.
  name: workspace-membership-controller
- description: Workspace-scoped agent job monitoring
  name: Agent Jobs
- description: "User account management (settings, deletion)"
  name: Account
- description: "Legacy bad practice detection — deprecated, scheduled for removal"
  name: Bad Practices (Deprecated)
- description: Manage practice definitions
  name: Practice Catalog
- description: Workspace-scoped team settings management
  name: Team Settings
- description: Team management within workspace
  name: Teams
- description: Contributor feedback on AI-generated practice findings
  name: Finding Feedback
- description: User profile and activity data
  name: Profile
- description: Contributor rankings and league statistics
  name: Leaderboard
paths:
  /contributors:
    get:
      description: Returns contributors to the Hephaestus project (for the About page)
      operationId: listGlobalContributors
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contributor"
          description: list of contributors sorted by contribution count
      security: []
      summary: List global contributors
      tags:
      - Contributors
  /user:
    delete:
      description: Permanently delete the current user's account and all associated
        data (GDPR)
      operationId: deleteUser
      responses:
        "200":
          description: OK
      summary: Delete user account
      tags:
      - Account
  /user/features:
    get:
      description: Returns all feature flags evaluated for the authenticated user.
        Combines Keycloak role checks and server-side config toggles.
      operationId: getUserFeatures
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureFlags"
          description: Feature flags evaluated successfully
      summary: Get feature flags for the current user
      tags:
      - Account
  /user/settings:
    get:
      description: "Get the current user's notification, research participation, and\
        \ AI review preferences"
      operationId: getUserSettings
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
          description: OK
      summary: Get user settings
      tags:
      - Account
    post:
      description: "Update the current user's notification, research participation,\
        \ and AI review preferences"
      operationId: updateUserSettings
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSettings"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
          description: OK
      summary: Update user settings
      tags:
      - Account
  /workspaces:
    get:
      operationId: listWorkspaces
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceListItem"
          description: Workspace list
      summary: List all workspaces
      tags:
      - workspace-registry
    post:
      operationId: createWorkspace
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
          description: Workspace created
      summary: Create a new workspace
      tags:
      - workspace-registry
  /workspaces/gitlab/groups:
    post:
      operationId: listGitLabGroups
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitLabPreflightRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GitLabGroup"
          description: Accessible groups
      summary: List GitLab groups accessible to a PAT
      tags:
      - workspace-registry
  /workspaces/gitlab/preflight:
    post:
      operationId: gitLabPreflight
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitLabPreflightRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitLabPreflightResponse"
          description: Validation result
      summary: Validate a GitLab PAT before workspace creation
      tags:
      - workspace-registry
  /workspaces/{workspaceSlug}:
    delete:
      operationId: purgeWorkspace
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      responses:
        "204":
          description: Workspace purged
      summary: Purge (soft delete) a workspace
      tags:
      - workspace
    get:
      operationId: getWorkspace
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
          description: Workspace returned
      security: []
      summary: Fetch a workspace by slug
      tags:
      - workspace
  /workspaces/{workspaceSlug}/agent-configs:
    get:
      operationId: getConfigs
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentConfig"
          description: Agent configs returned
      summary: List agent configurations for a workspace
      tags:
      - Agent Config
    post:
      operationId: createConfig
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentConfigRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentConfig"
          description: Agent config created
        "409":
          description: Config name already exists in this workspace
      summary: Create a new agent configuration
      tags:
      - Agent Config
  /workspaces/{workspaceSlug}/agent-configs/{configId}:
    delete:
      operationId: deleteConfig
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - in: path
        name: configId
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "204":
          description: Agent config deleted
        "404":
          description: Agent config not found
        "409":
          description: Cannot delete config with active jobs
      summary: Delete an agent configuration
      tags:
      - Agent Config
    get:
      operationId: getConfig
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - in: path
        name: configId
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentConfig"
          description: Agent config returned
        "404":
          description: Agent config not found
      summary: Get a specific agent configuration
      tags:
      - Agent Config
    patch:
      operationId: updateConfig
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - in: path
        name: configId
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentConfigRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentConfig"
          description: Agent config updated
        "404":
          description: Agent config not found
      summary: Update an existing agent configuration
      tags:
      - Agent Config
  /workspaces/{workspaceSlug}/agent-jobs:
    get:
      operationId: listJobs
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - description: Filter by job status
        in: query
        name: status
        required: false
        schema:
          type: string
          enum:
          - QUEUED
          - RUNNING
          - COMPLETED
          - FAILED
          - TIMED_OUT
          - CANCELLED
      - description: Filter by config ID
        in: query
        name: configId
        required: false
        schema:
          type: integer
          format: int64
      - in: query
        name: page
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - in: query
        name: size
        required: false
        schema:
          type: integer
          format: int32
          default: 20
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageAgentJob"
          description: Paginated job list
      summary: List agent jobs for a workspace
      tags:
      - Agent Jobs
  /workspaces/{workspaceSlug}/agent-jobs/{jobId}:
    get:
      operationId: getJob
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - in: path
        name: jobId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentJob"
          description: Job detail returned
        "404":
          description: Job not found in this workspace
      summary: Get agent job details
      tags:
      - Agent Jobs
  /workspaces/{workspaceSlug}/agent-jobs/{jobId}/cancel:
    post:
      operationId: cancelJob
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - in: path
        name: jobId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentJob"
          description: Job cancelled
        "404":
          description: Job not found in this workspace
        "409":
          description: Job already in terminal state
      summary: Cancel an agent job
      tags:
      - Agent Jobs
  /workspaces/{workspaceSlug}/agent-jobs/{jobId}/delivery/retry:
    post:
      operationId: retryDelivery
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - in: path
        name: jobId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentJob"
          description: Delivery retried
        "404":
          description: Job not found in this workspace
        "409":
          description: Job not in a retryable state
      summary: Retry delivery for a completed agent job
      tags:
      - Agent Jobs
  /workspaces/{workspaceSlug}/bad-practices/badpractice/{id}:
    get:
      deprecated: true
      description: Retrieves details of a specific bad practice by ID
      operationId: getBadPractice
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PullRequestBadPractice"
          description: Bad practice returned
      security: []
      summary: Get a specific bad practice
      tags:
      - Bad Practices (Deprecated)
  /workspaces/{workspaceSlug}/bad-practices/badpractice/{id}/feedback:
    post:
      deprecated: true
      description: Submits user feedback for a detected bad practice
      operationId: provideFeedback
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BadPracticeFeedback"
        required: true
      responses:
        "200":
          description: Feedback submitted successfully
        "403":
          description: User is not an assignee of the pull request
      summary: Provide feedback for a bad practice
      tags:
      - Bad Practices (Deprecated)
  /workspaces/{workspaceSlug}/bad-practices/badpractice/{id}/resolve:
    post:
      deprecated: true
      description: "Updates the state of a bad practice to FIXED, WONT_FIX, or WRONG"
      operationId: resolve
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      - in: query
        name: state
        required: true
        schema:
          type: string
          enum:
          - GOOD_PRACTICE
          - MINOR_ISSUE
          - NORMAL_ISSUE
          - CRITICAL_ISSUE
          - FIXED
          - WONT_FIX
          - WRONG
      responses:
        "200":
          description: Bad practice resolved successfully
      summary: Resolve a bad practice
      tags:
      - Bad Practices (Deprecated)
  /workspaces/{workspaceSlug}/bad-practices/pullrequest/{pullRequestId}:
    get:
      deprecated: true
      description: Retrieves all detected bad practices for a specific pull request
      operationId: getBadPracticesForPullRequest
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - in: path
        name: pullRequestId
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PullRequestWithBadPractices"
          description: Bad practices returned
      security: []
      summary: Get bad practices for a pull request
      tags:
      - Bad Practices (Deprecated)
  /workspaces/{workspaceSlug}/bad-practices/pullrequest/{pullRequestId}/detect:
    post:
      deprecated: true
      description: Triggers bad practice detection for a specific pull request
      operationId: detectForPullRequest
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - in: path
        name: pullRequestId
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetectionResult"
          description: Detection completed successfully
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetectionResult"
          description: Detection failed due to no updates on pull request
      summary: Detect bad practices for a pull request
      tags:
      - Bad Practices (Deprecated)
  /workspaces/{workspaceSlug}/bad-practices/user/{login}:
    get:
      deprecated: true
      description: Retrieves all detected bad practices for pull requests assigned
        to the user
      operationId: getBadPracticesForUser
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - in: path
        name: login
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPractices"
          description: Bad practices returned
      security: []
      summary: Get bad practices for a user
      tags:
      - Bad Practices (Deprecated)
  /workspaces/{workspaceSlug}/bad-practices/user/{login}/detect:
    post:
      deprecated: true
      description: Triggers bad practice detection for all pull requests of the specified
        user
      operationId: detectForUser
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - in: path
        name: login
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetectionResult"
          description: Detection completed successfully
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetectionResult"
          description: Detection failed due to no updates on pull requests
      summary: Detect bad practices for a user
      tags:
      - Bad Practices (Deprecated)
  /workspaces/{workspaceSlug}/leaderboard:
    get:
      description: Creates a ranked contributor list for the specified time range
      operationId: getLeaderboard
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - description: start of the time range (inclusive)
        in: query
        name: after
        required: true
        schema:
          type: string
          format: date-time
      - description: end of the time range (exclusive)
        in: query
        name: before
        required: true
        schema:
          type: string
          format: date-time
      - description: Team filter to apply in INDIVIDUAL mode; ignored when mode is
          TEAM.
        in: query
        name: team
        required: true
        schema:
          type: string
      - description: Determines the ranking metric. In TEAM mode SCORE uses summed
          contribution scores; LEAGUE_POINTS uses total league points.
        in: query
        name: sort
        required: true
        schema:
          type: string
          enum:
          - SCORE
          - LEAGUE_POINTS
      - description: aggregation mode (INDIVIDUAL or TEAM)
        in: query
        name: mode
        required: true
        schema:
          type: string
          enum:
          - INDIVIDUAL
          - TEAM
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"
          description: ranked list of leaderboard entries
      security: []
      summary: Generate leaderboard
      tags:
      - Leaderboard
  /workspaces/{workspaceSlug}/leaderboard/users/{login}/league-stats:
    get:
      description: Computes projected league point changes for a specific user using
        the global leaderboard
      operationId: computeUserLeagueStats
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - description: the user's GitHub login
        in: path
        name: login
        required: true
        schema:
          type: string
      - description: start of the time range (inclusive)
        in: query
        name: after
        required: true
        schema:
          type: string
          format: date-time
      - description: end of the time range (exclusive)
        in: query
        name: before
        required: true
        schema:
          type: string
          format: date-time
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeagueChange"
          description: league change statistics including projected point delta
      security: []
      summary: Calculate user league stats
      tags:
      - Leaderboard
  /workspaces/{workspaceSlug}/league/reset:
    put:
      operationId: resetAndRecalculateLeagues
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      responses:
        "200":
          description: OK
      summary: Reset and recalculate workspace leagues
      tags:
      - workspace
  /workspaces/{workspaceSlug}/members:
    get:
      description: |-
        List all members of the workspace with pagination.
         Accessible to all workspace members (MEMBER role and above).
      operationId: listMembers
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - description: Page number (0-indexed)
        in: query
        name: page
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - description: "Page size (default 50, max 100)"
        in: query
        name: size
        required: false
        schema:
          type: integer
          format: int32
          default: 50
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceMembership"
          description: List of workspace memberships
      security: []
      summary: List all members of the workspace with pagination.
      tags:
      - workspace-membership
  /workspaces/{workspaceSlug}/members/assign:
    post:
      description: |-
        Assign or update a role for a workspace member.
         OWNER can assign any role. ADMIN can assign ADMIN or MEMBER roles.
      operationId: assignRole
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignRoleRequest"
        description: Role assignment request
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMembership"
          description: Updated membership
      summary: Assign or update a role for a workspace member.
      tags:
      - workspace-membership
  /workspaces/{workspaceSlug}/members/me:
    get:
      description: |-
        Get the current user's membership in this workspace.
         Super admins (Keycloak admin realm role) have their effective role elevated to ADMIN
         if their database role is lower, matching the runtime authorization behaviour in
         {@link WorkspaceAccessService WorkspaceAccessService}.
      operationId: getCurrentUserMembership
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMembership"
          description: the current user's membership details with effective role
      security: []
      summary: Get the current user's membership in this workspace.
      tags:
      - workspace-membership
  /workspaces/{workspaceSlug}/members/{userId}:
