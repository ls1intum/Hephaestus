        accountType:
          type: string
          description: Type of account (USER or ORG)
          enum:
          - ORG
          - USER
        displayName:
          type: string
          description: Human-readable name of the workspace
          example: My Workspace
        gitProviderMode:
          type: string
          description: Git provider authentication mode. Defaults to PAT_ORG (GitHub
            PAT) if not specified.
          enum:
          - PAT_ORG
          - GITHUB_APP_INSTALLATION
          - GITLAB_PAT
          example: GITLAB_PAT
        ownerUserId:
          type: integer
          format: int64
          description: User ID of the workspace owner
        personalAccessToken:
          type: string
