# Worker profile overlay — SPRING_PROFILES_ACTIVE=prod,worker.
spring:
    config:
        activate:
            on-profile: worker

    # Worker pod has no user-facing API; Spring's OAuth2 resource-server autoconfig would
    # otherwise force-resolve ${KEYCLOAK_URL}/${KEYCLOAK_REALM} from application-prod.yml and
    # crash at boot if those envs aren't set on the worker compose block.
    autoconfigure:
        exclude:
            - org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration

    main:
        web-application-type: servlet

    liquibase:
        enabled: false
    jpa:
        hibernate:
            ddl-auto: none
    lifecycle:
        timeout-per-shutdown-phase: 6m

server:
    # -1 disables the application HTTP connector; actuator stays on management.server.port.
    port: -1

hephaestus:
    runtime:
        server:
            enabled: false
        webhook:
            enabled: false
        worker:
            enabled: true

    sync:
        nats:
            enabled: false
    agent:
        nats:
            enabled: true

    worker:
        control:
            endpoint: ${HEPHAESTUS_HUB_URL:}
            registration-token: ${HEPHAESTUS_WORKER_REGISTRATION_TOKEN:}
        # BYO LLM credentials override the app-pod proxy when both fields are set.
        llm:
            base-url: ${HEPHAESTUS_LLM_BASE_URL:}
            api-key: ${HEPHAESTUS_LLM_API_KEY:}
