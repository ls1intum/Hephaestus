query GetProjectIssues($fullPath: ID!, $first: Int!, $after: String, $updatedAfter: Time) {
    project(fullPath: $fullPath) {
        issues(first: $first, after: $after, updatedAfter: $updatedAfter, sort: UPDATED_DESC) {
            count
            pageInfo {
                hasNextPage
                endCursor
            }
            nodes {
                id
                iid
                title
                description
                state
                confidential
                webUrl
                createdAt
                updatedAt
                closedAt
                type
                closedAsDuplicateOf {
                    id
                }
                milestone {
                    id
                    iid
                }
                author {
                    ...GitLabUserFields
                }
                labels(first: 100) {
                    count
                    pageInfo {
                        hasNextPage
                        endCursor
                    }
                    nodes {
                        id
                        title
                        color
                    }
                }
                assignees(first: 20) {
                    count
                    pageInfo {
                        hasNextPage
                        endCursor
                    }
                    nodes {
                        ...GitLabUserFields
                    }
                }
                userNotesCount
            }
        }
    }
}
