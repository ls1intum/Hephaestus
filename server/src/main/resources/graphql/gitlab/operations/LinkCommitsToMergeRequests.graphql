query LinkCommitsToMergeRequests($fullPath: ID!, $first: Int!, $after: String, $updatedAfter: Time) {
    project(fullPath: $fullPath) {
        mergeRequests(first: $first, after: $after, updatedAfter: $updatedAfter, sort: UPDATED_DESC) {
            pageInfo {
                hasNextPage
                endCursor
            }
            nodes {
                iid
                state
                commitsWithoutMergeCommits(first: 100) {
                    pageInfo {
                        hasNextPage
                        endCursor
                    }
                    nodes {
                        sha
                        authorEmail
                        authorName
                        author {
                            id
                            username
                        }
                    }
                }
            }
        }
    }
}
