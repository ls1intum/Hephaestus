# Resolves the GraphQL Global ID for an issue.
# Used by GitlabFeedbackChannel (noteableId for the generic createNote mutation) so
# practice-review feedback can be posted as an issue comment, mirroring the MR path.

query GetIssueGlobalId($fullPath: ID!, $iid: String!) {
    project(fullPath: $fullPath) {
        issue(iid: $iid) {
            id
        }
    }
}
