query GetIssueAssignees($fullPath: ID!, $iid: String!, $first: Int!, $after: String) {
    project(fullPath: $fullPath) {
        issues(iids: [$iid]) {
            nodes {
                assignees(first: $first, after: $after) {
                    count
                    pageInfo {
                        hasNextPage
                        endCursor
                    }
                    nodes {
                        ...GitLabUserFields
                    }
                }
            }
        }
    }
}
