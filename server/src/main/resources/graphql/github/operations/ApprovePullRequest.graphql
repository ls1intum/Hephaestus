# Submits an APPROVE review on a pull request.
# Used by ApprovalChannel.approve — neutral verdict expressed as an explicit approval.

mutation ApprovePullRequest($pullRequestId: ID!, $body: String) {
    addPullRequestReview(input: {
        pullRequestId: $pullRequestId,
        body: $body,
        event: APPROVE
    }) {
        pullRequestReview {
            id
        }
    }
}
