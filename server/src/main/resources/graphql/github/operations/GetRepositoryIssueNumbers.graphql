# Full upstream issue-number listing for one repository — the upstream half of the RECONCILIATION
# deletion sweep's set difference (GitHubDeletionSweepService).
#
# Selects `number` and nothing else: this is deliberately the cheapest possible complete enumeration
# (~1 rate-limit point per page of 100, vs ~59 for one page of GetRepositoryIssues, which drags in
# comments/projectItems/assignees/labels). The sweep needs the key set, never the content.
#
# `totalCount` is load-bearing, not decoration: the sweep compares it against the number of nodes it
# actually received and refuses to delete anything unless the two agree. Without it, a listing that
# silently stopped short would be indistinguishable from a repository that really has fewer issues —
# and would authorize deleting every issue past the truncation point.
#
# `__typename` is selected because GHIssue inherits a `@JsonTypeInfo(property = "__typename")` type
# resolver from GHProjectV2ItemContent's Jackson mixin. Omitting it happens to decode anyway — that
# mixin's `defaultImpl` is GHIssue, so the fallback lands on the right type by luck rather than by
# construction. Selecting it explicitly costs nothing (it is a meta field) and removes the reliance
# on a default that exists for an unrelated reason; the pull-request twin of this query has no such
# luck and hard-failed for exactly this reason.
#
# No `filterBy: {since:}` and no `states:` — a sweep must see EVERY issue that exists upstream,
# including ancient and closed ones. Any filter here turns "absent from upstream" into "absent from
# this filtered view", which is precisely how a sweep deletes live data.
query GetRepositoryIssueNumbers($owner: String!, $name: String!, $first: Int!, $after: String) {
    rateLimit {
        cost
        limit
        remaining
        resetAt
    }
    repository(owner: $owner, name: $name) {
        issues(first: $first, after: $after, orderBy: { field: CREATED_AT, direction: ASC }) {
            totalCount
            pageInfo {
                hasNextPage
                endCursor
            }
            nodes {
                __typename
                number
            }
        }
    }
}
