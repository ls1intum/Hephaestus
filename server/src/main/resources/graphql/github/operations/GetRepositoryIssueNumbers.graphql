# Full upstream issue-number listing for one repository — the upstream half of the RECONCILIATION
# deletion sweep's set difference (GitHubDeletionSweepService).
#
# Selects `number` and nothing else: this is deliberately the cheapest possible complete enumeration
# (~1 rate-limit point per page of 100, vs ~59 for one page of GetRepositoryIssues, which drags in
# comments/projectItems/assignees/labels). The sweep needs the key set, never the content.
#
# `totalCount` guards the sweep: it is compared against the number of nodes actually received, and
# nothing is deleted unless the two agree. Without it, a listing that silently stopped short would be
# indistinguishable from a repository that really has fewer issues — and would authorize deleting
# every issue past the truncation point.
#
# `__typename` is selected so each node decodes deterministically. GHIssue inherits a
# `@JsonTypeInfo(property = "__typename")` resolver from GHProjectV2ItemContent's Jackson mixin whose
# `defaultImpl` is GHIssue, so an issue node would decode without it — but only by falling back to a
# default that exists for an unrelated reason. Selecting it (a free meta field) removes that reliance;
# the pull-request listing has no such default and requires it to decode at all.
#
# No `filterBy: {since:}` and no `states:` — a sweep must see EVERY issue that exists upstream,
# including ancient and closed ones. Any filter here turns "absent from upstream" into "absent from
# this filtered view", which is precisely how a sweep deletes live data.
# `hasIssuesEnabled` guards a failure `totalCount` cannot catch. A repository
# whose Issues feature is switched off still answers this connection — with zero nodes and
# `totalCount: 0` — so `0 == 0` passes the cross-check and the sweep would tombstone every mirrored
# issue of a repository whose issues are merely switched off, not deleted (turning the feature back on
# returns all of them). The sweep refuses the listing when this flag is explicitly false.
query GetRepositoryIssueNumbers($owner: String!, $name: String!, $first: Int!, $after: String) {
    rateLimit {
        cost
        limit
        remaining
        resetAt
    }
    repository(owner: $owner, name: $name) {
        hasIssuesEnabled
        issues(first: $first, after: $after, orderBy: { field: CREATED_AT, direction: ASC }) {
            totalCount
            pageInfo {
                hasNextPage
                endCursor
            }
            nodes {
                __typename
                number
            }
        }
    }
}
