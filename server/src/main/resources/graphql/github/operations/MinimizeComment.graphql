# Minimizes (hides as OUTDATED) a pull request review comment.
# Used by GithubInlineFindingChannel#clearStaleFindings to collapse the anchor comment
# of a bot review thread the current run no longer emits — GitHub reviews are
# append-only, so a stale thread cannot be deleted, only minimized.

mutation MinimizeComment($subjectId: ID!, $classifier: ReportedContentClassifiers!) {
    minimizeComment(input: { subjectId: $subjectId, classifier: $classifier }) {
        minimizedComment {
            __typename
        }
    }
}
