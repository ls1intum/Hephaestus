spring:
    docker:
        compose:
            enabled: false
            lifecycle-management: none
            skip:
                in-tests: true
    liquibase:
        enabled: false
    datasource:
        url: jdbc:h2:mem:hephaestus-specs;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_LOWER=TRUE
        username: sa
        password: ""
        driver-class-name: org.h2.Driver
    jpa:
        hibernate:
            # No schema is created: spec generation introspects controllers, never the DB, and MUST NOT
            # read it at startup. Safe today — the only boot-time repository touch (AuthJwtConfig signing-key
            # seed) swallows its failure, AuthEventPartitionManager runs on ApplicationReadyEvent and
            # swallows, WorkspaceStartupListener is @Profile("!specs"), and specs configures no login
            # providers. A future NON-swallowed boot-time repository read will break spec-gen with a
            # cryptic "table not found".
            ddl-auto: none
        properties:
            hibernate:
                dialect: org.hibernate.dialect.H2Dialect

hephaestus:
    # OpenAPI generation boots the full Spring context; HmacOAuthStateService fails fast
    # without a webhook/oauth-state secret. Use a deterministic placeholder for the spec run.
    webhook:
        secret: "specs-only-placeholder-secret-do-not-use-in-prod"
    # Enable Slack admin endpoints so they surface in the generated client. The OAuth
    # client itself isn't called during the spec run — just the controller is loaded.
    integration:
        slack:
            enabled: true
            client-id: "specs-only-placeholder-client-id"
            client-secret: "specs-only-placeholder-client-secret"
    workspace:
        init-default: false
    mail:
        enabled: false
        sender: noreply@example.com
    sync:
        nats:
            enabled: false
            server: "nats://localhost:4222"
    agent:
        nats:
            enabled: false
            server: "nats://localhost:4222"
