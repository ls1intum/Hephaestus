spring:
    # Pin written by release-pin-fetcher (docker/compose.app.yaml).
    # AgentImagePinGuard fails closed in prod if missing.
    config:
        import: optional:file:/pin/release-pin.yaml

    datasource:
        url: jdbc:${DATABASE_URL}
        username: ${DATABASE_USERNAME}
        password: ${DATABASE_PASSWORD}
    jpa:
        hibernate:
            ddl-auto: none
    liquibase:
        contexts: prod

    # No resourceserver.jwt.issuer-uri in prod: tokens are issued + verified by Hephaestus
    # itself (core.auth). Required prod env: HEPHAESTUS_AUTH_ISSUER,
    # HEPHAESTUS_AUTH_STATE_COOKIE_KEY, HEPHAESTUS_TRUSTED_PROXIES, GITHUB_OAUTH_CLIENT_ID/SECRET,
    # GITLAB_LRZ_OAUTH_CLIENT_ID/SECRET. Designate instance super-admins via
    # HEPHAESTUS_AUTH_BOOTSTRAP_ADMINS (comma-separated <provider>:<subject>, e.g.
    # github:1234567,gitlab-lrz:42) — promoted to APP_ADMIN on login; optional one-time
    # HEPHAESTUS_AUTH_BOOTSTRAP_TOKEN enables the break-glass POST /auth/bootstrap-admin.
    # See ADR 0017 + docs/runbooks/auth-cutover.md (First instance admin).

    # Belt-and-suspenders: the spring-boot-docker-compose jar ships in the image (it powers the
    # local profile), and Boot's default is enabled=true. Prod brings infra up via docker/compose.*
    # on the host, never from inside the app container, so explicitly disable Boot's auto-start
    # instead of relying on "no compose.yaml happens to be in the workdir".
    docker:
        compose:
            enabled: false

server:
    forward-headers-strategy: native
    tomcat:
        # Proxy trust for RemoteIpValve (activated by forward-headers-strategy: native).
        # Boot's DEFAULT internal-proxies trusts ALL of RFC-1918 (10/8, 172.16/12, 192.168/16,
        # 169.254/16, 127/8). Behind in-cluster ingress the pod peer is itself in-range, so a client
        # could spoof X-Forwarded-For and forge getRemoteAddr(), defeating the pre-auth IP rate-limit
        # buckets (AuthRateLimitFilter.clientIp). Pin to the real ingress address(es) instead.
        # HEPHAESTUS_TRUSTED_PROXIES is a Tomcat internal-proxies REGEX (NOT CIDR) — e.g. the single
        # ingress address or a tight subnet pattern. ProxyTrustGuard fails the boot if this is left at
        # the wildcard default in prod.
        remoteip:
            # Empty default so an unset env produces ProxyTrustGuard's clear fail-fast (not a raw
            # placeholder-resolution error). The guard rejects a blank value in prod+native.
            internal-proxies: ${HEPHAESTUS_TRUSTED_PROXIES:}
            remote-ip-header: X-Forwarded-For
            protocol-header: X-Forwarded-Proto
        redirect-context-root: false
        accesslog:
            enabled: true
            directory: /var/log/hephaestus/access
            prefix: access
            suffix: .log
            file-date-format: .yyyy-MM-dd
            max-days: 14
            pattern: "%{yyyy-MM-dd'T'HH:mm:ssXXX}t %a %m %U %H %s %b %D"

hephaestus:
    host-url: ${APPLICATION_HOST_URL}

    cors:
        allowed-origins:
            - ${APPLICATION_HOST_URL}

    webapp:
        url: ${APPLICATION_HOST_URL}

    leaderboard:
        schedule:
            day: ${LEADERBOARD_SCHEDULE_DAY:2}
            time: ${LEADERBOARD_SCHEDULE_TIME:9}
        notification:
            # Per-workspace channel + team filter live on the Slack Connection's SlackConfig
            # (set via the connection admin API); this flag is the global kill-switch.
            enabled: ${LEADERBOARD_NOTIFICATION_ENABLED:true}

    workspace:
        init-default: false

    posthog:
        enabled: ${POSTHOG_ENABLED:false}
        api-host: ${POSTHOG_API_HOST:https://app.posthog.com}
        project-id: ${POSTHOG_PROJECT_ID:}
        personal-api-key: ${POSTHOG_PERSONAL_API_KEY:}

    # ═══════════════════════════════════════════════════════════════════════════
    # SCM + SLACK INTEGRATION (Production)
    #
    # Slack: per-workspace bot tokens are issued via OAuth and encrypted at rest in the
    # `connection` table — there is no global bot token. Slack is outbound-only (leaderboard
    # digest + test message); no inbound webhook secret is required.
    # ═══════════════════════════════════════════════════════════════════════════
    integration:
        github:
            app:
                # Set to 0 to disable GitHub App mode and use Personal Access Tokens instead
                id: ${GH_APP_ID:0}
                privateKeyLocation: ${GH_APP_PRIVATE_KEY_LOCATION:}
                privateKey: ${GH_APP_PRIVATE_KEY:}
            meta:
                auth-token: ${GH_AUTH_TOKEN:}

    sync:
        run-on-startup: ${MONITORING_RUN_ON_STARTUP:true}
        timeframe-days: ${MONITORING_TIMEFRAME:7}
        cron: ${MONITORING_SYNC_CRON:0 0 * * * *}
        cooldown-minutes: ${MONITORING_SYNC_COOLDOWN_IN_MINUTES:60}
        backfill:
            enabled: ${MONITORING_BACKFILL_ENABLED:true}
            batch-size: ${MONITORING_BACKFILL_BATCH_SIZE:50}
            rate-limit-threshold: ${MONITORING_BACKFILL_RATE_LIMIT_THRESHOLD:500}
            interval-seconds: ${MONITORING_BACKFILL_INTERVAL_SECONDS:60}
        nats:
            enabled: ${NATS_ENABLED:false}
            server: ${NATS_SERVER:}
            durable-consumer-name: ${NATS_DURABLE_CONSUMER_NAME:}

    # ═══════════════════════════════════════════════════════════════════════════
    # AUTH (Production) — Hephaestus-native, see ADR 0017
    # ═══════════════════════════════════════════════════════════════════════════
    auth:
        issuer: ${HEPHAESTUS_AUTH_ISSUER}
        state-cookie-key: ${HEPHAESTUS_AUTH_STATE_COOKIE_KEY}

    # ═══════════════════════════════════════════════════════════════════════════
    # GITLAB INTEGRATION (Production)
    # ═══════════════════════════════════════════════════════════════════════════
    # Enabled via GITLAB_ENABLED env var; defaults come from base application.yml.

    # ═══════════════════════════════════════════════════════════════════════════
    # AGENT SANDBOX & PRACTICE REVIEW (Production)
    # ═══════════════════════════════════════════════════════════════════════════
    # Sandbox, agent NATS, git checkout, and LLM proxy are configured via env
    # vars in compose.app.yaml. Defaults come from base application.yml.
    # The only prod-specific overrides go here (storage path for git repos).
    git:
        storage-path: ${GIT_STORAGE_PATH:/data/git-repos}

    # See docs/admin/agent-image-digests.md.
    agent:
        image:
            require-digest: true

    # ═══════════════════════════════════════════════════════════════════════════
    # SENTRY ERROR TRACKING (Production)
    # ═══════════════════════════════════════════════════════════════════════════
    sentry:
        dsn: ${SENTRY_DSN}
