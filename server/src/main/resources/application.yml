spring:
    application:
        name: Hephaestus
        version: "${APP_VERSION:0.0.0-development}"

    config:
        import: optional:file:.env[.properties]

    threads:
        virtual:
            enabled: true

    # Virtual threads are always daemons. With virtual threads enabled, both the request executor
    # and the @Scheduled TaskScheduler use them — so no non-daemon thread remains after main().
    # keep-alive registers one to hold the JVM open between cron firings.
    main:
        keep-alive: true

    datasource:
        url: jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/hephaestus
        username: ${DB_USERNAME:root}
        password: ${DB_PASSWORD:root}
        hikari:
            connection-timeout: 45000
            idle-timeout: 600000
            max-lifetime: 1800000
            maximum-pool-size: 30
            minimum-idle: 5

    jpa:
        hibernate:
            # Liquibase owns DDL across every profile. `validate` makes drift fail-fast at boot;
            # prod overrides to `none` in application-prod.yml. Fresh local DB after schema change:
            # `docker compose down -v && docker compose up -d`.
            ddl-auto: validate
        # Repository queries complete in the service layer; no lazy loading during view rendering.
        open-in-view: false

        # show-sql: "true"
        properties:
            hibernate:
                # `show-sql: true` is the trigger; `format_sql` only matters then. Default off avoids
                # the formatter pass on every statement.
                format_sql: "false"
                jdbc:
                    batch_size: 50
                order_inserts: true
                order_updates: true

    # Repository proxy verification deferred to ContextRefreshedEvent (still before readiness).
    data:
        jpa:
            repositories:
                bootstrap-mode: deferred

    liquibase:
        change-log: classpath:db/master.xml
        # Gates `context="backfill"` one-shot changesets; prod overrides to `prod`.
        contexts: dev

    security:
        oauth2:
            resourceserver:
                jwt:
                    issuer-uri: http://localhost:${KEYCLOAK_PORT:8081}/realms/hephaestus

    # Disable Mustache template location check as we don't use Mustache templates
    mustache:
        check-template-location: false

    jackson:
        default-property-inclusion: non_null
        deserialization:
            fail-on-unknown-properties: false
            fail-on-null-for-primitives: false
        time-zone: UTC
        datatype:
            datetime:
                write-dates-as-timestamps: false

    # GraphQL client configuration for GitHub API operations
    # Operations are colocated with the schema at graphql/github/operations/
    graphql:
        client:
            document-locations: classpath:graphql/github/operations/

    # Graceful shutdown drains in-flight requests before terminating; pairs with server.shutdown
    # below. Coolify's default stop-grace is 10s — bump to 30s in the deploy substrate.
    lifecycle:
        timeout-per-shutdown-phase: ${SHUTDOWN_TIMEOUT:20s}

server:
    port: ${SERVER_PORT:8080}
    shutdown: graceful

# Actuator on the management port; health probes for Kubernetes liveness/readiness.
management:
    server:
        port: ${MANAGEMENT_PORT:8080}
    endpoints:
        web:
            exposure:
                include: health,info,prometheus,metrics
            base-path: /actuator
    endpoint:
        health:
            show-details: when_authorized
            probes:
                enabled: true
        # Disable potentially sensitive endpoints
        env:
            enabled: false
        beans:
            enabled: false
        configprops:
            enabled: false
    health:
        livenessState:
            enabled: true
        readinessState:
            enabled: true

springdoc:
    default-produces-media-type: application/json
    writer-with-order-by-keys: true

hephaestus:
    host-url: https://hephaestus.ase.cit.tum.de/

    # ═══════════════════════════════════════════════════════════════════════════
    # RUNTIME ROLES (single JAR, deploy-config-selected mode)
    # ═══════════════════════════════════════════════════════════════════════════
    # Three property keys (see ADR 0005 baseline + ADR 0008 webhook role):
    #   server  — WIRED. Gates ServerSchedulingConfig (@EnableScheduling),
    #     NatsConsumerService (sync NATS pull consumer), and WorkspaceStartupListener.
    #     Setting false silences all @Scheduled methods and prevents workspace bootstrap.
    #   worker  — WIRED. Gates DockerSandboxConfiguration + AgentNatsConsumerConfig.
    #     Setting false removes the Docker sandbox runtime + agent NATS pull consumer.
    #   webhook — WIRED. Gates the gitprovider.webhook receiver (controllers, HMAC
    #     verifier, JetStream publisher, stream bootstrap, health, lifecycle).
    #     The webhook-server production container deploys with server=false + worker=false
    #     + webhook=true so it runs webhook reception in isolation — restart-independent
    #     from application-server. See ADR 0008.
    # All three default true → single-JVM monolith (the dev + initial prod topology).
    runtime:
        server:
            enabled: ${HEPHAESTUS_RUNTIME_SERVER_ENABLED:true}
        worker:
            enabled: ${HEPHAESTUS_RUNTIME_WORKER_ENABLED:true}
        webhook:
            enabled: ${HEPHAESTUS_RUNTIME_WEBHOOK_ENABLED:true}

    # ═══════════════════════════════════════════════════════════════════════════
    # TENANCY ENFORCEMENT (WorkspaceStatementInspector)
    # ═══════════════════════════════════════════════════════════════════════════
    # SQL-layer enforcement that every query against a workspace-scoped table
    # carries a workspace_id predicate. See core/tenancy/* and ADR 0004.
    #
    #   throw — TenancyViolationException on violations (fail loud; default in test)
    #   log   — log + Micrometer counter, query passes (default outside test —
    #           one calendar week of clean counter readings before flipping to throw
    #           in prod)
    #   off   — disable inspection (only for perf debugging)
    tenancy:
        enforcement: ${HEPHAESTUS_TENANCY_ENFORCEMENT:log}

    # ═══════════════════════════════════════════════════════════════════════════
    # SYNC CONFIGURATION
    # ═══════════════════════════════════════════════════════════════════════════
    # Settings for GitHub data synchronization operations.
    # These control GraphQL timeouts and incremental sync behavior.
    sync:
        # Timeout for standard GraphQL operations (default: 30s)
        # Accepts duration format: 60s, 1m, PT60S
        # Increase if experiencing timeouts on large repositories
        graphql-timeout: ${HEPHAESTUS_SYNC_GRAPHQL_TIMEOUT:60s}
        # Extended timeout for complex operations like review comments (default: 60s)
        # Accepts duration format: 120s, 2m, PT2M
        extended-graphql-timeout: ${HEPHAESTUS_SYNC_EXTENDED_GRAPHQL_TIMEOUT:120s}
        # Delay between pagination requests (default: 200ms)
        # Accepts duration format: 200ms, PT0.2S
        # Reduces 502/504 errors caused by rapid-fire complex queries
        pagination-throttle: ${HEPHAESTUS_SYNC_PAGINATION_THROTTLE:200ms}
        # Whether to use incremental sync based on last sync timestamp (default: true)
        # When enabled, only issues/PRs updated since last sync are fetched
        # This significantly reduces API calls for active repositories
        incremental-sync-enabled: ${HEPHAESTUS_SYNC_INCREMENTAL_ENABLED:true}
        # Safety buffer subtracted from last sync timestamp (default: 5m)
        # Handles clock skew between application server and GitHub
        # Ensures items updated just before the recorded timestamp are still fetched
        # Accepts duration format: 5m, 300s, PT5M
        incremental-sync-buffer: ${HEPHAESTUS_SYNC_INCREMENTAL_BUFFER:5m}
        # Timeout for historical backfill operations (default: 120s)
        # Needs to be longer than regular timeout for large repositories
        # because backfill responses include embedded reviews/threads/comments
        backfill-graphql-timeout: ${HEPHAESTUS_SYNC_BACKFILL_TIMEOUT:120s}
        # Page size for pull request backfill queries (default: 10)
        # Smaller than regular PR sync because backfill includes embedded
        # reviews/threads/comments which creates very large responses
        backfill-pr-page-size: ${HEPHAESTUS_SYNC_BACKFILL_PR_PAGE_SIZE:10}
        run-on-startup: true
        # Fetching timeframe in days for recent data sync
        timeframe-days: 7
        cron: "0 0 3 * * *"
        # Cooldown in minutes before running the monitoring again
        cooldown-minutes: 15
        # ═══════════════════════════════════════════════════════════════════════════
        # BACKFILL CONFIGURATION
        # ═══════════════════════════════════════════════════════════════════════════
        # Historical data synchronization settings for ISSUES and PULL REQUESTS only.
        # When enabled, backfill runs AFTER recent sync completes, in small batches
        # to avoid exhausting GitHub API rate limits.
        #
        # NOTE: Backfill does NOT affect GitHub Projects V2 sync. Projects are always
        # fully synced during incremental sync because:
        # 1. GitHub API doesn't support server-side filtering for project items
        # 2. Project items are metadata views on issues/PRs, not source data
        # 3. Subsequent syncs use client-side incremental filtering (skip unchanged items)
        backfill:
            # Whether to backfill historical issues and pull requests
            enabled: false
            # Number of pages to sync per repository per cycle (default: 25)
            batch-size: 25
            # Minimum rate limit remaining before backfill runs (default: 500)
            # Backfill skips if remaining < threshold to preserve rate limit for real-time sync
            rate-limit-threshold: 500
            # Seconds between backfill cycles (default: 60)
            # Rate limit is the actual throttle - cycles run frequently to maximize throughput
            interval-seconds: 60
        # ═══════════════════════════════════════════════════════════════════════════
        # DEVELOPMENT FILTERS
        # ═══════════════════════════════════════════════════════════════════════════
        # Limit which organizations/repositories are actively synced.
        # Useful in development to avoid syncing hundreds of repos from GitHub App installations.
        #
        # Empty lists = no filtering (production behavior, sync everything)
        # Non-empty = only sync matching items
        #
        # Configure these in application-local.yml for development:
        #   hephaestus:
        #     sync:
        #       filters:
        #         allowed-organizations:
        #           - ls1intum
        #           - HephaestusTest
        #         allowed-repositories:
        #           - ls1intum/Hephaestus
        #           - ls1intum/Artemis
        # ═══════════════════════════════════════════════════════════════════════════
        # Note: filters.allowed-organizations and filters.allowed-repositories are
        # intentionally not defined here to allow profile-specific overrides.
        # Configure them in application-local.yml for development filtering.
        # ═══════════════════════════════════════════════════════════════════════════
        # NATS CONFIGURATION
        # ═══════════════════════════════════════════════════════════════════════════
        nats:
            enabled: false
            replay-timeframe-days: 7
            durable-consumer-name: ""
            server: ""
            consumer:
                # How long to wait for acknowledgment before redelivery (Duration format: 5m, PT5M, etc.)
                ack-wait: 5m
                # Maximum pending unacknowledged messages per consumer (1-10000)
                max-ack-pending: 500
                # ═══════════════════════════════════════════════════════════════════════════
                # HEARTBEAT CONFIGURATION (tuned for remote/WAN NATS connections)
                # ═══════════════════════════════════════════════════════════════════════════
                # Idle heartbeat: Server sends heartbeats when no data is available.
                # Default NATS client uses 15s which is too aggressive for remote servers.
                # 30s+ recommended for cloud/WAN connections to tolerate latency spikes.
                # Alarm fires after ~3x this interval without server contact.
                idle-heartbeat: 30s
                # Number of consecutive heartbeat alarms before triggering consumer restart.
                # With 30s idle heartbeat, alarms fire every ~90s when stuck.
                # Threshold of 60 means restart after ~90 minutes of no progress.
                # This tolerates extended idle periods (no GitHub events) without false positives.
                heartbeat-restart-threshold: 60
                # Minimum interval between heartbeat alarm log messages (Duration format: 5m, PT5M, etc.)
                # Prevents log spam while still providing visibility
                heartbeat-log-interval: 5m
                # ═══════════════════════════════════════════════════════════════════════════
                # Delay between reconnection attempts (Duration format: 2s, PT2S, etc.)
                reconnect-delay: 2s
                # Request timeout for JetStream API calls (Duration format: 60s, PT60S, etc.)
                # Increase for workspaces with many repositories
                request-timeout: 60s

    cors:
        allowed-origins:
            - ${APPLICATION_HOST_URL:http://localhost:4200}

    # ═══════════════════════════════════════════════════════════════════════════
    # LOCAL GIT REPOSITORY STORAGE
    # ═══════════════════════════════════════════════════════════════════════════
    # When enabled, repositories are cloned as bare git repos for file-level
    # commit analysis. The Pi agent reads these repos directly inside the sandbox.
    git:
        # Whether local git checkout is enabled (default: false)
        enabled: ${GIT_CHECKOUT_ENABLED:false}
        # Base path for bare git repositories
        # Each repo stored at: {storage-path}/{repositoryId}.git
        storage-path: ${GIT_STORAGE_PATH:/data/git-repos}

    webapp:
        url: ${APPLICATION_HOST_URL:http://localhost:4200}

    leaderboard:
        schedule:
            day: 2
            time: "9:00"
        notification:
            enabled: false
            team: "all"
            channel-id: ""
            # Workspace slugs opted in to Slack notifications. Temporary allowlist while the
            # global Slack channel/token is shared across tenants — remove once per-workspace
            # Slack routing lands.
            workspace-slugs: []
        # PR authors whose assignee-reviewers don't earn points (e.g., AI bots)
        self-review-author-logins:
            - Copilot

    # ═══════════════════════════════════════════════════════════════════════════
    # WORKSPACE CONFIGURATION
    # ═══════════════════════════════════════════════════════════════════════════
    # Hephaestus supports two GitHub authentication modes:
    #
    # 1. GITHUB APP MODE (recommended for production)
    #    - Workspaces are automatically created from GitHub App installations
    #    - Repository monitors are managed by installation events (webhooks)
    #    - Configure: github.app.id and github.app.privateKey
    #    - Set init-default: false (workspaces come from installations)
    #
    # 2. PAT MODE (recommended for local development)
    #    - A single workspace is bootstrapped from configuration below
    #    - You manually specify which repositories to monitor
    #    - Configure: hephaestus.workspace.default.token
    #    - Set init-default: true
    #
    # The init-default setting only affects PAT-based workspace creation.
    # GitHub App installations are always processed regardless of this setting.
    # ═══════════════════════════════════════════════════════════════════════════
    workspace:
        # Set to true to bootstrap a PAT workspace on startup (for local development)
        # Set to false in production when using GitHub App installations
        init-default: true
        slug:
            # TTL (in days) for slug redirects; set to 0 to disable redirects while preserving history
            redirect:
                ttl-days: 30
        default:
            # GitHub organization or user login for the PAT workspace
            login: ${GITHUB_PAT_LOGIN:ls1intum}
            # Personal Access Token with repo, read:org, and read:user scopes
            token: ${GITHUB_PAT:}
            # Repositories to monitor (PAT mode always uses explicit list)
            repositories-to-monitor:
                - ls1intum/Hephaestus
                - ls1intum/Artemis
        # Set to true to bootstrap a GitLab PAT workspace on startup (for local development)
        init-gitlab-default: ${GITLAB_WORKSPACE_INIT_DEFAULT:false}
        gitlab-default:
            # GitLab group full path (e.g., my-org/my-team)
            login: ${GITLAB_GROUP_PATH:}
            # GitLab Group or Personal Access Token
            token: ${GITLAB_PAT:}
            # Custom server URL for self-hosted GitLab (optional, defaults to https://gitlab.com)
            server-url: ${GITLAB_SERVER_URL:}

    cache:
        contributors:
            # Eviction rate in milliseconds (1 hour)
            evict-rate: 3600000
        leaderboard-xp:
            # Eviction rate in milliseconds (60 seconds - leaderboard data is moderately hot)
            evict-rate: 60000

    # ═══════════════════════════════════════════════════════════════════════════
    # FEATURE FLAGS (operational / development toggles)
    # ═══════════════════════════════════════════════════════════════════════════
    # CONFIG-backed feature flags evaluated by FeatureFlagService.
    # ROLE-backed flags (mentor_access, admin, etc.) are managed in Keycloak.
    features:
        flags:
            practice-review-for-all: false
            gitlab-workspace-creation: false

    # ═══════════════════════════════════════════════════════════════════════════
    # PRACTICE REVIEW GATE
    # ═══════════════════════════════════════════════════════════════════════════
    # Controls the detection gate for the practice-aware PR review agent.
    # The gate decides whether to submit an agent job for a PR event.
    practice-review:
        # true = run for ALL users (bypass Keycloak role check); false = require run_practice_review role
        run-for-all-users: ${PRACTICE_REVIEW_RUN_FOR_ALL:false}
        # true = skip practice review for draft PRs
        skip-drafts: ${PRACTICE_REVIEW_SKIP_DRAFTS:true}
        # whether to deliver feedback to already-merged PRs
        deliver-to-merged: ${PRACTICE_REVIEW_DELIVER_TO_MERGED:false}
        # base URL of the Hephaestus app (for preferences footer link); empty = no link
        app-base-url: ${PRACTICE_REVIEW_APP_BASE_URL:}
        # minimum minutes between reviews for the same PR (0 = no cooldown)
        cooldown-minutes: ${PRACTICE_REVIEW_COOLDOWN_MINUTES:15}

    posthog:
        enabled: ${POSTHOG_ENABLED:false}
        api-host: ${POSTHOG_API_HOST:https://app.posthog.com}
        project-id: ${POSTHOG_PROJECT_ID:}
        personal-api-key: ${POSTHOG_PERSONAL_API_KEY:}

    # ═══════════════════════════════════════════════════════════════════════════
    # SANDBOX CONFIGURATION
    # ═══════════════════════════════════════════════════════════════════════════
    # Docker sandbox for running coding agent containers in isolation.
    # Disabled by default — requires a reachable Docker daemon.
    # Deployment requirements:
    #   - Docker Engine >= 25.0.5 (CVE-2024-29018 fix)
    #   - iptables -I DOCKER-USER -d 169.254.0.0/16 -j DROP (cloud metadata blocking)
    #   - Recommended: Tecnativa docker-socket-proxy with EXEC=0
    # ═══════════════════════════════════════════════════════════════════════════
    # LLM PROXY CONFIGURATION
    # ═══════════════════════════════════════════════════════════════════════════
    # Upstream provider URLs for the LLM proxy. Override these for Azure OpenAI,
    # testing with WireMock, or alternative API-compatible endpoints.
    llm-proxy:
        anthropic-upstream-url: ${LLM_PROXY_ANTHROPIC_URL:https://api.anthropic.com}
        openai-upstream-url: ${LLM_PROXY_OPENAI_URL:https://api.openai.com}
        # For Azure OpenAI, set openai-auth-header=api-key and openai-use-bearer-prefix=false
        openai-auth-header: ${LLM_PROXY_OPENAI_AUTH_HEADER:Authorization}
        openai-use-bearer-prefix: ${LLM_PROXY_OPENAI_USE_BEARER:true}
        # Dedicated Azure OpenAI route used by the sandboxed Pi agent
        azure-openai-upstream-url: ${LLM_PROXY_AZURE_OPENAI_URL:}
        azure-openai-auth-header: ${LLM_PROXY_AZURE_OPENAI_AUTH_HEADER:api-key}
        azure-openai-use-bearer-prefix: ${LLM_PROXY_AZURE_OPENAI_USE_BEARER:false}

    sandbox:
        # Capability flag (not a role): worker-internal LLM proxy controller. Stays on
        # the coordinator by default (BYO trust model — see ADR 0006). Future managed-mode
        # workers opt in by setting this on the worker pod and false on the server pod.
        llm-proxy:
            enabled: ${HEPHAESTUS_SANDBOX_LLM_PROXY_ENABLED:true}
        enabled: ${SANDBOX_ENABLED:false}
        docker-host: ${SANDBOX_DOCKER_HOST:unix:///var/run/docker.sock}
        tls-verify: ${SANDBOX_TLS_VERIFY:false}
        max-concurrent-containers: ${SANDBOX_MAX_CONCURRENT:5}
        container-stop-timeout-seconds: ${SANDBOX_STOP_TIMEOUT:10}
        reconciliation-interval-seconds: ${SANDBOX_RECONCILIATION_INTERVAL:60}
        # OCI runtime: null=runc (default), "runsc"=gVisor (recommended for production)
        container-runtime: ${SANDBOX_CONTAINER_RUNTIME:}
        llm-proxy-port: ${SANDBOX_LLM_PROXY_PORT:${server.port:8080}}
        max-directory-bytes: ${SANDBOX_MAX_DIRECTORY_BYTES:1073741824}  # 1 GB
        max-directory-entries: ${SANDBOX_MAX_DIRECTORY_ENTRIES:500000}
        default-resource-limits:
            memory-bytes: ${SANDBOX_MEMORY_BYTES:4294967296}  # 4 GB (includes tmpfs)
            cpus: ${SANDBOX_CPUS:2.0}
            pids-limit: ${SANDBOX_PIDS_LIMIT:256}

    # Mentor sandbox resource knobs (idleTtlSeconds, maxFrameChars, queue capacities, …) bind
    # to hephaestus.mentor.* via InteractiveSandboxProperties. Per-workspace enable is in DB.

    # Dev-only actuator for manually triggering PR reviews (never enable in production).
    # Layered safety: (1) this flag, (2) not in endpoint exposure list, (3) Spring Security auth.
    dev:
        trigger-enabled: false

    # ═══════════════════════════════════════════════════════════════════════════
    # AGENT JOB NATS CONFIGURATION
    # ═══════════════════════════════════════════════════════════════════════════
    # NATS stream and consumer for agent job execution pipeline.
    # Disabled by default — requires a reachable NATS server.
    agent:
        nats:
            enabled: ${AGENT_NATS_ENABLED:false}
            server: ${NATS_SERVER:nats://localhost:4222}
            stream-name: AGENT
            consumer-name: hephaestus-agent-executor
            # Must exceed max container timeout (1hr) + buffer
            ack-wait: 70m
            max-deliver: 5
            max-ack-pending: 5
            heartbeat-interval: 25s

    # ═══════════════════════════════════════════════════════════════════════════
    # GITLAB CONFIGURATION
    # ═══════════════════════════════════════════════════════════════════════════
    # Settings for GitLab API integration. Used by GitLab-mode workspaces
    # (GitProviderMode.GITLAB_PAT). Override default-server-url for self-hosted instances.
    gitlab:
        # Set to true to enable GitLab integration (loads all GitLab beans)
        enabled: ${GITLAB_ENABLED:false}
        # Default GitLab server URL (used when workspace has no custom serverUrl).
        # Falls back to KEYCLOAK_GITLAB_BASE_URL so deployments with GitLab login
        # automatically use the same instance for workspace creation.
        default-server-url: ${GITLAB_DEFAULT_SERVER_URL:${KEYCLOAK_GITLAB_BASE_URL:https://gitlab.com}}
        # Timeout for standard GraphQL operations (default: 30s)
        graphql-timeout: ${GITLAB_GRAPHQL_TIMEOUT:30s}
        # Extended timeout for complex operations (default: 60s)
        extended-graphql-timeout: ${GITLAB_EXTENDED_GRAPHQL_TIMEOUT:60s}
        # Delay between pagination requests (default: 200ms)
        pagination-throttle: ${GITLAB_PAGINATION_THROTTLE:200ms}
        # Cache duration for token validation results (default: 5m)
        token-validation-cache-duration: ${GITLAB_TOKEN_CACHE_DURATION:5m}

    # ═══════════════════════════════════════════════════════════════════════════
    # WEBHOOK CONFIGURATION
    # ═══════════════════════════════════════════════════════════════════════════
    # Single `hephaestus.webhook` block consumed by both webhook sides (ADR 0008):
    #   - workspace.GitLabWebhookService reads external-url, secret, token-rotation.* for
    #     auto-registration with the provider.
    #   - gitprovider.webhook.* reads secret (HMAC / token verification) and the nested
    #     publish/stream/http blocks for the inbound receiver.
    # `secret` is shared by design — same value registered with the provider and used
    # to verify incoming bodies. The receiver runs in the `webhook-server` container.
    webhook:
        external-url: ${WEBHOOK_EXTERNAL_URL:}
        secret: ${WEBHOOK_SECRET:}
        token-rotation:
            threshold-days: ${WEBHOOK_TOKEN_ROTATION_THRESHOLD_DAYS:7}
            validity-days: ${WEBHOOK_TOKEN_ROTATION_VALIDITY_DAYS:90}
        # ─── Inbound receiver (gitprovider.webhook.*) ───
        publish:
            timeout: 9s          # fits within GitHub's 10s response budget
            max-retries: 5
            retry-base-delay: 200ms
        stream:
            duplicate-window: 2m # JetStream default; provider redelivery is by delivery-UUID
            max-age: 180d
            max-messages: 2000000
        shutdown:
            # Drain budget for in-flight publishes after HTTP closes. Docker stop_grace_period
            # must cover: Spring HTTP drain (server.shutdown=graceful + lifecycle timeout 20s)
            # + this drain + small margin. Compose pins stop_grace_period: 40s.
            drain-timeout: 15s
        http:
            # Hard cap enforced by WebhookPayloadSizeFilter (Content-Length check before
            # Spring buffers the body). Tomcat's max-http-post-size only enforces on
            # form-encoded bodies, so we can't rely on it for JSON webhooks.
            max-payload-bytes: 26214400

    # ═══════════════════════════════════════════════════════════════════════════
    # GITHUB AUTHENTICATION
    # ═══════════════════════════════════════════════════════════════════════════
    # Can be any OAuth token, such as the PAT
    github:
        app:
            # Set to 0 to disable GitHub App mode and use Personal Access Tokens instead
            id: ${GH_APP_ID:0}
            privateKeyLocation: ${GH_APP_PRIVATE_KEY_LOCATION:}
            privateKey: ${GH_APP_PRIVATE_KEY:}
            # URL where users install the GitHub App (shown in workspace creation UI)
            installation-url: ${GH_APP_INSTALLATION_URL:}
        meta:
            auth-token: ${GH_AUTH_TOKEN:}

    # ═══════════════════════════════════════════════════════════════════════════
    # KEYCLOAK IDENTITY PROVIDER
    # ═══════════════════════════════════════════════════════════════════════════
    keycloak:
        url: http://localhost:${KEYCLOAK_PORT:8081}
        realm: hephaestus
        client-id: hephaestus-confidential
        # SECURITY: Never commit secrets. Use environment variables in production.
        # For local development, the default 'hephaestus-dev-secret' matches the realm import.
        client-secret: ${KEYCLOAK_CLIENT_SECRET:hephaestus-dev-secret}

    # ═══════════════════════════════════════════════════════════════════════════
    # SLACK INTEGRATION
    # ═══════════════════════════════════════════════════════════════════════════
    slack:
        token: ${SLACK_BOT_TOKEN:${SLACK_TOKEN:}}
        signing-secret: ${SLACK_SIGNING_SECRET:}

    sentry:
        dsn: ${SENTRY_DSN:}

# Protects against cascading failures when GitHub API is unavailable; defaults in ResilienceConfig.java.
resilience4j:
    circuitbreaker:
        configs:
            default:
                slidingWindowSize: 10
                failureRateThreshold: 50
                waitDurationInOpenState: 30s
                permittedNumberOfCallsInHalfOpenState: 3
                minimumNumberOfCalls: 5
                slowCallDurationThreshold: 10s
                slowCallRateThreshold: 80
        instances:
            githubGraphQl:
                baseConfig: default
            githubRest:
                baseConfig: default
            gitlabGraphQl:
                baseConfig: default

# Local profile (tracked defaults; per-developer secrets stay in gitignored application-local.yml).
---
spring:
    config:
        activate:
            on-profile: local

    docker:
        compose:
            # `pnpm dev` brings compose up explicitly; spring.datasource.url is set, so Spring
            # never needs to parse compose.yaml.
            enabled: false

hephaestus:
    sandbox:
        # On by default for local dev. Boots without Docker or an LLM key (image pull is
        # skipped/lazy); workspaces supply provider credentials at runtime, stored in the DB.
        enabled: ${SANDBOX_ENABLED:true}

management:
    endpoints:
        web:
            exposure:
                include: health,info,prometheus,metrics,startup
    endpoint:
        startup:
            access: read_only

logging:
    level:
        # Silence SpringDoc's "endpoint enabled by default — disable in production" banner.
        org.springdoc.core.events.SpringDocAppInitializer: ERROR
