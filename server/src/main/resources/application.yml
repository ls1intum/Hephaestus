spring:
    application:
        name: Hephaestus
        version: "${APP_VERSION:0.0.0-development}"

    # Deploy-role aliases (see docker/compose.core.yaml + ADR 0008). Activating a group
    # name expands to its member profiles, so SPRING_PROFILES_ACTIVE=webhook-server is
    # equivalent to prod,webhook (and worker-node to prod,worker).
    profiles:
        group:
            webhook-server: prod,webhook
            worker-node: prod,worker

    config:
        import: optional:file:.env[.properties]

    threads:
        virtual:
            enabled: true

    # Virtual threads are always daemons. With virtual threads enabled, both the request executor
    # and the @Scheduled TaskScheduler use them — so no non-daemon thread remains after main().
    # keep-alive registers one to hold the JVM open between cron firings.
    main:
        keep-alive: true

    datasource:
        url: jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/hephaestus
        username: ${DB_USERNAME:root}
        password: ${DB_PASSWORD:root}
        hikari:
            connection-timeout: 45000
            idle-timeout: 600000
            max-lifetime: 1800000
            maximum-pool-size: 30
            minimum-idle: 5

    jpa:
        hibernate:
            # Liquibase owns DDL across every profile. `validate` makes drift fail-fast at boot;
            # prod overrides to `none` in application-prod.yml. Fresh local DB after schema change:
            # `docker compose down -v && docker compose up -d`.
            ddl-auto: validate
        # Repository queries complete in the service layer; no lazy loading during view rendering.
        open-in-view: false

        # show-sql: "true"
        properties:
            hibernate:
                # `show-sql: true` is the trigger; `format_sql` only matters then. Default off avoids
                # the formatter pass on every statement.
                format_sql: "false"
                jdbc:
                    batch_size: 50
                order_inserts: true
                order_updates: true

    # Synchronous JPA repository bootstrap (Spring Boot's default since 2.4.1). DEFERRED builds the
    # EntityManagerFactory on the applicationTaskExecutor background thread; that thread starves under
    # CPU throttling (Paketo CDS-training builder, spec generation), hanging the boot, and combined with
    # an @PostConstruct repository read it is the documented lock-order deadlock (spring-boot#23758,
    # reverted as the framework default in #24249). The cold-start overlap it bought is not worth that
    # footgun, so we keep bootstrap synchronous on the main thread for every profile.
    data:
        jpa:
            repositories:
                bootstrap-mode: default

    liquibase:
        change-log: classpath:db/master.xml
        # Gates `context="backfill"` one-shot changesets; prod overrides to `prod`.
        contexts: dev

    # Hephaestus issues + verifies its own ES256 cookie-JWTs (core.auth
    # RevocationAwareJwtDecoder is the sole JwtDecoder bean) and federates login via
    # oauth2Login. There is no spring.security.oauth2.client.registration here: the default
    # login providers are configured under hephaestus.auth.{github,gitlab} and seeded into the
    # instance-scoped login_provider store, which the DB-backed LoginProviderClientRegistrationRepository
    # reads — so a no-credentials boot does not fail Boot's non-empty-client-id validation. See ADR 0017.

    # RFC 9457 Problem Details for all framework-raised errors (ResponseStatusException,
    # validation, etc.). Set explicitly so the contract survives a Boot upgrade. The
    # core.exception.GlobalControllerAdvice supplies richer bodies for domain exceptions.
    mvc:
        problemdetails:
            enabled: true

    # Disable Mustache template location check as we don't use Mustache templates
    mustache:
        check-template-location: false

    jackson:
        default-property-inclusion: non_null
        deserialization:
            fail-on-unknown-properties: false
            fail-on-null-for-primitives: false
        time-zone: UTC
        datatype:
            datetime:
                write-dates-as-timestamps: false

    # GraphQL client configuration for GitHub API operations
    # Operations are colocated with the schema at graphql/github/operations/
    graphql:
        client:
            document-locations: classpath:graphql/github/operations/

    # Graceful shutdown drains in-flight requests before terminating; pairs with server.shutdown
    # below. Coolify's default stop-grace is 10s — bump to 30s in the deploy substrate.
    lifecycle:
        timeout-per-shutdown-phase: ${SHUTDOWN_TIMEOUT:20s}

server:
    port: ${SERVER_PORT:8080}
    shutdown: graceful

# Actuator on the management port; health probes for Kubernetes liveness/readiness.
management:
    server:
        port: ${MANAGEMENT_PORT:8080}
    endpoints:
        web:
            exposure:
                include: health,info,prometheus,metrics
            base-path: /actuator
    endpoint:
        health:
            show-details: when_authorized
            probes:
                enabled: true
        # Disable potentially sensitive endpoints
        env:
            enabled: false
        beans:
            enabled: false
        configprops:
            enabled: false
    health:
        livenessState:
            enabled: true
        readinessState:
            enabled: true
        # Spring Boot derives indicator bean names from the class by stripping the
        # "HealthIndicator" suffix and lowercasing the first letter. Adding the
        # integration-consumer probe to the readiness group makes a degraded NATS
        # consumer (DOWN) take the pod out of the load balancer without crash-
        # looping it — the indicator's javadoc explicitly promises this.
        group:
            readiness:
                include: readinessState,integrationConsumer

springdoc:
    default-produces-media-type: application/json
    writer-with-order-by-keys: true

hephaestus:
    auth:
        issuer: ${HEPHAESTUS_AUTH_ISSUER:http://localhost:8080}
        audience: ${HEPHAESTUS_AUTH_AUDIENCE:hephaestus-spa}
        access-ttl: ${HEPHAESTUS_AUTH_ACCESS_TTL:15m}
        cookie-name: ${HEPHAESTUS_AUTH_COOKIE_NAME:__Host-HEPHAESTUS_AT}
        state-cookie-key: ${HEPHAESTUS_AUTH_STATE_COOKIE_KEY:}
        # Instance login providers seeded into the login_provider store on first boot, keyed by a stable
        # registrationId (the OAuth callback segment + identity key). A blank client-id skips that entry
        # (no crash). Seeding is seed-if-absent, so admin edits survive reboots. Multiple providers per
        # instance are supported — add more keyed entries here or in the local .env (one per (type,
        # base-url) SCM instance), or at runtime in Instance admin → Login providers. Register this
        # callback on each upstream OAuth app: {server-url}/login/oauth2/code/{registrationId}.
        login-providers:
            github:
                type: GITHUB
                display-name: ${GITHUB_OAUTH_DISPLAY_NAME:GitHub}
                client-id: ${GITHUB_OAUTH_CLIENT_ID:}
                client-secret: ${GITHUB_OAUTH_CLIENT_SECRET:}
            # Default GitLab slot (gitlab.com). For a self-hosted instance, either point base-url at it
            # (e.g. https://gitlab.lrz.de) or — to keep a descriptive id and/or run several GitLabs —
            # leave this blank and declare keyed entries like `gitlab-lrz` in the .env (see .env.example).
            gitlab:
                type: GITLAB
                base-url: ${GITLAB_OAUTH_BASE_URL:https://gitlab.com}
                display-name: ${GITLAB_OAUTH_DISPLAY_NAME:GitLab}
                client-id: ${GITLAB_OAUTH_CLIENT_ID:}
                client-secret: ${GITLAB_OAUTH_CLIENT_SECRET:}
        # Token-bucket rate limiting for the hot auth endpoints (core.auth.ratelimit).
        # Buckets are SHARED across replicas via a Postgres ProxyManager (no Redis) when
        # postgres-backed=true (default) and a DataSource is present; otherwise an in-JVM
        # PER-REPLICA fallback is used (logged at startup). Each limit: `capacity` requests
        # per `period` (interval refill — a fresh budget per window).
        rate-limit:
            enabled: ${HEPHAESTUS_AUTH_RATE_LIMIT_ENABLED:true}
            postgres-backed: ${HEPHAESTUS_AUTH_RATE_LIMIT_POSTGRES_BACKED:true}
            # GET /oauth2/authorization/* — keyed by client IP
            oauth-authorization:
                capacity: ${HEPHAESTUS_AUTH_RATE_LIMIT_OAUTH_CAPACITY:20}
                period: ${HEPHAESTUS_AUTH_RATE_LIMIT_OAUTH_PERIOD:1m}
            # POST /auth/refresh — keyed by account (JWT sub), IP fallback
            refresh:
                capacity: ${HEPHAESTUS_AUTH_RATE_LIMIT_REFRESH_CAPACITY:60}
                period: ${HEPHAESTUS_AUTH_RATE_LIMIT_REFRESH_PERIOD:1m}
            # POST /auth/impersonate — keyed by admin account, IP fallback
            impersonate:
                capacity: ${HEPHAESTUS_AUTH_RATE_LIMIT_IMPERSONATE_CAPACITY:10}
                period: ${HEPHAESTUS_AUTH_RATE_LIMIT_IMPERSONATE_PERIOD:1m}
            # DELETE /user — keyed by account, IP fallback
            delete-user:
                capacity: ${HEPHAESTUS_AUTH_RATE_LIMIT_DELETE_USER_CAPACITY:3}
                period: ${HEPHAESTUS_AUTH_RATE_LIMIT_DELETE_USER_PERIOD:1h}
            # POST /user/exports (async bundle assembly) — keyed by account, IP fallback. The
            # GET /user/exports/{id}/download is intentionally NOT limited (cheap ownership-gated read).
            export:
                capacity: ${HEPHAESTUS_AUTH_RATE_LIMIT_EXPORT_CAPACITY:10}
                period: ${HEPHAESTUS_AUTH_RATE_LIMIT_EXPORT_PERIOD:1h}

    host-url: https://hephaestus.ase.cit.tum.de/

    # ═══════════════════════════════════════════════════════════════════════════
    # RUNTIME ROLES (single JAR, deploy-config-selected mode)
    # ═══════════════════════════════════════════════════════════════════════════
    # Three property keys (see ADR 0005 baseline + ADR 0008 webhook role):
    #   server  — WIRED. Gates ServerSchedulingConfig (@EnableScheduling),
    #     IntegrationNatsConsumer (the unified NATS pull consumer), and WorkspaceStartupListener.
    #     Setting false silences all @Scheduled methods and prevents workspace bootstrap.
    #   worker  — WIRED. Gates DockerSandboxConfiguration + AgentNatsConsumerConfig.
    #     Setting false removes the Docker sandbox runtime + agent NATS pull consumer.
    #   webhook — WIRED. Gates the integration.webhook receiver (controllers, HMAC
    #     verifier, JetStream publisher, stream bootstrap, health, lifecycle).
    #     The webhook-server production container deploys with server=false + worker=false
    #     + webhook=true so it runs webhook reception in isolation — restart-independent
    #     from application-server. See ADR 0008.
    # All three default true → single-JVM monolith (the dev + initial prod topology).
    runtime:
        server:
            enabled: ${HEPHAESTUS_RUNTIME_SERVER_ENABLED:true}
        worker:
            enabled: ${HEPHAESTUS_RUNTIME_WORKER_ENABLED:true}
        webhook:
            enabled: ${HEPHAESTUS_RUNTIME_WEBHOOK_ENABLED:true}

    # ═══════════════════════════════════════════════════════════════════════════
    # TENANCY ENFORCEMENT (WorkspaceStatementInspector)
    # ═══════════════════════════════════════════════════════════════════════════
    # SQL-layer enforcement that every query against a workspace-scoped table
    # carries a workspace_id predicate. See core/tenancy/* and ADR 0004.
    #
    #   throw — TenancyViolationException on violations (fail loud; default in test)
    #   log   — log + Micrometer counter, query passes (default outside test —
    #           one calendar week of clean counter readings before flipping to throw
    #           in prod)
    #   off   — disable inspection (only for perf debugging)
    tenancy:
        enforcement: ${HEPHAESTUS_TENANCY_ENFORCEMENT:log}

    # Provider-agnostic sync scheduler (SyncSchedulerProperties). The GitHub-specific sync
    # tuning (GraphQL timeouts, incremental buffer, backfill page size) lives under
    # hephaestus.integration.github.sync (GitHubSyncProperties); per-field rationale is on each
    # record's Javadoc, surfaced in the IDE via spring-configuration-processor.
    sync:
        run-on-startup: true
        timeframe-days: 7
        cron: "0 0 3 * * *"
        cooldown-minutes: 15
        # Discussions + Projects V2 sync are the slowest passes and not consumed yet, so off by
        # default (see DiscussionsProperties/ProjectsProperties). Flip per environment when needed.
        discussions:
            enabled: ${HEPHAESTUS_SYNC_DISCUSSIONS_ENABLED:false}
        projects:
            enabled: ${HEPHAESTUS_SYNC_PROJECTS_ENABLED:false}
        # Historical issue/PR backfill (not projects); runs after recent sync, throttled by rate limit.
        backfill:
            enabled: false
            batch-size: 25
            rate-limit-threshold: 500
            interval-seconds: 60
        # filters.allowed-organizations / allowed-repositories are intentionally unset here so
        # each profile can override; set them in application-local.yml to scope dev syncs.
        nats:
            enabled: false
            replay-timeframe-days: 7
            durable-consumer-name: ""
            server: ""
            consumer:
                # Request timeout for JetStream API calls. Increase for workspaces with many
                # repositories. The remaining consumer tuning (ack-wait, poison handling, …)
                # lives on hephaestus.integration.consumer.* (NatsConsumerProperties).
                request-timeout: 60s

    cors:
        allowed-origins:
            - ${APPLICATION_HOST_URL:http://localhost:4200}

    # ═══════════════════════════════════════════════════════════════════════════
    # LOCAL GIT REPOSITORY STORAGE
    # ═══════════════════════════════════════════════════════════════════════════
    # When enabled, repositories are cloned as bare git repos for file-level
    # commit analysis. The Pi agent reads these repos directly inside the sandbox.
    git:
        # Whether local git checkout is enabled (default: false)
        enabled: ${GIT_CHECKOUT_ENABLED:false}
        # Base path for bare git repositories
        # Each repo stored at: {storage-path}/{repositoryId}.git
        storage-path: ${GIT_STORAGE_PATH:/data/git-repos}

    webapp:
        url: ${APPLICATION_HOST_URL:http://localhost:4200}

    leaderboard:
        schedule:
            day: 2
            time: "9:00"
        notification:
            # Global on/off for the weekly Slack post; per-workspace channel + team filter
            # live on the Slack Connection's SlackConfig (set via the connection admin API).
            enabled: false
        # PR authors whose assignee-reviewers don't earn points (e.g., AI bots)
        self-review-author-logins:
            - Copilot

    # PAT-mode bootstrap for local dev. init-default only gates PAT workspace creation;
    # GitHub App installations are always processed regardless. Mode docs + cross-field
    # validation live on WorkspaceProperties (IDE-surfaced via spring-configuration-processor).
    workspace:
        init-default: true
        # Dev-only convenience: seed ADMIN membership to the first authenticated visitor of a
        # zero-membership workspace (fresh dev DB). MUST stay false in production (prod overrides
        # it) — otherwise it is a privilege-escalation on org-sync-churned empty-membership state.
        auto-seed-membership: true
        slug:
            # TTL (days) for slug redirects; 0 disables redirects while preserving history.
            redirect:
                ttl-days: 30
        default:
            login: ${GITHUB_PAT_LOGIN:ls1intum}
            token: ${GITHUB_PAT:}
            repositories-to-monitor:
                - ls1intum/Hephaestus
                - ls1intum/Artemis
        init-gitlab-default: ${GITLAB_WORKSPACE_INIT_DEFAULT:false}
        gitlab-default:
            login: ${GITLAB_GROUP_PATH:}
            token: ${GITLAB_PAT:}
            server-url: ${GITLAB_SERVER_URL:}

    cache:
        contributors:
            # Eviction rate in milliseconds (1 hour)
            evict-rate: 3600000
        leaderboard-xp:
            # Eviction rate in milliseconds (60 seconds - leaderboard data is moderately hot)
            evict-rate: 60000

    # ═══════════════════════════════════════════════════════════════════════════
    # FEATURE FLAGS (operational / development toggles)
    # ═══════════════════════════════════════════════════════════════════════════
    # CONFIG-backed feature flags evaluated by FeatureFlagService.
    # ROLE-backed flags (mentor_access, admin, etc.) are stored per account in the account_feature table.
    features:
        flags:
            practice-review-for-all: false
            gitlab-workspace-creation: false

    # ═══════════════════════════════════════════════════════════════════════════
    # PRACTICE REVIEW GATE
    # ═══════════════════════════════════════════════════════════════════════════
    # Controls the detection gate for the practice-aware PR review agent.
    # The gate decides whether to submit an agent job for a PR event.
    practice-review:
        # true = run for ALL users (bypass role check); false = require the run_practice_review feature flag
        run-for-all-users: ${PRACTICE_REVIEW_RUN_FOR_ALL:false}
        # true = skip practice review for draft PRs
        skip-drafts: ${PRACTICE_REVIEW_SKIP_DRAFTS:true}
        # whether to deliver feedback to already-merged PRs
        deliver-to-merged: ${PRACTICE_REVIEW_DELIVER_TO_MERGED:false}
        # base URL of the Hephaestus app (for preferences footer link); empty = no link
        app-base-url: ${PRACTICE_REVIEW_APP_BASE_URL:}
        # minimum minutes between reviews for the same PR (0 = no cooldown)
        cooldown-minutes: ${PRACTICE_REVIEW_COOLDOWN_MINUTES:15}

    posthog:
        enabled: ${POSTHOG_ENABLED:false}
        api-host: ${POSTHOG_API_HOST:https://app.posthog.com}
        project-id: ${POSTHOG_PROJECT_ID:}
        personal-api-key: ${POSTHOG_PERSONAL_API_KEY:}

    # LLM proxy upstream URLs. Override for Azure OpenAI, WireMock, or other API-compatible
    # endpoints. Docker sandbox deployment requirements are documented on SandboxProperties.
    llm-proxy:
        anthropic-upstream-url: ${LLM_PROXY_ANTHROPIC_URL:https://api.anthropic.com}
        openai-upstream-url: ${LLM_PROXY_OPENAI_URL:https://api.openai.com}
        # For Azure OpenAI, set openai-auth-header=api-key and openai-use-bearer-prefix=false
        openai-auth-header: ${LLM_PROXY_OPENAI_AUTH_HEADER:Authorization}
        openai-use-bearer-prefix: ${LLM_PROXY_OPENAI_USE_BEARER:true}
        # Dedicated Azure OpenAI route used by the sandboxed Pi agent
        azure-openai-upstream-url: ${LLM_PROXY_AZURE_OPENAI_URL:}
        azure-openai-auth-header: ${LLM_PROXY_AZURE_OPENAI_AUTH_HEADER:api-key}
        azure-openai-use-bearer-prefix: ${LLM_PROXY_AZURE_OPENAI_USE_BEARER:false}

    sandbox:
        # Capability flag (not a role): worker-internal LLM proxy controller. Stays on
        # the coordinator by default (BYO trust model — see ADR 0006). Future managed-mode
        # workers opt in by setting this on the worker pod and false on the server pod.
        llm-proxy:
            enabled: ${HEPHAESTUS_SANDBOX_LLM_PROXY_ENABLED:true}
        docker-host: ${SANDBOX_DOCKER_HOST:unix:///var/run/docker.sock}
        tls-verify: ${SANDBOX_TLS_VERIFY:false}
        max-concurrent-containers: ${SANDBOX_MAX_CONCURRENT:5}
        container-stop-timeout-seconds: ${SANDBOX_STOP_TIMEOUT:10}
        reconciliation-interval-seconds: ${SANDBOX_RECONCILIATION_INTERVAL:60}
        # OCI runtime: null=runc (default), "runsc"=gVisor (recommended for production)
        container-runtime: ${SANDBOX_CONTAINER_RUNTIME:}
        llm-proxy-port: ${SANDBOX_LLM_PROXY_PORT:${server.port:8080}}
        max-directory-bytes: ${SANDBOX_MAX_DIRECTORY_BYTES:1073741824}  # 1 GB
        max-directory-entries: ${SANDBOX_MAX_DIRECTORY_ENTRIES:500000}
        default-resource-limits:
            memory-bytes: ${SANDBOX_MEMORY_BYTES:4294967296}  # 4 GB (includes tmpfs)
            cpus: ${SANDBOX_CPUS:2.0}
            pids-limit: ${SANDBOX_PIDS_LIMIT:256}

    # Mentor sandbox resource knobs (idleTtlSeconds, maxFrameChars, queue capacities, …) bind
    # to hephaestus.mentor.* via InteractiveSandboxProperties. Per-workspace enable is in DB.

    # Dev-only actuator for manually triggering PR reviews (never enable in production).
    # Layered safety: (1) this flag, (2) not in endpoint exposure list, (3) Spring Security auth.
    dev:
        trigger-enabled: false

    # ═══════════════════════════════════════════════════════════════════════════
    # AGENT JOB NATS CONFIGURATION
    # ═══════════════════════════════════════════════════════════════════════════
    # NATS stream and consumer for agent job execution pipeline.
    # Disabled by default — requires a reachable NATS server.
    agent:
        nats:
            enabled: ${AGENT_NATS_ENABLED:false}
            server: ${NATS_SERVER:nats://localhost:4222}
            stream-name: AGENT
            consumer-name: hephaestus-agent-executor
            # Must exceed max container timeout (1hr) + buffer
            ack-wait: 70m
            max-deliver: 5
            # Cluster-wide unacked bound across all worker replicas. Set ≈ replicas × per-worker
            # concurrency; the per-replica pull is capped by fetch-batch-size so no replica starves siblings.
            max-ack-pending: ${AGENT_NATS_MAX_ACK_PENDING:16}
            fetch-batch-size: ${AGENT_NATS_FETCH_BATCH_SIZE:5}
            heartbeat-interval: 25s
        # Dev convenience: seed one workspace model at startup (off by default). See docker/.env.example.
        default-config:
            enabled: ${AGENT_DEFAULT_CONFIG_ENABLED:false}
            name: ${AGENT_DEFAULT_CONFIG_NAME:Default model}
            provider: ${AGENT_DEFAULT_CONFIG_PROVIDER:ANTHROPIC}
            model-name: ${AGENT_DEFAULT_CONFIG_MODEL_NAME:}
            api-key: ${AGENT_DEFAULT_CONFIG_API_KEY:}

    # ═══════════════════════════════════════════════════════════════════════════
    # WEBHOOK CONFIGURATION
    # ═══════════════════════════════════════════════════════════════════════════
    # Single `hephaestus.webhook` block consumed by both webhook sides (ADR 0008):
    #   - workspace.GitLabWebhookService reads external-url, secret, token-rotation.* for
    #     auto-registration with the provider.
    #   - integration.webhook.* reads secret (HMAC / token verification) and the nested
    #     publish/stream/http blocks for the inbound receiver.
    # `secret` is shared by design — same value registered with the provider and used
    # to verify incoming bodies. The receiver runs in the `webhook-server` container.
    # external-url defaults to the app's own origin (APPLICATION_HOST_URL); set WEBHOOK_EXTERNAL_URL
    # only when the receiver is fronted at a different origin than the app (e.g. preview).
    webhook:
        external-url: ${WEBHOOK_EXTERNAL_URL:${APPLICATION_HOST_URL:}}
        secret: ${WEBHOOK_SECRET:}
        token-rotation:
            threshold-days: ${WEBHOOK_TOKEN_ROTATION_THRESHOLD_DAYS:7}
            validity-days: ${WEBHOOK_TOKEN_ROTATION_VALIDITY_DAYS:90}
        # ─── Inbound receiver (integration.webhook.*) ───
        publish:
            timeout: 9s          # fits within GitHub's 10s response budget
            max-retries: 5
            retry-base-delay: 200ms
        stream:
            # Must be >= the max vendor replay tolerance (5m: GitLab whsec + Slack v0). GitHub has
            # no timestamp, so this dedup window keyed on X-GitHub-Delivery is its only replay
            # defense; 10m also covers provider redelivery horizons. See WebhookProperties.Stream.
            duplicate-window: 10m
            max-age: 180d
            max-messages: 2000000
        shutdown:
            # Drain budget for in-flight publishes after HTTP closes. Docker stop_grace_period
            # must cover: Spring HTTP drain (server.shutdown=graceful + lifecycle timeout 20s)
            # + this drain + small margin. Compose pins stop_grace_period: 40s.
            drain-timeout: 15s
        http:
            # Hard cap enforced by WebhookPayloadSizeFilter (Content-Length check before
            # Spring buffers the body). Tomcat's max-http-post-size only enforces on
            # form-encoded bodies, so we can't rely on it for JSON webhooks.
            max-payload-bytes: 26214400

    # ═══════════════════════════════════════════════════════════════════════════
    # CONTRIBUTORS (Hephaestus meta — who built the app)
    # ═══════════════════════════════════════════════════════════════════════════
    # Token used by ContributorService to fetch the ls1intum/Hephaestus contributor
    # graph. Detached from `hephaestus.integration.github` so SCM-integration code no longer
    # carries an unrelated PAT. Defaults to the legacy GH_AUTH_TOKEN env var so
    # existing deployments keep working without touching their secrets stores.
    contributors:
        github:
            auth-token: ${GH_AUTH_TOKEN:}

    # ═══════════════════════════════════════════════════════════════════════════
    # INTEGRATION FEATURE FLAGS + SCM/SLACK CONFIG
    # ═══════════════════════════════════════════════════════════════════════════
    # Slack and Outline integrations are opt-in. Every bean under
    # integration/slack/** and integration/outline/** carries
    # @ConditionalOnProperty(...enabled, matchIfMissing=false), so leaving these
    # unset keeps the OAuth flows, webhook verifiers, and lifecycle listeners
    # inert. Flip `enabled` to `true` once client-id + client-secret + redirect-uri
    # are configured.
    integration:
        # Generic gate for the fleet-wide flat-stream NATS consumer (IntegrationNatsConsumer stays
        # vendor-neutral in core). Driven by the messaging integrations; today only Slack publishes a
        # flat (non-repository-scoped) stream, so it tracks the same env var as slack.enabled.
        flat-stream:
            enabled: ${hephaestus.integration.slack.enabled:false}
        # ─── GitHub authentication (GitHubProperties) ───
        # Can be any OAuth token, such as the PAT.
        github:
            app:
                # Set to 0 to disable GitHub App mode and use Personal Access Tokens instead
                id: ${GH_APP_ID:0}
                privateKeyLocation: ${GH_APP_PRIVATE_KEY_LOCATION:}
                privateKey: ${GH_APP_PRIVATE_KEY:}
                # URL where users install the GitHub App (shown in workspace creation UI)
                installation-url: ${GH_APP_INSTALLATION_URL:}
            meta:
                # DEPRECATED: token used to live here; the Hephaestus-contributor
                # endpoint now reads hephaestus.contributors.github.auth-token instead.
                # Binding kept for backwards compatibility — remove once all environments
                # have been migrated.
                auth-token: ${GH_AUTH_TOKEN:}
            # GitHub-specific sync tuning (GitHubSyncProperties). Provider-agnostic scheduler
            # knobs (run-on-startup, cron, cooldown, backfill, filters, …) stay under
            # hephaestus.sync (SyncSchedulerProperties).
            sync:
                graphql-timeout: ${HEPHAESTUS_SYNC_GRAPHQL_TIMEOUT:60s}
                extended-graphql-timeout: ${HEPHAESTUS_SYNC_EXTENDED_GRAPHQL_TIMEOUT:120s}
                pagination-throttle: ${HEPHAESTUS_SYNC_PAGINATION_THROTTLE:200ms}
                incremental-sync-enabled: ${HEPHAESTUS_SYNC_INCREMENTAL_ENABLED:true}
                incremental-sync-buffer: ${HEPHAESTUS_SYNC_INCREMENTAL_BUFFER:5m}
                backfill-graphql-timeout: ${HEPHAESTUS_SYNC_BACKFILL_TIMEOUT:120s}
                backfill-pr-page-size: ${HEPHAESTUS_SYNC_BACKFILL_PR_PAGE_SIZE:10}
        # GitLab is opt-in (default off). Flip GITLAB_ENABLED=true to load the GitLab beans +
        # manifest. The gated beans and GitLabManifest both read the `enabled` gate; the
        # sibling url/timeout/throttle keys bind GitLabProperties via @ConfigurationProperties.
        # Used by GitLab-mode workspaces (GitProviderMode.GITLAB_PAT); override default-server-url
        # for self-hosted instances.
        gitlab:
            enabled: ${GITLAB_ENABLED:false}
            # Default GitLab server URL (used when workspace has no custom serverUrl).
            # Falls back to the native-auth GitLab login base URL so deployments with GitLab login
            # automatically use the same instance for workspace creation.
            default-server-url: ${GITLAB_DEFAULT_SERVER_URL:${GITLAB_OAUTH_BASE_URL:https://gitlab.com}}
            # Timeout for standard GraphQL operations (default: 30s)
            graphql-timeout: ${GITLAB_GRAPHQL_TIMEOUT:30s}
            # Extended timeout for complex operations (default: 60s)
            extended-graphql-timeout: ${GITLAB_EXTENDED_GRAPHQL_TIMEOUT:60s}
            # Delay between pagination requests (default: 200ms)
            pagination-throttle: ${GITLAB_PAGINATION_THROTTLE:200ms}
            # Cache duration for token validation results (default: 5m)
            token-validation-cache-duration: ${GITLAB_TOKEN_CACHE_DURATION:5m}
        slack:
            enabled: ${HEPHAESTUS_INTEGRATION_SLACK_ENABLED:false}
            # OAuth client-id/client-secret drive the per-workspace install flow (Slack does NOT
            # support refresh-token rotation for legacy bot tokens, so no refresher ships). Slack
            # is outbound-only today; there is no inbound webhook signing secret.
            client-id: ${HEPHAESTUS_INTEGRATION_SLACK_CLIENT_ID:}
            client-secret: ${HEPHAESTUS_INTEGRATION_SLACK_CLIENT_SECRET:}
            redirect-uri: ${HEPHAESTUS_INTEGRATION_SLACK_REDIRECT_URI:}
            api-base: ${HEPHAESTUS_INTEGRATION_SLACK_API_BASE:https://slack.com}
            # App signing secret — verifies inbound Events API POSTs to /slack/events (v0 HMAC over
            # "v0:{ts}:{rawBody}", 300s replay window). Inbound (mentor DM + channel ingest) is inert without it.
            signing-secret: ${HEPHAESTUS_INTEGRATION_SLACK_SIGNING_SECRET:}
            conversation-ingest:
                # Channel/group message ingestion (the channel-ingest → conversation-detection →
                # conversation-feedback subsystem). The capability is AVAILABLE by default so each workspace can
                # self-serve, but availability alone reads nothing: actual ingestion still requires a workspace
                # admin to activate a channel (consent_state=ACTIVE) AND is gated per-person by the opt-out
                # firewall, and is forward-only (never pre-announcement history). Nothing is read until a channel
                # is deliberately activated. Set to false to hard-disable the whole subsystem fleet-wide.
                enabled: ${HEPHAESTUS_INTEGRATION_SLACK_CONVERSATION_INGEST_ENABLED:true}
                # Durable channel-message ingest now rides the core NATS/JetStream framework (subject
                # slack.<team>.<channel>.message, Nats-Msg-Id = slack-<event_id>). It therefore requires
                # hephaestus.sync.nats.enabled=true; with NATS off the events endpoint replies 503 on the channel
                # branch so Slack redelivers (never a silent drop). The mentor DM path stays in-process and needs no NATS.
            mentor:
                # Per-user cap on mentor DM turns per (UTC) day — a friendly message is sent over-cap, never an error.
                turns-per-user-per-day: ${HEPHAESTUS_INTEGRATION_SLACK_MENTOR_TURNS_PER_USER_PER_DAY:50}
                # Fleet-wide daily mentor-turn budget (coarse LLM-spend safety valve, counted per replica).
                daily-budget: ${HEPHAESTUS_INTEGRATION_SLACK_MENTOR_DAILY_BUDGET:1000}
    #     outline:
    #         enabled: false

    sentry:
        dsn: ${SENTRY_DSN:}

# Protects against cascading failures when GitHub API is unavailable; defaults in ResilienceConfig.java.
resilience4j:
    circuitbreaker:
        configs:
            default:
                slidingWindowSize: 10
                failureRateThreshold: 50
                waitDurationInOpenState: 30s
                permittedNumberOfCallsInHalfOpenState: 3
                minimumNumberOfCalls: 5
                slowCallDurationThreshold: 10s
                slowCallRateThreshold: 80
        instances:
            githubGraphQl:
                baseConfig: default
            githubRest:
                baseConfig: default
            gitlabGraphQl:
                baseConfig: default

# Shared logging defaults (apply to every profile, incl. prod which sets no overrides).
# WARN is reserved for genuinely actionable situations; per-event/per-changeset chatter is
# silenced here (3rd-party loggers) or downgraded to DEBUG at the source (our own packages).
logging:
    level:
        # Liquibase logs every changeset at INFO on each boot (the bulk of startup noise).
        # WARN keeps real migration problems (validation/checksum/lock-wait).
        liquibase: WARN
        # Hibernate HHH100503 (batch-on-release) was a symptom of the achievement lock
        # contention fixed separately; WARN keeps genuine batch problems visible.
        org.hibernate.orm.jdbc.batch: WARN
        # Webhook receipts and per-event bookkeeping are logged at DEBUG at the source, so
        # per-repo sync rollups stay the only INFO. Flip the package to DEBUG to restore the
        # full per-event firehose for diagnosis (no redeploy needed):
        #   logging.level.de.tum.cit.aet.hephaestus.integration.scm: DEBUG
#
# Secret-bearing local overlay (vendor tokens, encryption key, lazy jwk-set-uri, management
# exposure, devtools, SpringDoc banner) lives in the gitignored application-local.yml. The infra
# auto-start below is tracked here so `mvn spring-boot:run` works out of the box without it.
---
# Local-profile overlay (the `local` profile is the default for `mvn spring-boot:run` /
# `pnpm dev:server`). Auto-starts server/compose.yaml — Postgres, NATS — through Spring
# Boot's docker-compose support and waits for readiness, so a bare `mvn spring-boot:run` brings its
# own infra up. lifecycle-management=start-only: Ctrl-C never stops the stack, and a stack that
# `pnpm dev:compose` started first is detected and reused rather than fought.
spring:
    config:
        activate:
            on-profile: local
    docker:
        compose:
            enabled: true
            lifecycle-management: start-only
