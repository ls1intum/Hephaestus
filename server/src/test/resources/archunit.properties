# ArchUnit Configuration
# See: https://www.archunit.org/userguide/html/000_Index.html#_configuration

# Don't fail when no classes match the rule predicate
# This can happen when tests run in isolation or classes aren't fully loaded.
# NOTE: This global default stays false to keep the ~112-rule legacy suite stable. New rules that
# must never pass vacuously opt into strict empty-checking individually via .allowEmptyShould(false)
# at the rule site (e.g. IntegrationSpiBoundariesTest#agentDoesNotReadProviderEnumConstants,
# CodeQualityTest#spiInterfacesAreFocused). Do not flip this to true without auditing every rule.
archRule.failOnEmptyShould=false

# Cycle detection performance bounds
cycles.maxNumberToDetect=50
cycles.maxNumberOfDependenciesPerEdge=10
