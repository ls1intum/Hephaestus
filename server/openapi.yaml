          type: string
          description: Optional lucide icon name giving the area a glanceable identity
          example: ShieldAlert
          maxLength: 64
          minLength: 0
          pattern: "^[A-Za-z0-9]+$"
        name:
          type: string
          description: Human-readable name
          example: Submitting review-ready work
          maxLength: 128
          minLength: 3
        slug:
          type: string
          description: URL-safe identifier unique within the workspace
          example: review-ready-work
          maxLength: 64
          minLength: 3
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
