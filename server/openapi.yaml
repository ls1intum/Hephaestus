    ConnectionAuditEntry:
      type: object
      description: |-
        Audit-log entry returned by <code>GET /workspaces/{workspaceSlug</code>/connections/{id}/audit}.

         <p>Lean projection of {@link ConnectionAudit ConnectionAudit} — the entity carries a back-reference
         to {@link de.tum.cit.aet.hephaestus.integration.core.connection.Connection de.tum.cit.aet.hephaestus.integration.core.connection.Connection} that we don't
         want to serialize on every response.
      properties:
        actorKind:
          type: string
        actorRef:
          type: string
        correlationId:
          type: string
        eventType:
          type: string
        fromState:
          type: string
          enum:
          - PENDING
          - ACTIVE
          - SUSPENDED
          - UNINSTALLED
        occurredAt:
          type: string
          format: date-time
        toState:
          type: string
          enum:
          - PENDING
          - ACTIVE
          - SUSPENDED
          - UNINSTALLED
    ConnectionDetail:
      type: object
      description: |-
        Detailed view of a single Connection — extends {@link ConnectionSummaryDTO ConnectionSummaryDTO} with the
         sealed config serialized to a free-form JSON object (<code>Map&lt;String, Object&gt;</code> →
         <code>type: object, additionalProperties: true</code> in the spec, so it round-trips through
         client codegen). NEVER carries credentials; the encrypted blob stays inside the entity
         and is not exposed by this DTO.

         <p>Mirroring the summary fields (rather than embedding the summary record) keeps
         the JSON shape flat — the API consumer sees one record, not a nested <code>summary</code>
         object.
      properties:
        capabilities:
          type: array
          items:
            type: string
            enum:
            - WEBHOOK_INGEST
            - TOKEN_REFRESH
            - FEEDBACK_DELIVERY
            - INLINE_FINDINGS
            - APPROVAL_WORKFLOW
            - SCOPE_CHANGES
          uniqueItems: true
        config:
          type: object
          additionalProperties: {}
        createdAt:
          type: string
          format: date-time
        displayName:
          type: string
        family:
          type: string
          enum:
          - SCM
          - MESSAGING
        id:
          type: integer
          format: int64
        instanceKey:
          type: string
        kind:
          type: string
          enum:
          - GITHUB
          - GITLAB
          - SLACK
        state:
          type: string
          enum:
          - PENDING
          - ACTIVE
          - SUSPENDED
          - UNINSTALLED
        stateReason:
          type: string
        updatedAt:
          type: string
          format: date-time
    ConnectionSummary:
      type: object
      description: |-
        Wire shape returned by the <code>GET /workspaces/{workspaceSlug</code>/connections}
         list + by lifecycle endpoints (suspend, reactivate). Lightweight — no config, no
         credentials, no audit. Capabilities are looked up from the per-kind manifest at
         response build time so adding/removing a capability needs no DB migration.
      properties:
        capabilities:
          type: array
          items:
            type: string
            enum:
            - WEBHOOK_INGEST
            - TOKEN_REFRESH
            - FEEDBACK_DELIVERY
            - INLINE_FINDINGS
            - APPROVAL_WORKFLOW
            - SCOPE_CHANGES
          uniqueItems: true
        createdAt:
          type: string
          format: date-time
        displayName:
          type: string
        family:
          type: string
          enum:
          - SCM
          - MESSAGING
        id:
          type: integer
          format: int64
        instanceKey:
          type: string
        kind:
          type: string
          enum:
          - GITHUB
          - GITLAB
          - SLACK
        state:
          type: string
          enum:
          - PENDING
          - ACTIVE
          - SUSPENDED
          - UNINSTALLED
        stateReason:
          type: string
        updatedAt:
          type: string
          format: date-time
