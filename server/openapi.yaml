    RateLimitSnapshot:
      type: object
      description: "Vendor API rate-limit observation, read from in-memory trackers\
        \ (not persisted across restarts). Every field except observedAt is present\
        \ only if the vendor actually reported it."
      properties:
        limit:
          type: integer
          format: int32
          description: "Window ceiling, if the vendor reported one. Survives window\
            \ rollover — a ceiling is window-invariant."
        observedAt:
          type: string
          format: date-time
          description: When the underlying vendor response was seen
        remaining:
          type: integer
          format: int32
          description: "Remaining budget, if reported and still inside the observed\
            \ window. Null once the window has rolled over."
        resetAt:
          type: string
          format: date-time
          description: "When the observed window ends, if reported and still in the\
            \ future"
        throttledUntil:
          type: string
          format: date-time
          description: An observed 429's back-off deadline (observedAt + Retry-After);
            null if the vendor never told us to back off
      required:
      - observedAt
