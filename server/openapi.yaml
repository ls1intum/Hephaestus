        authHeaderName:
          type: string
          description: Auth header name
          maxLength: 64
          minLength: 0
        authValuePrefix:
          type: string
          description: Auth value prefix
          maxLength: 16
          minLength: 0
        azureApiVersion:
          type: string
          description: Azure API version
          maxLength: 32
          minLength: 0
        baseUrl:
          type: string
          description: Provider base URL
          maxLength: 2048
          minLength: 0
        clearApiKey:
          type: boolean
          description: Set true to clear the stored API key
        displayName:
          type: string
          description: Human-readable name
          maxLength: 128
          minLength: 0
        enabled:
          type: boolean
          description: Whether the connection is enabled
    UpdateLlmModelPriceRequest:
