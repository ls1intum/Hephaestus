                $ref: "#/components/schemas/ConnectionSyncStatus"
          description: OK
      summary: Unified sync status for one connection
      tags:
      - Sync
  /workspaces/{workspaceSlug}/connections/{connectionId}/sync/jobs:
    get:
      operationId: listConnectionSyncJobs
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - in: path
        name: connectionId
        required: true
        schema:
          type: integer
          format: int64
      - in: query
        name: page
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - in: query
        name: size
        required: false
        schema:
          type: integer
          format: int32
          default: 20
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageSyncJob"
          description: OK
      summary: Paginated sync job history for one connection
      tags:
      - Sync
    post:
      description: |-
        Trigger a manual sync. Idempotent-absorb: a connection that already has an active job answers
         200 with that job rather than erroring, so a double-click "Sync now" is harmless.
      operationId: triggerSyncJob
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - in: path
        name: connectionId
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TriggerSyncJobRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncJob"
          description: "Idempotent-absorb: a same-type job was already running and\
            \ is returned unchanged"
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncJob"
          description: A new sync job was created and dispatched
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Missing or invalid request body (e.g. absent sync type)
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: Connection not found in this workspace
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: "Connection is not ACTIVE, a different sync type is already\
            \ running, or manual sync is unsupported for the kind"
        "503":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
          description: The server is too busy to dispatch the sync; retry later
      summary: Trigger a manual sync or backfill
      tags:
      - Sync
