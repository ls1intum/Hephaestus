openapi: 3.1.0
info:
  contact:
    email: felixtj.dietrich@tum.de
    name: Felix T.J. Dietrich
  description: API documentation for the Hephaestus application server.
  license:
    name: MIT License
    url: https://github.com/ls1intum/Hephaestus/blob/develop/LICENSE
  title: Hephaestus API
  version: 0.0.0-development
servers:
- description: Default Server URL
  url: /
security:
- bearerAuth: []
tags:
- description: User achievement progress and unlocks
  name: Achievements
- description: Global contributor information
  name: Contributors
- description: User preferences
  name: Account
- description: Instance-admin login provider management
  name: Admin
- description: Per-workspace Slack channel consent + activation
  name: Slack channel activation
- description: Manage practice areas
  name: Practice Areas
- description: Workspace-scoped agent configuration management
  name: Agent Config
- description: Workspace-scoped mentor chat threads
  name: Mentor Threads
- description: |-
    Controller for managing workspace memberships and roles.
     Handles CRUD operations for workspace members and role assignments.
  name: workspace-membership-controller
- description: Workspace-scoped agent job monitoring
  name: Agent Jobs
- description: "User account management (settings, deletion)"
  name: Account
- description: Read-only access to practice evaluation observations
  name: Practice Observations
- description: Instance-admin account management
  name: Admin
- description: Current user's Slack privacy preferences
  name: Slack User Preferences
- description: Team management within workspace
  name: Teams
- description: User profile and activity data
  name: Profile
- description: Session lifecycle
  name: Auth
- description: Active sessions
  name: Account
- description: |-
    Workspace registry endpoints that operate outside of a specific workspace slug.
     These routes stay under the classic /workspaces base path while slugged routes
     live in {@link WorkspaceController WorkspaceController} via <code>@WorkspaceScopedController</code>.
  name: workspace-registry-controller
- description: Workspace integration connection management
  name: Connections
- description: Up/down votes on mentor assistant messages
  name: Mentor Votes
- description: Public JWK set for verifying Hephaestus session JWTs
  name: Auth discovery
- description: GDPR Art. 20 self-service data export
  name: Account
- description: Per-developer practice reports and the anonymised workspace health
    rollup
  name: Practice Reports
- description: |-
    Vendor OAuth redirect ingress at <code>/oauth/callback/{kind</code>}. Unauthenticated —
     identity comes from the HMAC-signed <code>state</code> param. Browsers get 302 redirects
     on both success and failure; only <code>Accept: application/json</code> requests get
     4xx JSON.
  name: o-auth-callback-controller
- description: Manage practice definitions
  name: Practice Catalog
- description: Workspace-scoped team settings management
  name: Team Settings
- description: Developer reactions to delivered feedback
  name: Feedback Reaction
- description: Identity provider discovery (public)
  name: Auth discovery
- description: |-
    GitLab-specific REST endpoints used during the workspace creation wizard:
     <code>POST /workspaces/gitlab/preflight</code> validates a PAT, <code>POST /workspaces/gitlab/groups</code>
     lists accessible groups for one. Split from <code>WorkspaceRegistryController</code> so the
     workspace module no longer imports {@link GitLabPreflightService GitLabPreflightService}; the routes keep the
     existing <code>/workspaces/gitlab/*</code> URL space for API stability.

     <p>Both endpoints are gated by the <code>GITLAB_WORKSPACE_CREATION</code> feature flag via
     <code>@PreAuthorize</code> — identical to the previous protection on the merged controller.
  name: git-lab-preflight-controller
- description: Workspace-scoped AI configuration (runtime bindings + practice-review
    policy)
  name: AI Settings
- description: "Current user identity, linked accounts, deletion"
  name: Account
paths:
  /.well-known/jwks.json:
    get:
      operationId: getJwks
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: OK
      summary: JWK set (public keys only)
      tags:
      - Auth discovery
  /admin/audit:
    get:
      operationId: adminListAuthEvents
      parameters:
      - in: query
        name: page
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - in: query
        name: size
        required: false
        schema:
          type: integer
          format: int32
          default: 50
      - in: query
        name: accountId
        required: false
        schema:
          type: integer
          format: int64
      - in: query
        name: actingAccountId
        required: false
        schema:
          type: integer
          format: int64
      - in: query
        name: eventType
        required: false
        schema:
          type: string
          enum:
          - LOGIN
          - LOGIN_FAILED
          - LOGOUT
          - TOKEN_REFRESH
          - JWT_REVOKED
          - IDENTITY_LINKED
          - IDENTITY_UNLINKED
          - IMPERSONATION_BEGIN
          - IMPERSONATION_END
          - ACCOUNT_DELETED
          - EXPORT_REQUESTED
          - APP_ROLE_CHANGED
          - RESEARCH_CONSENT_REVOKED
      - in: query
        name: result
        required: false
        schema:
          type: string
          enum:
          - SUCCESS
          - FAILURE
      - in: query
        name: from
        required: false
        schema:
          type: string
          format: date-time
      - in: query
        name: to
        required: false
        schema:
          type: string
          format: date-time
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageAuthEventView"
          description: OK
      summary: "List auth audit events (paged, newest first)"
      tags:
      - Admin
  /admin/audit/export:
    get:
      operationId: adminExportAuthEvents
      parameters:
      - in: query
        name: accountId
        required: false
        schema:
          type: integer
          format: int64
      - in: query
        name: actingAccountId
        required: false
        schema:
          type: integer
          format: int64
      - in: query
        name: eventType
        required: false
        schema:
          type: string
          enum:
          - LOGIN
          - LOGIN_FAILED
          - LOGOUT
          - TOKEN_REFRESH
          - JWT_REVOKED
          - IDENTITY_LINKED
          - IDENTITY_UNLINKED
          - IMPERSONATION_BEGIN
          - IMPERSONATION_END
          - ACCOUNT_DELETED
          - EXPORT_REQUESTED
          - APP_ROLE_CHANGED
          - RESEARCH_CONSENT_REVOKED
      - in: query
        name: result
        required: false
        schema:
          type: string
          enum:
          - SUCCESS
          - FAILURE
      - in: query
        name: from
        required: false
        schema:
          type: string
          format: date-time
      - in: query
        name: to
        required: false
        schema:
          type: string
          format: date-time
      responses:
        "200":
          content:
            text/csv:
              schema:
                type: string
          description: OK
      summary: "Export the filtered audit log as CSV (newest first, capped)"
      tags:
      - Admin
  /admin/login-providers:
    get:
      operationId: adminListLoginProviders
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LoginProviderView"
          description: OK
      summary: List login providers
      tags:
      - Admin
    post:
      operationId: adminCreateLoginProvider
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLoginProviderRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginProviderView"
          description: Login provider created; URL in the Location header
      summary: Create a login provider
      tags:
      - Admin
  /admin/login-providers/{registrationId}:
    delete:
      operationId: adminDeleteLoginProvider
      parameters:
      - in: path
        name: registrationId
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
      summary: Delete a login provider
      tags:
      - Admin
    patch:
      operationId: adminUpdateLoginProvider
      parameters:
      - in: path
        name: registrationId
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLoginProviderRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginProviderView"
          description: OK
      summary: Update a login provider
      tags:
      - Admin
  /admin/users:
    get:
      operationId: adminListUsers
      parameters:
      - in: query
        name: page
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - in: query
        name: size
        required: false
        schema:
          type: integer
          format: int32
          default: 50
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminAccountView"
          description: OK
      summary: List accounts (paged)
      tags:
      - Admin
  /admin/users/{id}:
    patch:
      operationId: adminUpdateUser
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAccountView"
          description: OK
      summary: Update an account's app role
      tags:
      - Admin
  /admin/users/{id}/sessions:
    delete:
      operationId: adminRevokeUserSessions
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevokeSessionsResult"
          description: OK
      summary: "Force sign-out: revoke all of an account's active sessions"
      tags:
      - Admin
  /admin/workspaces:
    get:
      operationId: adminListWorkspaces
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminWorkspaceView"
          description: OK
      summary: List all workspaces (metadata only)
      tags:
      - Admin
  /auth/impersonate:
    post:
      operationId: impersonate
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImpersonateRequest"
        required: true
      responses:
        "200":
          description: OK
      summary: Begin impersonating another account
      tags:
      - Auth
  /auth/impersonate:exit:
    post:
      operationId: exitImpersonation
      responses:
        "200":
          description: OK
      summary: "Exit impersonation, restore operator session"
      tags:
      - Auth
  /auth/logout:
    post:
      operationId: logout
      responses:
        "200":
          description: OK
      summary: Log out — revoke the current token + clear the cookie
      tags:
      - Auth
  /auth/refresh:
    post:
      operationId: refresh
      responses:
        "200":
          description: OK
      summary: "Rotate the access token (new jti, old revoked)"
      tags:
      - Auth
  /contributors:
    get:
      description: Returns contributors to the Hephaestus project (for the About page)
      operationId: listGlobalContributors
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contributor"
          description: list of contributors sorted by contribution count
      security: []
      summary: List global contributors
      tags:
      - Contributors
  /identity-providers:
    get:
      operationId: listIdentityProviders
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IdentityProviderView"
          description: OK
      summary: List available identity providers
      tags:
      - Auth discovery
  /oauth/callback/{kind}:
    get:
      operationId: callbackGet
      parameters:
      - in: path
        name: kind
        required: true
        schema:
          type: string
      - in: query
        name: state
        required: false
        schema:
          type: string
      - in: query
        name: error
        required: false
        schema:
          type: string
      - in: query
        name: error_description
        required: false
        schema:
          type: string
      - in: query
        name: allParams
        required: true
        schema:
          type: object
          additionalProperties:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: OK
      tags:
      - o-auth-callback
    post:
      operationId: callbackPost
      parameters:
      - in: path
        name: kind
        required: true
        schema:
          type: string
      - in: query
        name: state
        required: false
        schema:
          type: string
      - in: query
        name: error
        required: false
        schema:
          type: string
      - in: query
        name: error_description
        required: false
        schema:
          type: string
      - in: query
        name: allParams
        required: true
        schema:
          type: object
          additionalProperties:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: OK
      tags:
      - o-auth-callback
  /user:
    delete:
      operationId: deleteCurrentUser
      parameters:
      - in: header
        name: X-Confirm-Delete
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
      summary: Delete the current account (GDPR Art. 17)
      tags:
      - Account
    get:
      operationId: getCurrentUser
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserView"
          description: OK
      summary: Get the current user
      tags:
      - Account
  /user/exports:
    post:
      operationId: requestDataExport
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportCreated"
          description: OK
      summary: Request a data export (async)
      tags:
      - Account
  /user/exports/{id}:
    get:
      operationId: getDataExportStatus
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportStatus"
          description: OK
      summary: Get data-export status
      tags:
      - Account
  /user/exports/{id}/download:
    get:
      operationId: downloadDataExport
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
                format: byte
          description: OK
      summary: Download the data-export bundle
      tags:
      - Account
  /user/features:
    get:
      description: Returns all feature flags evaluated for the authenticated user.
        Combines role checks and server-side config toggles.
      operationId: getUserFeatures
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureFlags"
          description: Feature flags evaluated successfully
      summary: Get feature flags for the current user
      tags:
      - Account
  /user/identities:
    get:
      operationId: listLinkedIdentities
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IdentityView"
          description: OK
      summary: List linked identity providers
      tags:
      - Account
  /user/identities/{id}:
    delete:
      operationId: unlinkIdentity
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "204":
          description: Identity unlinked
        "404":
          description: No such identity on the current account
        "409":
          description: Cannot unlink the account's only remaining sign-in method
      summary: Unlink one of the current user's linked identity providers
      tags:
      - Account
  /user/sessions:
    delete:
      operationId: revokeOtherSessions
      responses:
        "200":
          description: OK
      summary: Revoke all sessions except the current one
      tags:
      - Account
    get:
      operationId: listSessions
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionView"
          description: OK
      summary: List active sessions for the current user
      tags:
      - Account
  /user/sessions/{jti}:
    delete:
      operationId: revokeSession
      parameters:
      - in: path
        name: jti
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
      summary: Revoke a single session
      tags:
      - Account
  /user/settings:
    get:
      operationId: getUserSettings
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
          description: OK
      summary: Get user settings
      tags:
      - Account
    post:
      operationId: updateUserSettings
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSettings"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
          description: OK
      summary: Update user settings
      tags:
      - Account
  /user/slack/preferences:
    get:
      operationId: getSlackUserPreferences
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlackUserPreferences"
          description: OK
      summary: Get current user's Slack preferences
      tags:
      - Slack User Preferences
  /workspaces:
    get:
      operationId: listWorkspaces
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceListItem"
          description: Workspace list
      summary: List all workspaces
      tags:
      - workspace-registry
    post:
      operationId: createWorkspace
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
          description: Workspace created
      summary: Create a new workspace
      tags:
      - workspace-registry
  /workspaces/gitlab/groups:
    post:
      operationId: listGitLabGroups
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitLabPreflightRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GitLabGroup"
          description: Accessible groups
      summary: List GitLab groups accessible to a PAT
      tags:
      - git-lab-preflight
  /workspaces/gitlab/preflight:
    post:
      operationId: gitLabPreflight
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitLabPreflightRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitLabPreflightResponse"
          description: Validation result
      summary: Validate a GitLab PAT before workspace creation
      tags:
      - git-lab-preflight
  /workspaces/providers:
    get:
      description: Returns available workspace providers with their configuration.
        Public endpoint — no authentication required.
      operationId: getProviders
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceProviders"
          description: OK
      security: []
      summary: List available workspace creation providers
      tags:
      - workspace-registry
  /workspaces/{workspaceSlug}:
    delete:
      operationId: purgeWorkspace
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      responses:
        "204":
          description: Workspace purged
      summary: Purge (soft delete) a workspace
      tags:
      - workspace
    get:
      operationId: getWorkspace
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
          description: Workspace returned
      security: []
      summary: Fetch a workspace by slug
      tags:
      - workspace
  /workspaces/{workspaceSlug}/agent-configs:
    get:
      operationId: getConfigs
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentConfig"
          description: Agent configs returned
      summary: List agent configurations for a workspace
      tags:
      - Agent Config
    post:
      operationId: createConfig
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentConfigRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentConfig"
          description: Agent config created
        "409":
          description: Config name already exists in this workspace
      summary: Create a new agent configuration
      tags:
      - Agent Config
  /workspaces/{workspaceSlug}/agent-configs/{configId}:
    delete:
      operationId: deleteConfig
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - in: path
        name: configId
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "204":
          description: Agent config deleted
        "404":
          description: Agent config not found
        "409":
          description: Cannot delete config with active jobs
      summary: Delete an agent configuration
      tags:
      - Agent Config
    get:
      operationId: getConfig
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - in: path
        name: configId
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentConfig"
          description: Agent config returned
        "404":
          description: Agent config not found
      summary: Get a specific agent configuration
      tags:
      - Agent Config
    patch:
      operationId: updateConfig
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - in: path
        name: configId
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentConfigRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentConfig"
          description: Agent config updated
        "404":
          description: Agent config not found
      summary: Update an existing agent configuration
      tags:
      - Agent Config
  /workspaces/{workspaceSlug}/agent-jobs:
    get:
      operationId: listJobs
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
