    ConnectionAuditEntry:
      type: object
      description: |-
        Audit-log entry returned by <code>GET /workspaces/{workspaceSlug</code>/connections/{id}/audit}.

         <p>Lean projection of {@link ConnectionAudit ConnectionAudit} — the entity carries a back-reference
         to {@link de.tum.cit.aet.hephaestus.integration.core.connection.Connection de.tum.cit.aet.hephaestus.integration.core.connection.Connection} that we don't
         want to serialize on every response.
      properties:
        actorKind:
          type: string
        actorRef:
          type: string
        correlationId:
          type: string
        eventType:
          type: string
        fromState:
          type: string
          enum:
          - PENDING
          - ACTIVE
          - SUSPENDED
          - UNINSTALLED
        occurredAt:
          type: string
          format: date-time
        toState:
          type: string
          enum:
          - PENDING
          - ACTIVE
          - SUSPENDED
          - UNINSTALLED
    ConnectionDetail:
      type: object
      description: |-
        Detailed view of a single Connection — extends {@link ConnectionSummaryDTO ConnectionSummaryDTO} with the
         sealed config serialized to a free-form JSON object (<code>Map&lt;String, Object&gt;</code> →
         <code>type: object, additionalProperties: true</code> in the spec, so it round-trips through
         client codegen). NEVER carries credentials: the encrypted credential blob stays inside the
         entity, and every secret-bearing key of the config itself is stripped by
         {@link de.tum.cit.aet.hephaestus.integration.core.connection.api.ConnectionDetailDTO#redactSensitive #redactSensitive} before serialization.

         <p><b>Why redact here and not with <code>@JsonIgnore</code> on the record component?</b> The very
         same {@link ObjectMapper ObjectMapper} bean serializes {@link de.tum.cit.aet.hephaestus.integration.core.connection.api.ConnectionDetailDTO  de.tum.cit.aet.hephaestus.integration.core.connection.ConnectionConfig} into the JSONB
         <code>connection.config</code> column (Hibernate's <code>json_format_mapper</code> is wired to it in
         <code>HibernateJacksonFormatMapperConfig</code>). Annotating the component would therefore drop the
         secret on write and destroy the stored value — the API-boundary filter below is the only place
         the two concerns can be separated.

         <p>Mirroring the summary fields (rather than embedding the summary record) keeps
         the JSON shape flat — the API consumer sees one record, not a nested <code>summary</code>
         object.
      properties:
        capabilities:
          type: array
          items:
            type: string
            enum:
            - WEBHOOK_INGEST
            - TOKEN_REFRESH
            - FEEDBACK_DELIVERY
            - INLINE_FINDINGS
            - APPROVAL_WORKFLOW
            - SCOPE_CHANGES
          uniqueItems: true
        config:
          type: object
          additionalProperties: {}
        createdAt:
          type: string
          format: date-time
        displayName:
          type: string
        family:
          type: string
          enum:
          - SCM
          - MESSAGING
          - DOCUMENTATION
        id:
          type: integer
          format: int64
        instanceKey:
          type: string
        kind:
          type: string
          enum:
          - GITHUB
          - GITLAB
          - SLACK
          - OUTLINE
        state:
          type: string
          enum:
          - PENDING
          - ACTIVE
          - SUSPENDED
          - UNINSTALLED
        stateReason:
          type: string
        updatedAt:
          type: string
          format: date-time
    ConnectionSummary:
      type: object
      description: |-
        Wire shape returned by the <code>GET /workspaces/{workspaceSlug</code>/connections}
         list + by lifecycle endpoints (suspend, reactivate). Lightweight — no config, no
         credentials, no audit. Capabilities are looked up from the per-kind manifest at
         response build time so adding/removing a capability needs no DB migration.
      properties:
        capabilities:
          type: array
          items:
            type: string
            enum:
            - WEBHOOK_INGEST
            - TOKEN_REFRESH
            - FEEDBACK_DELIVERY
            - INLINE_FINDINGS
            - APPROVAL_WORKFLOW
            - SCOPE_CHANGES
          uniqueItems: true
        createdAt:
          type: string
          format: date-time
        displayName:
          type: string
        family:
          type: string
          enum:
          - SCM
          - MESSAGING
          - DOCUMENTATION
        id:
          type: integer
          format: int64
        instanceKey:
          type: string
        kind:
          type: string
          enum:
          - GITHUB
          - GITLAB
          - SLACK
          - OUTLINE
        state:
          type: string
          enum:
          - PENDING
          - ACTIVE
          - SUSPENDED
          - UNINSTALLED
        stateReason:
          type: string
        updatedAt:
          type: string
          format: date-time
    ConnectionSyncStatus:
      type: object
      description: Unified sync-observability status for one connection
      properties:
        activeJob:
          $ref: "#/components/schemas/SyncJob"
          description: "Currently PENDING/RUNNING job, if any"
        backfill:
          $ref: "#/components/schemas/BackfillSummary"
          description: "Connection-level backfill rollup, if applicable"
        backfillSupported:
          type: boolean
          description: "Whether this kind's runner offers an explicitly triggerable\
            \ backfill pass. Reflects the vendor capability only — the scheduled-backfill\
            \ flag does not gate it, so a manual backfill stays available while the\
            \ automatic cycle is administratively paused."
        connectionId:
          type: integer
          format: int64
          description: Connection id
        connectionState:
          type: string
          description: Raw connection lifecycle state
          enum:
          - PENDING
          - ACTIVE
          - SUSPENDED
          - UNINSTALLED
        health:
          type: string
          description: Derived health
          enum:
          - PENDING
          - HEALTHY
          - DEGRADED
          - FAILED
          - SUSPENDED
        kind:
          type: string
          description: Integration kind
          enum:
          - GITHUB
          - GITLAB
          - SLACK
          - OUTLINE
        lastEventProcessedAt:
          type: string
          format: date-time
          description: "When the last inbound webhook/event was processed for this\
            \ connection, if any"
        lastJob:
          $ref: "#/components/schemas/SyncJob"
          description: "Most recently finished job, if any"
        lastSuccessfulSyncAt:
          type: string
          format: date-time
          description: Most recent successful job's finish time
        nextScheduledSyncAt:
          type: string
          format: date-time
          description: When the next periodic reconciliation is expected
        rateLimit:
          $ref: "#/components/schemas/RateLimitSnapshot"
          description: "Current rate-limit budget, if known"
        resourceCounts:
          $ref: "#/components/schemas/ResourceCounts"
          description: Resource-level rollup
        syncIntervalSeconds:
          type: integer
          format: int64
          description: "The periodic reconciliation's cadence in seconds, when the\
            \ schedule has a regular one. This is what makes a resource's lastSyncedAt\
            \ judgeable: \"synced 4h ago\" is only stale if the cadence is hourly,\
            \ and a client cannot know that without this. Null when the schedule is\
            \ irregular or unparseable — clients must then decline to judge staleness\
            \ rather than assume a default, exactly as the server's own stale rollup\
            \ does."
        webhookRegistered:
          type: boolean
          description: Whether the vendor webhook registration is present; null if
            not applicable/unknown
      required:
      - backfillSupported
      - connectionId
      - connectionState
      - health
      - kind
      - resourceCounts
    Contributor:
