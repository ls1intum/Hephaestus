    ProfileActivityStats:
      type: object
      description: Aggregated activity statistics with XP scores for a user profile
      properties:
        numberOfApprovals:
          type: integer
          format: int32
          description: Number of approvals given
          example: 15
        numberOfChangeRequests:
          type: integer
          format: int32
          description: Number of change requests submitted
          example: 8
        numberOfClosedIssues:
          type: integer
          format: int32
          description: Number of issues closed in the timeframe
          example: 2
        numberOfClosedPullRequests:
          type: integer
          format: int32
          description: Number of authored pull requests closed without merge in the
            timeframe
          example: 1
        numberOfCodeComments:
          type: integer
          format: int32
          description: Number of scored inline feedback comments on pull requests
            authored by someone else
          example: 30
        numberOfComments:
          type: integer
          format: int32
          description: Number of comment-only review submissions
          example: 12
        numberOfMergedPullRequests:
          type: integer
          format: int32
          description: Number of authored pull requests merged in the timeframe
          example: 6
        numberOfOpenPullRequests:
          type: integer
          format: int32
          description: Number of authored pull requests opened in the timeframe that
            are still open
          example: 2
        numberOfOpenedIssues:
          type: integer
          format: int32
          description: Number of issues opened in the timeframe
          example: 3
        numberOfOwnReplies:
          type: integer
          format: int32
          description: Number of visible-only discussion replies and inline thread
            replies on the user's own pull requests
          example: 4
        numberOfReviewedPRs:
          type: integer
          format: int32
          description: Number of distinct pull requests reviewed
          example: 42
        numberOfUnknowns:
          type: integer
          format: int32
          description: Number of reviews with unknown state
          example: 0
        score:
          type: integer
          format: int32
          description: Total XP score
          example: 1250
      required:
      - numberOfApprovals
      - numberOfChangeRequests
      - numberOfClosedIssues
      - numberOfClosedPullRequests
      - numberOfCodeComments
      - numberOfComments
      - numberOfMergedPullRequests
      - numberOfOpenPullRequests
      - numberOfOpenedIssues
      - numberOfOwnReplies
      - numberOfReviewedPRs
      - numberOfUnknowns
      - score
