    SlackChannelConsentEvent:
      type: object
      description: An immutable Slack channel consent-transition audit entry
      properties:
        actorUserId:
          type: integer
          format: int64
          description: Workspace user id of the admin who made the change
        createdAt:
          type: string
          format: date-time
          description: When the transition was recorded
        fromState:
          type: string
          description: State the channel left (absent for the very first record)
          enum:
          - PENDING
          - ACTIVE
          - PAUSED
          - REVOKED
        id:
          type: integer
          format: int64
          description: Audit entry id
        reason:
          type: string
          description: Optional free-text reason the admin supplied
        slackChannelId:
          type: string
          description: Slack channel id the transition applied to
        toState:
          type: string
          description: State the channel entered
          enum:
          - PENDING
          - ACTIVE
          - PAUSED
          - REVOKED
      required:
      - createdAt
      - id
      - slackChannelId
      - toState
    SlackMonitoredChannel:
      type: object
      description: An allow-listed Slack channel with its consent state and person
        opt-out count
      properties:
        channelName:
          type: string
          description: "Human-readable channel name, if known"
        consentAnnouncedAt:
          type: string
          format: date-time
          description: When the in-channel consent announcement was posted (stamped
            on first activation)
        consentState:
          type: string
          description: Current per-channel consent lifecycle state
          enum:
          - PENDING
          - ACTIVE
          - PAUSED
          - REVOKED
        createdAt:
          type: string
          format: date-time
          description: When the channel was first discovered / allow-listed
        id:
          type: integer
          format: int64
          description: Internal allow-list row id
        optedOutMemberCount:
          type: integer
          format: int64
          description: Number of workspace members who have opted out of ingestion
            (workspace-wide)
        slackChannelId:
          type: string
          description: Slack channel id (stable C…/G… id; the natural key)
        slackTeamId:
          type: string
          description: Slack team (workspace) id the channel belongs to
      required:
      - consentState
      - createdAt
      - id
      - optedOutMemberCount
      - slackChannelId
      - slackTeamId
