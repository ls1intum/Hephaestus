          type: integer
          format: int32
          description: Sort order within the workspace
        icon:
          type: string
          description: Optional lucide icon name giving the area a glanceable identity
          maxLength: 64
          minLength: 0
          pattern: "^[A-Za-z0-9]+$"
        name:
          type: string
          description: Human-readable name
          maxLength: 128
          minLength: 3
          pattern: .*\S.*
    UpdatePracticeRequest:
      type: object
      description: Request to update an existing practice definition (PATCH — only
        non-null fields applied)
      properties:
        artifactType:
          type: string
          description: Artifact this practice evaluates
          enum:
          - PULL_REQUEST
          - ISSUE
          - CONVERSATION_THREAD
          example: ISSUE
        criteria:
          type: string
          description: Practice evaluation criteria
          maxLength: 50000
          minLength: 0
          pattern: .*\S.*
        name:
          type: string
          description: Human-readable name
          example: PR Description Quality
          maxLength: 128
          minLength: 3
          pattern: .*\S.*
