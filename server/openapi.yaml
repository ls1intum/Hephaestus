  /workspaces/{workspaceSlug}/connections/slack/test-message:
    post:
      description: |-
        Probe the Slack connection by posting a test message. This is a <em>probe</em>: every outcome
         — success, a Slack-side rejection (e.g. <code>not_in_channel</code>), or a missing channel — is a
         200 result carrying <code>ok</code>/<code>slackError</code>, never an HTTP error. That lets the admin UI
         test a typed-but-not-yet-saved channel and render the Slack error inline without conflating it
         with a transport failure.
      operationId: sendSlackTestMessage
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SlackTestMessageRequest"
        description: |-
          the channel to probe; when blank the probe reports <code>no_channel_configured</code>
               (nothing writes a persisted default channel since the digest removal).
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlackTestMessageResponse"
          description: OK
      summary: Post a test message to verify the Slack connection
      tags:
      - Connections
