          - GITHUB
          - GITLAB
          - SLACK
          - OUTLINE
          - OIDC_LOGIN_GITHUB
          - OIDC_LOGIN_GITLAB
        redirectAfter:
          type: string
          format: uri
        userInput:
          type: object
          additionalProperties:
            type: string
