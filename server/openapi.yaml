openapi: 3.1.0
info:
  contact:
    email: felixtj.dietrich@tum.de
    name: Felix T.J. Dietrich
  description: API documentation for the Hephaestus application server.
  license:
    name: MIT License
    url: https://github.com/ls1intum/Hephaestus/blob/develop/LICENSE
  title: Hephaestus API
  version: 0.0.0-development
servers:
- description: Default Server URL
  url: /
security:
- bearerAuth: []
tags:
- description: User achievement progress and unlocks
  name: Achievements
- description: Global contributor information
  name: Contributors
- description: User preferences
  name: Account
- description: Workspace-scoped agent configuration management
  name: Agent Config
- description: Workspace-scoped mentor chat threads
  name: Mentor Threads
- description: |-
    Controller for managing workspace memberships and roles.
     Handles CRUD operations for workspace members and role assignments.
  name: workspace-membership-controller
- description: Workspace-scoped agent job monitoring
  name: Agent Jobs
- description: |-
    Administrative REST surface for managing per-workspace
     {@link de.tum.cit.aet.hephaestus.integration.core.connection.Connection de.tum.cit.aet.hephaestus.integration.core.connection.Connection} rows — list, read,
     initiate, suspend, reactivate, disconnect, audit.

     <p>Thin HTTP adapter: all repository access lives in {@link ConnectionAdminService ConnectionAdminService};
     the state machine + audit invariants live in {@link ConnectionService ConnectionService}; per-kind
     vendor flows live in {@link ConnectionStrategy ConnectionStrategy} implementations. The controller's
     only jobs are HTTP wire mapping (DTO ↔ entity), strategy resolution, and exception
     translation.

     <p>The <code>workspaceId</code> path variable + class-level
     {@link RequireAtLeastWorkspaceAdmin RequireAtLeastWorkspaceAdmin} satisfy the
     <code>MultiTenancyArchitectureTest.dataEndpointsReceiveWorkspaceContext</code> rule — the
     annotation simple name contains <code>Workspace</code>, which the rule recognises as a
     workspace-context guard.
  name: connection-controller
- description: "User account management (settings, deletion)"
  name: Account
- description: |-
    Unified webhook ingest controller.

     <p><code>POST /webhooks/{kind</code>} is the sole webhook entry point. Per-kind
     routing resolves the {@link IntegrationKindRouting kind} from the path and
     delegates to {@link WebhookIngestPipeline WebhookIngestPipeline}, which dispatches signature
     verification, subject derivation and JetStream publication through the per-kind
     {@link de.tum.cit.aet.hephaestus.integration.core.spi.WebhookSignatureVerifier de.tum.cit.aet.hephaestus.integration.core.spi.WebhookSignatureVerifier} and
     {@link de.tum.cit.aet.hephaestus.integration.core.spi.SubjectKeyDeriver de.tum.cit.aet.hephaestus.integration.core.spi.SubjectKeyDeriver} beans.
     GitHub, GitLab, Slack and Outline all share this endpoint.

     <p>Active only on the webhook runtime role.
  name: webhook-controller
- description: Team management within workspace
  name: Teams
- description: Super-admin account management
  name: Admin
- description: Contributor feedback on AI-generated practice findings
  name: Finding Feedback
- description: User profile and activity data
  name: Profile
- description: Contributor rankings and league statistics
  name: Leaderboard
- description: Session lifecycle
  name: Auth
- description: Active sessions
  name: Account
- description: |-
    Workspace registry endpoints that operate outside of a specific workspace slug.
     These routes stay under the classic /workspaces base path while slugged routes
     live in {@link WorkspaceController WorkspaceController} via <code>@WorkspaceScopedController</code>.
  name: workspace-registry-controller
- description: Read-only access to practice evaluation findings
  name: Practice Findings
- description: Up/down votes on mentor assistant messages
  name: Mentor Votes
- description: GDPR Art. 20 self-service data export
  name: Account
- description: Slack admin connectivity probe — test-message dispatch.
  name: slack-connection-admin-controller
- description: OIDC issuer metadata (public)
  name: Auth discovery
- description: |-
    Vendor OAuth redirect ingress at <code>/oauth/callback/{kind</code>}. Unauthenticated —
     identity comes from the HMAC-signed <code>state</code> param. Browsers get 302 redirects
     on both success and failure; only <code>Accept: application/json</code> requests get
     4xx JSON.
  name: o-auth-callback-controller
- description: Manage practice definitions
  name: Practice Catalog
- description: Workspace-scoped team settings management
  name: Team Settings
- description: Identity provider discovery (public)
  name: Auth discovery
- description: |-
    GitLab-specific REST endpoints used during the workspace creation wizard:
     <code>POST /workspaces/gitlab/preflight</code> validates a PAT, <code>POST /workspaces/gitlab/groups</code>
     lists accessible groups for one. Split from <code>WorkspaceRegistryController</code> so the
     workspace module no longer imports {@link GitLabPreflightService GitLabPreflightService}; the routes keep the
     existing <code>/workspaces/gitlab/*</code> URL space for API stability.

     <p>Both endpoints are gated by the <code>GITLAB_WORKSPACE_CREATION</code> feature flag via
     <code>@PreAuthorize</code> — identical to the previous protection on the merged controller.
  name: git-lab-preflight-controller
- description: "Current user identity, linked accounts, deletion"
  name: Account
paths:
  /.well-known/jwks.json:
    get:
      operationId: getJwks
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: OK
      summary: JWK set (public keys only)
      tags:
      - Auth discovery
  /.well-known/openid-configuration:
    get:
      operationId: getOpenidConfiguration
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: OK
      summary: OIDC issuer metadata
      tags:
      - Auth discovery
  /admin/users:
    get:
      operationId: adminListUsers
      parameters:
      - in: query
        name: page
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - in: query
        name: size
        required: false
        schema:
          type: integer
          format: int32
          default: 50
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminAccountView"
          description: OK
      summary: List accounts (paged)
      tags:
      - Admin
  /admin/users/{id}:
    patch:
      operationId: adminUpdateUser
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAccountView"
          description: OK
      summary: Update an account's app role
      tags:
      - Admin
  /api/v1/workspaces/{workspaceId}/connections:
    get:
      operationId: list
      parameters:
      - in: path
        name: workspaceId
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConnectionSummary"
          description: OK
      tags:
      - connection
    post:
      operationId: initiate
      parameters:
      - in: path
        name: workspaceId
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiateConnectionRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/Linked"
                - $ref: "#/components/schemas/Redirect"
          description: OK
      tags:
      - connection
  /api/v1/workspaces/{workspaceId}/connections/slack/test-message:
    post:
      operationId: sendTestMessage
      parameters:
      - in: path
        name: workspaceId
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlackTestMessageResponse"
          description: OK
      tags:
      - slack-connection-admin
  /api/v1/workspaces/{workspaceId}/connections/{id}:
    get:
      operationId: read
      parameters:
      - in: path
        name: workspaceId
        required: true
        schema:
          type: integer
          format: int64
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionDetail"
          description: OK
      tags:
      - connection
  /api/v1/workspaces/{workspaceId}/connections/{id}/audit:
    get:
      operationId: audit
      parameters:
      - in: path
        name: workspaceId
        required: true
        schema:
          type: integer
          format: int64
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConnectionAuditEntry"
          description: OK
      tags:
      - connection
  /api/v1/workspaces/{workspaceId}/connections/{id}/disconnect:
    post:
      operationId: disconnect
      parameters:
      - in: path
        name: workspaceId
        required: true
        schema:
          type: integer
          format: int64
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
      tags:
      - connection
  /api/v1/workspaces/{workspaceId}/connections/{id}/reactivate:
    post:
      operationId: reactivate
      parameters:
      - in: path
        name: workspaceId
        required: true
        schema:
          type: integer
          format: int64
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionSummary"
          description: OK
      tags:
      - connection
  /api/v1/workspaces/{workspaceId}/connections/{id}/suspend:
    post:
      operationId: suspend
      parameters:
      - in: path
        name: workspaceId
        required: true
        schema:
          type: integer
          format: int64
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionSummary"
          description: OK
      tags:
      - connection
  /auth/impersonate:
    post:
      operationId: impersonate
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImpersonateRequest"
        required: true
      responses:
        "200":
          description: OK
      summary: Begin impersonating another account
      tags:
      - Auth
  /auth/impersonate:exit:
    post:
      operationId: exitImpersonation
      responses:
        "200":
          description: OK
      summary: "Exit impersonation, restore operator session"
      tags:
      - Auth
  /auth/logout:
    post:
      operationId: logout
      responses:
        "200":
          description: OK
      summary: Log out — revoke the current token + clear the cookie
      tags:
      - Auth
  /auth/refresh:
    post:
      operationId: refresh
      responses:
        "200":
          description: OK
      summary: "Rotate the access token (new jti, old revoked)"
      tags:
      - Auth
  /contributors:
    get:
      description: Returns contributors to the Hephaestus project (for the About page)
      operationId: listGlobalContributors
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contributor"
          description: list of contributors sorted by contribution count
      security: []
      summary: List global contributors
      tags:
      - Contributors
  /identity-providers:
    get:
      operationId: listIdentityProviders
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IdentityProviderView"
          description: OK
      summary: List available identity providers
      tags:
      - Auth discovery
  /oauth/callback/{kind}:
    get:
      operationId: callbackGet
      parameters:
      - in: path
        name: kind
        required: true
        schema:
          type: string
      - in: query
        name: state
        required: false
        schema:
          type: string
      - in: query
        name: error
        required: false
        schema:
          type: string
      - in: query
        name: error_description
        required: false
        schema:
          type: string
      - in: query
        name: allParams
        required: true
        schema:
          type: object
          additionalProperties:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: OK
      tags:
      - o-auth-callback
    post:
      operationId: callbackPost
      parameters:
      - in: path
        name: kind
        required: true
        schema:
          type: string
      - in: query
        name: state
        required: false
        schema:
          type: string
      - in: query
        name: error
        required: false
        schema:
          type: string
      - in: query
        name: error_description
        required: false
        schema:
          type: string
      - in: query
        name: allParams
        required: true
        schema:
          type: object
          additionalProperties:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: OK
      tags:
      - o-auth-callback
  /user:
    delete:
      operationId: deleteCurrentUser
      parameters:
      - in: header
        name: X-Confirm-Delete
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
      summary: Delete the current account (GDPR Art. 17)
      tags:
      - Account
    get:
      operationId: getCurrentUser
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserView"
          description: OK
      summary: Get the current user
      tags:
      - Account
  /user/exports:
    post:
      operationId: requestDataExport
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportCreated"
          description: OK
      summary: Request a data export (async)
      tags:
      - Account
  /user/exports/{id}:
    get:
      operationId: getDataExportStatus
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportStatus"
          description: OK
      summary: Get data-export status
      tags:
      - Account
  /user/exports/{id}/download:
    get:
      operationId: downloadDataExport
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
                format: byte
          description: OK
      summary: Download the data-export bundle
      tags:
      - Account
  /user/features:
    get:
      description: Returns all feature flags evaluated for the authenticated user.
        Combines role checks and server-side config toggles.
      operationId: getUserFeatures
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureFlags"
          description: Feature flags evaluated successfully
      summary: Get feature flags for the current user
      tags:
      - Account
  /user/identities:
    get:
      operationId: listLinkedIdentities
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IdentityView"
          description: OK
      summary: List linked identity providers
      tags:
      - Account
  /user/sessions:
    delete:
      operationId: revokeOtherSessions
      responses:
        "200":
          description: OK
      summary: Revoke all sessions except the current one
      tags:
      - Account
    get:
      operationId: listSessions
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionView"
          description: OK
      summary: List active sessions for the current user
      tags:
      - Account
  /user/sessions/{jti}:
    delete:
      operationId: revokeSession
      parameters:
      - in: path
        name: jti
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
      summary: Revoke a single session
      tags:
      - Account
  /user/settings:
    get:
      operationId: getUserSettings
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
          description: OK
      summary: Get user settings
      tags:
      - Account
    post:
      operationId: updateUserSettings
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSettings"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
          description: OK
      summary: Update user settings
      tags:
      - Account
  /webhooks/{kind}:
    post:
      operationId: ingest
      parameters:
      - in: path
        name: kind
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: OK
      tags:
      - webhook
  /workspaces:
    get:
      operationId: listWorkspaces
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceListItem"
          description: Workspace list
      summary: List all workspaces
      tags:
      - workspace-registry
    post:
      operationId: createWorkspace
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
          description: Workspace created
      summary: Create a new workspace
      tags:
      - workspace-registry
  /workspaces/gitlab/groups:
    post:
      operationId: listGitLabGroups
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitLabPreflightRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GitLabGroup"
          description: Accessible groups
      summary: List GitLab groups accessible to a PAT
      tags:
      - git-lab-preflight
  /workspaces/gitlab/preflight:
    post:
      operationId: gitLabPreflight
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitLabPreflightRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitLabPreflightResponse"
          description: Validation result
      summary: Validate a GitLab PAT before workspace creation
      tags:
      - git-lab-preflight
  /workspaces/providers:
    get:
      description: Returns available workspace providers with their configuration.
        Public endpoint — no authentication required.
      operationId: getProviders
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceProviders"
          description: OK
      security: []
      summary: List available workspace creation providers
      tags:
      - workspace-registry
  /workspaces/{workspaceSlug}:
    delete:
      operationId: purgeWorkspace
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      responses:
        "204":
          description: Workspace purged
      summary: Purge (soft delete) a workspace
      tags:
      - workspace
    get:
      operationId: getWorkspace
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
          description: Workspace returned
      security: []
      summary: Fetch a workspace by slug
      tags:
      - workspace
  /workspaces/{workspaceSlug}/agent-configs:
    get:
      operationId: getConfigs
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentConfig"
          description: Agent configs returned
      summary: List agent configurations for a workspace
      tags:
      - Agent Config
    post:
      operationId: createConfig
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentConfigRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentConfig"
          description: Agent config created
        "409":
          description: Config name already exists in this workspace
      summary: Create a new agent configuration
      tags:
      - Agent Config
  /workspaces/{workspaceSlug}/agent-configs/{configId}:
    delete:
      operationId: deleteConfig
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - in: path
        name: configId
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "204":
          description: Agent config deleted
        "404":
          description: Agent config not found
        "409":
          description: Cannot delete config with active jobs
      summary: Delete an agent configuration
      tags:
      - Agent Config
    get:
      operationId: getConfig
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - in: path
        name: configId
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentConfig"
          description: Agent config returned
        "404":
          description: Agent config not found
      summary: Get a specific agent configuration
      tags:
      - Agent Config
    patch:
      operationId: updateConfig
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - in: path
        name: configId
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentConfigRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentConfig"
          description: Agent config updated
        "404":
          description: Agent config not found
      summary: Update an existing agent configuration
      tags:
      - Agent Config
  /workspaces/{workspaceSlug}/agent-jobs:
    get:
      operationId: listJobs
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
