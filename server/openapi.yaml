          description: Whether this area is active
        color:
          type: string
          description: Optional palette colour key for the area's chip
          maxLength: 32
          minLength: 0
          pattern: "^[a-z]+$"
        description:
          type: string
          description: What this area develops
          maxLength: 5000
          minLength: 0
