          description: Repository settings returned
      security: []
      summary: Get repository settings
      tags:
      - Team Settings
    patch:
      description: Updates the contribution visibility settings for a repository in
        a team
      operationId: updateRepositorySettings
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - description: the team ID
        in: path
        name: teamId
        required: true
        schema:
          type: integer
          format: int64
      - description: the repository ID
        in: path
        name: repositoryId
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRepositorySettingsRequest"
        description: the update request containing the hiddenFromContributions flag
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceTeamRepositorySettings"
          description: Repository settings updated
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceTeamRepositorySettings"
          description: Team or repository not found
      summary: Update repository settings
      tags:
      - Team Settings
  /workspaces/{workspaceSlug}/token:
    patch:
      operationId: updateToken
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceTokenRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
          description: Workspace updated
      summary: Update workspace Personal Access Token
      tags:
      - workspace
  /workspaces/{workspaceSlug}/users:
    get:
      operationId: getUsersWithTeams
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserTeams"
          description: OK
      security: []
      summary: List workspace users and the teams they belong to
      tags:
      - workspace
  /workspaces/{workspaceSlug}/users/{login}/achievements:
    get:
      description: Returns all achievements with progress information for the specified
        user
      operationId: getUserAchievements
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - description: the user's GitHub login
        in: path
        name: login
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Achievement"
          description: list of all achievements with user-specific progress
      security: []
      summary: Get user achievements
      tags:
      - Achievements
  /workspaces/{workspaceSlug}/users/{login}/achievements/definitions:
    get:
      description: Returns the master list of all available achievements. Restricted
        to non-prod environments.
      operationId: getAllAchievementDefinitions
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - in: path
        name: login
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Achievement"
          description: OK
      security: []
      summary: Get all achievement definitions
      tags:
      - Achievements
  /workspaces/{workspaceSlug}/users/{login}/achievements/recalculate:
    post:
      description: Wipes and historically recalculates a user's achievement timeline.
        Admin only.
      operationId: recalculateUserAchievements
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - description: the user's GitHub login
        in: path
        name: login
        required: true
        schema:
          type: string
      responses:
        "202":
          description: Recalculation task started successfully
      summary: Recalculate user achievements
      tags:
      - Achievements
  /workspaces/{workspaceSlug}/users/{login}/achievements/reload:
    post:
      description: Hot reloads the achievements.yml configuration without requiring
        a restart. Admin only.
      operationId: reloadAchievements
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - in: path
        name: login
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
      summary: Reload achievements configuration
      tags:
      - Achievements
components:
  schemas:
    AccountRef:
      type: object
      description: A human-readable account identity. <code>displayName</code>/<code>email</code>
        are null for deleted accounts.
      properties:
        displayName:
          type: string
        email:
          type: string
        id:
          type: integer
          format: int64
      required:
      - id
    Achievement:
      type: object
      description: Achievement with user-specific progress information
      properties:
        category:
          type: string
          description: Category for grouping achievements
          enum:
          - pull_requests
          - commits
          - communication
          - issues
          - milestones
          example: pull_requests
        id:
          type: string
          $ref: "#/components/schemas/AchievementId"
          description: Unique identifier for the achievement
          example: pr.merged.common.1
        isHidden:
          type: boolean
          description: Whether the achievement should be hidden until unlocked
        parent:
          type: string
          description: Parent achievement in progression chain
          example: first_pull
        progressData:
          description: The structured progress data based on the achievements evaluator
          oneOf:
          - $ref: "#/components/schemas/BinaryAchievementProgress"
          - $ref: "#/components/schemas/LinearAchievementProgress"
        rarity:
          type: string
          description: Visual level tier/rarity for badge styling
          enum:
          - common
          - uncommon
          - rare
          - epic
          - legendary
          - mythic
          example: common
        status:
          type: string
          description: Current status of the achievement for this user
          enum:
          - locked
          - available
          - unlocked
          - hidden
          example: unlocked
        unlockedAt:
          type: string
          format: date-time
          description: "Optional of when the achievement was unlocked, empty() if\
            \ not unlocked"
      required:
      - category
      - id
      - progressData
      - rarity
      - status
      - unlockedAt
    AchievementId:
      type: string
      enum:
      - commit.common.1
      - commit.common.2
      - commit.epic
      - commit.legendary
      - commit.mythic
      - commit.rare
      - commit.special.atomic_changes
      - commit.special.brute_force
      - commit.special.cross_boundary
      - commit.special.itsy_bitsy
      - commit.uncommon.1
      - commit.uncommon.2
      - issue.close.common.1
      - issue.close.common.2
      - issue.close.epic
      - issue.close.legendary
      - issue.close.rare
      - issue.close.uncommon
      - issue.open.common.1
      - issue.open.common.2
      - issue.open.epic
      - issue.open.legendary
      - issue.open.rare
      - issue.open.uncommon
      - issue.special.hive_mind
      - issue.special.necromancer
      - issue.special.oracle
      - milestone.all_epic
      - milestone.all_legendary
      - milestone.all_rare
      - milestone.first_action
      - milestone.long_time_return
      - milestone.night_owl
      - milestone.polyglot
      - pr.merged.common.1
      - pr.merged.common.2
      - pr.merged.epic
      - pr.merged.legendary
      - pr.merged.rare
      - pr.merged.uncommon
      - pr.special.speedster
      - review.common.1
      - review.common.2
      - review.epic
      - review.legendary
      - review.mythic
      - review.rare
      - review.uncommon.1
      - review.uncommon.2
    AchievementProgress:
      description: Polymorphic progress data
      discriminator:
        propertyName: type
      properties:
        type:
          type: string
      required:
      - type
    AdminAccountView:
      type: object
      properties:
        appRole:
          type: string
        displayName:
          type: string
        id:
          type: integer
          format: int64
        primaryEmail:
          type: string
        status:
          type: string
    AdminWorkspaceLlmUsage:
      type: object
      description: "Instance-admin per-workspace month rollup (metadata only, no tenant\
        \ content)"
      properties:
        byoTotalCostUsd:
          type: number
          description: "This month's spend on the workspace's own connected provider(s),\
            \ in USD. Never counts toward the budget cap."
        displayName:
          type: string
        events:
          type: integer
          format: int64
          description: "Ledger events (jobs / mentor turns) this month, any provider"
        monthlyBudgetUsd:
          type: number
        pricedTotalCostUsd:
          type: number
          description: "This month's confirmed spend on shared (instance) models,\
            \ in USD — compared against the budget cap above."
        verdict:
          type: string
          description: "Whether this month's confirmed spend is within the cap, has\
            \ reached it, or can't be fully confirmed yet because some usage has no\
            \ price set."
          enum:
          - WITHIN
          - EXHAUSTED
          - UNVERIFIABLE
        workspaceId:
          type: integer
          format: int64
        workspaceSlug:
          type: string
      required:
      - byoTotalCostUsd
      - displayName
      - events
      - pricedTotalCostUsd
      - verdict
      - workspaceId
      - workspaceSlug
    AdminWorkspaceView:
      type: object
      description: Metadata-only workspace summary for the instance-admin overview
      properties:
        accountLogin:
          type: string
        createdAt:
          type: string
          format: date-time
        displayName:
          type: string
        id:
          type: integer
          format: int64
        memberCount:
          type: integer
          format: int64
        ownerLogin:
          type: string
        providerType:
          type: string
          enum:
          - GITHUB
          - GITLAB
          - SLACK
          - OUTLINE
        status:
          type: string
        workspaceSlug:
          type: string
      required:
      - accountLogin
      - createdAt
      - displayName
      - id
      - memberCount
      - status
      - workspaceSlug
    AgentConfig:
      type: object
      description: Agent configuration for a workspace (API key redacted)
      properties:
        allowInternet:
          type: boolean
          description: Whether agent containers have internet access
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the config was created
        enabled:
          type: boolean
          description: Whether the agent is enabled
        hasLlmApiKey:
          type: boolean
          description: Whether an LLM API key is configured
        id:
          type: integer
          format: int64
          description: Configuration ID
        instanceModelId:
          type: integer
          format: int64
          description: "Bound shared (instance catalog) model id, if bound to one"
        llmBaseUrl:
          type: string
          description: Optional LLM base URL override
        llmProvider:
          type: string
          description: LLM provider
          enum:
          - ANTHROPIC
          - OPENAI
          - AZURE_OPENAI
        maxConcurrentJobs:
          type: integer
          format: int32
          description: Maximum concurrent jobs
        modelName:
          type: string
          description: LLM model name
          example: gpt-5.4-mini
        name:
          type: string
          description: Unique name within the workspace
        timeoutSeconds:
          type: integer
          format: int32
          description: Job timeout in seconds
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the config was last updated
        workspaceModelId:
          type: integer
          format: int64
          description: "Bound model id on your own provider, if bound to one"
      required:
      - allowInternet
      - createdAt
      - enabled
      - hasLlmApiKey
      - id
      - llmProvider
      - maxConcurrentJobs
      - name
      - timeoutSeconds
    AgentJob:
      type: object
      description: Agent job execution record (job_token intentionally omitted)
      properties:
        completedAt:
          type: string
          format: date-time
          description: Timestamp when the job completed
        configId:
          type: integer
          format: int64
          description: ID of the agent config that ran this job (from the frozen snapshot)
        configName:
          type: string
          description: Name of the agent config that ran this job (from the frozen
            snapshot)
        configSnapshot:
          description: Frozen agent config at submit time (an INSTANCE-scoped connection's
            baseUrl is redacted to scheme://host)
        containerId:
          type: string
          description: Docker container ID
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the job was created
        deliveryCommentId:
          type: string
          description: Git provider comment/note ID for posted feedback
        deliveryStatus:
          type: string
          description: "Delivery status: null = not applicable, PENDING = awaiting\
            \ delivery, DELIVERED = posted, FAILED = delivery error"
          enum:
          - PENDING
          - DELIVERED
          - FAILED
        errorMessage:
          type: string
          description: Human-readable error message
        exitCode:
          type: integer
          format: int32
          description: Container exit code
        id:
          type: string
          format: uuid
          description: Job ID
        jobType:
          type: string
          description: Job type
          enum:
          - PULL_REQUEST_REVIEW
          - ISSUE_REVIEW
          - CONVERSATION_REVIEW
        llmCacheReadTokens:
          type: integer
          format: int32
          description: Tokens read from prompt cache
        llmCacheWriteTokens:
          type: integer
          format: int32
          description: Tokens written to prompt cache
        llmCostUsd:
          type: number
          format: double
          description: "Deprecated, always null (#1368 slice 6): the runner no longer\
            \ reports cost. See the workspace's LLM usage rollup for the authoritative,\
            \ catalog-derived per-job cost."
        llmModel:
          type: string
          description: "LLM model used (e.g. gpt-5.4-mini, claude-sonnet-4-5)"
        llmModelVersion:
          type: string
          description: Model version/snapshot date (e.g. 2026-03-17)
        llmTotalCalls:
          type: integer
          format: int32
          description: Total LLM API calls (steps) during execution
        llmTotalInputTokens:
          type: integer
          format: int32
          description: Total input tokens consumed
        llmTotalOutputTokens:
          type: integer
          format: int32
          description: Total output tokens generated
        llmTotalReasoningTokens:
          type: integer
          format: int32
          description: Total reasoning/thinking tokens
        metadata:
          description: Job metadata (routing/display info)
        output:
          description: Job output (agent results)
        retryCount:
          type: integer
          format: int32
          description: Number of retry attempts
        startedAt:
          type: string
          format: date-time
          description: Timestamp when the job started running
        status:
          type: string
          description: Current job status
          enum:
          - QUEUED
          - RUNNING
          - COMPLETED
          - FAILED
          - TIMED_OUT
          - CANCELLED
      required:
      - configSnapshot
      - createdAt
      - id
      - jobType
      - retryCount
      - status
    AiSettingsView:
      type: object
      description: "Aggregate workspace AI settings: runtime bindings + effective\
        \ + raw-override practice-review policy"
      properties:
        cooldownMinutes:
          type: integer
          format: int32
          description: "Effective: minimum minutes between reviews for the same PR"
        cooldownMinutesOverride:
          type: integer
          format: int32
          description: Raw override; null = inheriting the fleet default
        deliverToMerged:
          type: boolean
          description: "Effective: deliver feedback to merged PRs/MRs"
        deliverToMergedOverride:
          type: boolean
          description: Raw override; null = inheriting the fleet default
        mentorConfigId:
          type: integer
          format: int64
          description: Config bound to power the mentor (null = oldest enabled config)
        mentorEnabled:
          type: boolean
          description: Whether the mentor feature is enabled for this workspace
        practiceConfigId:
          type: integer
          format: int64
          description: Config bound to power practice detection (null = fan-out to
            all enabled configs)
        practicesEnabled:
          type: boolean
          description: Whether the practices feature is enabled for this workspace
        runForAllUsers:
          type: boolean
          description: "Effective: run practice review for all developers"
        runForAllUsersOverride:
          type: boolean
          description: Raw override; null = inheriting the fleet default
        skipDrafts:
          type: boolean
          description: "Effective: skip draft PRs/MRs"
        skipDraftsOverride:
          type: boolean
          description: Raw override; null = inheriting the fleet default
      required:
      - cooldownMinutes
      - deliverToMerged
      - mentorEnabled
      - practicesEnabled
      - runForAllUsers
      - skipDrafts
    AssignRoleRequest:
      type: object
      description: Request to assign or update a user's role in a workspace
      properties:
        role:
          type: string
          description: "New role to assign (OWNER, ADMIN, MEMBER)"
          enum:
          - OWNER
          - ADMIN
          - MEMBER
        userId:
          type: integer
          format: int64
          description: User ID of the member to update
      required:
      - role
      - userId
    AuthEventView:
      type: object
      description: "One audit row, flattened for the admin viewer."
      properties:
        account:
          $ref: "#/components/schemas/AccountRef"
        accountId:
          type: integer
          format: int64
        actingAccountId:
          type: integer
          format: int64
        actor:
          $ref: "#/components/schemas/AccountRef"
        details:
          type: string
        eventType:
          type: string
        failureReason:
          type: string
        id:
          type: integer
          format: int64
        ipAddress:
          type: string
        occurredAt:
          type: string
          format: date-time
        result:
          type: string
        userAgent:
          type: string
        workspaceId:
          type: integer
          format: int64
      required:
      - eventType
      - id
      - occurredAt
      - result
    AvailableLlmModel:
      type: object
      description: A model available for this workspace to bind a Task to
      properties:
        connectionDisplayName:
          type: string
          description: Owning connection's display name
        displayName:
          type: string
          description: Human-readable name
        id:
          type: integer
          format: int64
          description: "Model id, unique within its scope"
        modality:
          type: string
          description: What surface this model serves
          enum:
          - CHAT
          - EMBEDDING
          - RERANK
        per1mCacheReadUsd:
          type: number
          description: Cache-read rate per 1M tokens (USD)
        per1mCacheWriteUsd:
          type: number
          description: Cache-write rate per 1M tokens (USD)
        per1mInputUsd:
          type: number
          description: Input rate per 1M tokens (USD)
        per1mOutputUsd:
          type: number
          description: Output rate per 1M tokens (USD)
        per1mReasoningUsd:
          type: number
          description: Reasoning-token rate per 1M tokens (USD)
        pricingMode:
          type: string
          description: Pricing mode
          enum:
          - PRICED
          - FREE
          - UNPRICED
        scope:
          type: string
          description: SHARED (instance catalog) or WORKSPACE (your own provider)
          enum:
          - SHARED
          - WORKSPACE
        supportsReasoning:
          type: boolean
          description: Whether the model supports a reasoning mode
      required:
      - connectionDisplayName
      - displayName
      - id
      - modality
      - pricingMode
      - scope
      - supportsReasoning
    BackfillSummary:
      type: object
      description: Connection-level backfill rollup
      properties:
        percent:
          type: integer
          format: int32
          description: "0-100 completion estimate, if computable"
        state:
          type: string
          description: Integration-defined backfill state string
      required:
      - state
    BinaryAchievementProgress:
      allOf:
      - $ref: "#/components/schemas/AchievementProgress"
      - type: object
        properties:
          unlocked:
            type: boolean
      description: Binary progress indicating unlocked state
      required:
      - unlocked
    BindPracticeAreaRequest:
      type: object
      description: "Request to bind a practice to an area, or unbind it when areaSlug\
        \ is null"
      properties:
        areaSlug:
          type: string
          description: "Slug of the area to bind to, or null to unbind"
          example: review-ready-work
    ChatMessage:
      type: object
      description: Mentor chat message in AI SDK UIMessage shape.
      properties:
        createdAt:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        metadata:
          type: object
          additionalProperties: {}
          description: "Per-turn metadata: status, model, costUsd, usage, …"
        parentMessageId:
          type: string
          format: uuid
        parts:
          type: array
          items:
            description: AI SDK UIMessage part (text / data-finding).
        role:
          type: string
    ChatMessageVote:
      type: object
      description: User vote on a mentor assistant message.
      properties:
        isUpvoted:
          type: boolean
        messageId:
          type: string
          format: uuid
        updatedAt:
          type: string
          format: date-time
    ChatMessageVoteRequest:
      type: object
      description: Upsert a vote on a mentor assistant message
      properties:
        isUpvoted:
          type: boolean
          description: "true = upvote (helpful), false = downvote"
      required:
      - isUpvoted
    ChatThreadDetail:
      type: object
      description: Mentor chat thread with all messages.
      properties:
        createdAt:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        title:
          type: string
    ChatThreadSummary:
      type: object
      description: Mentor chat thread summary (no messages).
      properties:
        createdAt:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        title:
          type: string
    ConfigAuditActorRef:
      type: object
      description: |-
        A human-readable actor identity on an audit row. Resolved at read time, so an erased account
         degrades here without the trail being rewritten: <code>AccountPurger</code> clears the email, replaces
         the display name with a placeholder, and nulls the row's actor references.

         <p>Named distinctly from the auth trail's own <code>AccountRefDTO</code>: the OpenAPI schema key is the
         simple name minus the <code>DTO</code> suffix, so two <code>AccountRefDTO</code> records would collide and one
         would be silently dropped from the spec.
      properties:
        displayName:
          type: string
        email:
          type: string
        id:
          type: integer
          format: int64
    ConfigAuditEntryView:
      type: object
      description: "One audit row, flattened for a viewer. Crosses the module boundary,\
        \ so it carries no entity."
      properties:
        actingAccountId:
          type: integer
          format: int64
        actingActor:
          $ref: "#/components/schemas/ConfigAuditActorRef"
          description: "resolved impersonator, present only for {@link ConfigAuditActorKind#IMPERSONATED\
            \ ConfigAuditActorKind#IMPERSONATED}"
        action:
          type: string
          enum:
          - CREATED
          - UPDATED
          - DELETED
        actor:
          $ref: "#/components/schemas/ConfigAuditActorRef"
          description: |-
            resolved identity of {@link de.tum.cit.aet.hephaestus.core.audit.spi.ConfigAuditEntryViewDTO#actorAccountId #actorAccountId}; null for SYSTEM rows or once the
                                 account is gone. Read together with {@link de.tum.cit.aet.hephaestus.core.audit.spi.ConfigAuditEntryViewDTO#actorKind #actorKind} — that is what keeps
                                 "a system did this" distinct from "we no longer know who did this".
        actorAccountId:
          type: integer
          format: int64
        actorKind:
          type: string
          enum:
          - USER
          - SYSTEM
          - IMPERSONATED
        changedKeys:
          type: array
          description: "dot-paths that differ between {@link de.tum.cit.aet.hephaestus.core.audit.spi.ConfigAuditEntryViewDTO#oldValue\
            \ #oldValue} and {@link de.tum.cit.aet.hephaestus.core.audit.spi.ConfigAuditEntryViewDTO#newValue\
            \ #newValue}"
          items:
            type: string
        entityId:
          type: string
        entityType:
          type: string
          enum:
          - PRACTICE_REVIEW_SETTINGS
