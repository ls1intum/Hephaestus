    WorkspaceTeamSettings:
      type: object
      description: Team visibility settings for a specific workspace
      properties:
        hidden:
          type: boolean
          description: Whether the team is hidden in the leaderboard for this workspace
        teamId:
          type: integer
          format: int64
          description: The team ID these settings apply to
        workspaceId:
          type: integer
          format: int64
          description: The workspace ID these settings belong to
      required:
      - hidden
      - teamId
      - workspaceId
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      description: Hephaestus-native JWT bearer authentication. The SPA normally authenticates
        via the `__Host-HEPHAESTUS_AT` session cookie; this scheme documents the equivalent
        bearer token.
      scheme: bearer
      type: http
