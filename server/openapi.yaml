        llmProvider:
          type: string
          description: LLM provider
          enum:
          - ANTHROPIC
          - OPENAI
          - AZURE_OPENAI
        maxConcurrentJobs:
          type: integer
          format: int32
          description: Maximum concurrent jobs
          example: 3
          maximum: 10
          minimum: 1
        modelName:
          type: string
          description: LLM model name
          example: gpt-5.4-mini
          maxLength: 128
          minLength: 0
        timeoutSeconds:
          type: integer
          format: int32
          description: Job timeout in seconds
          example: 600
          maximum: 3600
          minimum: 30
    UpdateConnectionStatusRequest:
      type: object
      description: Request to update a connection's lifecycle status
      properties:
        reason:
          type: string
          description: Optional human-readable reason recorded on the audit trail
        state:
          type: string
          description: "Target lifecycle state. Admin-settable: ACTIVE, SUSPENDED,\
            \ UNINSTALLED."
          enum:
          - PENDING
          - ACTIVE
          - SUSPENDED
          - UNINSTALLED
      required:
      - state
    UpdateLeaderboardDigestRequest:
      type: object
      description: Request to update the entire weekly leaderboard digest configuration
        atomically
      properties:
        channelId:
          type: string
          description: Slack channel ID for notifications
          example: C01234567AB
          pattern: "^[CGD][A-Z0-9]{8,}$"
        day:
          type: integer
          format: int32
          description: "Day of week (1=Monday, 7=Sunday)"
          example: 1
          maximum: 7
          minimum: 1
        enabled:
          type: boolean
          description: Whether leaderboard notifications are enabled
        team:
          type: string
          description: Team name for filtering leaderboard notifications
        time:
          type: string
          description: Time in 24-hour format (HH:mm)
          example: 09:00
          pattern: "^([01]\\d|2[0-3]):[0-5]\\d$"
      required:
      - day
      - time
    UpdateLoginProviderRequest:
      type: object
      properties:
        baseUrl:
          type: string
        clientId:
          type: string
        clientSecret:
          type: string
          description: Omit to leave the existing secret unchanged
        displayName:
          type: string
        enabled:
          type: boolean
        scopes:
          type: string
    UpdatePracticeActiveRequest:
      type: object
      description: Request to set a practice's active state
      properties:
        active:
          type: boolean
          description: Whether the practice should be active
      required:
      - active
    UpdatePracticeGoalRequest:
      type: object
      description: Request to update an existing practice goal (PATCH — only non-null
        fields applied)
      properties:
        active:
          type: boolean
          description: Whether this goal is active
        description:
          type: string
          description: What this goal develops
          maxLength: 5000
          minLength: 0
        displayOrder:
          type: integer
          format: int32
          description: Sort order within the workspace
        name:
          type: string
          description: Human-readable name
          maxLength: 128
          minLength: 3
          pattern: .*\S.*
    UpdatePracticeRequest:
      type: object
      description: Request to update an existing practice definition (PATCH — only
        non-null fields applied)
      properties:
        category:
          type: string
          description: Practice category
          example: code-quality
          maxLength: 64
          minLength: 0
        criteria:
          type: string
          description: Practice evaluation criteria
          maxLength: 50000
          minLength: 0
          pattern: .*\S.*
        focusArtifact:
          type: string
          description: Artifact this practice evaluates
          enum:
          - PULL_REQUEST
          - ISSUE
          example: ISSUE
        name:
          type: string
          description: Human-readable name
          example: PR Description Quality
          maxLength: 128
          minLength: 3
          pattern: .*\S.*
        polarity:
          type: string
          description: "Whether the practice is a desirable habit, an anti-pattern,\
            \ or context-dependent"
          enum:
          - DESIRABLE
          - UNDESIRABLE
          - MIXED
          example: UNDESIRABLE
        precomputeScript:
          type: string
          description: TypeScript/Bun precompute script for static analysis before
            AI review
          maxLength: 100000
          minLength: 0
        triggerEvents:
          type: array
          description: Domain events that trigger detection
          items:
            type: string
          maxItems: 10
          minItems: 1
    UpdatePracticeReviewSettings:
      type: object
      description: Update per-workspace practice-review policy. Null fields unchanged;
        'reset' clears to inherit.
      properties:
        cooldownMinutes:
          type: integer
          format: int32
          description: Minimum minutes between reviews for the same PR; 0 disables
            the cooldown
          maximum: 1440
          minimum: 0
        deliverToMerged:
          type: boolean
          description: Deliver feedback to already-merged PRs/MRs
        reset:
          type: array
          description: Fields to reset to the inherited fleet default
          items:
            type: string
            enum:
            - RUN_FOR_ALL_USERS
            - SKIP_DRAFTS
            - DELIVER_TO_MERGED
            - COOLDOWN_MINUTES
          uniqueItems: true
        runForAllUsers:
          type: boolean
          description: Run practice review for all contributors (vs only the run_practice_review
            role)
        skipDrafts:
          type: boolean
          description: Skip practice review for draft PRs/MRs
    UpdateRepositorySettingsRequest:
      type: object
      description: Request to update repository contribution visibility settings in
        a workspace
      properties:
        hiddenFromContributions:
          type: boolean
          description: Whether contributions from this repository should be hidden
            from leaderboard calculations
      required:
      - hiddenFromContributions
    UpdateTeamSettingsRequest:
      type: object
      description: Request to update team visibility settings in a workspace
      properties:
        hidden:
          type: boolean
          description: Whether the team should be hidden from the leaderboard
      required:
      - hidden
    UpdateWorkspaceFeaturesRequest:
      type: object
      description: Request to update workspace feature flags. Null fields are left
        unchanged.
      properties:
        achievementsEnabled:
          type: boolean
          description: Enable the achievements system
        leaderboardEnabled:
          type: boolean
          description: Enable the leaderboard ranking page
        leaguesEnabled:
          type: boolean
          description: Enable league tiers and rankings
        mentorEnabled:
          type: boolean
          description: Enable the Pi mentor chat feature
        practiceReviewAutoTriggerEnabled:
          type: boolean
          description: Enable automatic practice reviews triggered by PR events
        practiceReviewManualTriggerEnabled:
          type: boolean
          description: Enable manual practice reviews triggered via bot command
        practicesEnabled:
          type: boolean
          description: Enable the practice review feature
        progressionEnabled:
          type: boolean
          description: Enable the league/progression system
    UpdateWorkspaceNotificationsRequest:
      type: object
      description: Request to update leaderboard notification settings
      properties:
        channelId:
          type: string
          description: Slack channel ID for notifications
          example: C01234567AB
          pattern: "^[CGD][A-Z0-9]{8,}$"
        enabled:
          type: boolean
          description: Whether leaderboard notifications are enabled
        team:
          type: string
          description: Team name for filtering leaderboard notifications
    UpdateWorkspacePublicVisibilityRequest:
      type: object
      description: Request to update workspace public visibility setting
      properties:
        isPubliclyViewable:
          type: boolean
          description: Whether the workspace should be publicly viewable without authentication
      required:
      - isPubliclyViewable
    UpdateWorkspaceScheduleRequest:
      type: object
      description: Request to update the leaderboard notification schedule
      properties:
        day:
          type: integer
          format: int32
          description: "Day of week (1=Monday, 7=Sunday)"
          example: 1
          maximum: 7
          minimum: 1
        time:
          type: string
          description: Time in 24-hour format (HH:mm)
          example: 09:00
          pattern: "^([01]\\d|2[0-3]):[0-5]\\d$"
      required:
      - day
      - time
    UpdateWorkspaceStatusRequest:
      type: object
      description: Request to update the workspace lifecycle status
      properties:
        status:
          type: string
          description: "New lifecycle status (PENDING, ACTIVE, ARCHIVED)"
          enum:
          - ACTIVE
          - SUSPENDED
          - PURGED
      required:
      - status
    UpdateWorkspaceTokenRequest:
      type: object
      description: Request to update the workspace's GitHub Personal Access Token
      properties:
        personalAccessToken:
          type: string
          description: GitHub Personal Access Token for API access
          minLength: 1
      required:
      - personalAccessToken
    UserInfo:
      type: object
      description: Information about a user from the git provider
      properties:
        avatarUrl:
          type: string
          description: URL to the user's avatar image
        email:
          type: string
          description: "Email address of the user, if public"
        htmlUrl:
          type: string
          description: URL to the user's profile on the git provider
        id:
          type: integer
          format: int64
          description: Unique identifier of the user
        leaguePoints:
          type: integer
          format: int32
          description: League points earned by the user in the current scope
          example: 150
        login:
          type: string
          description: Login/username of the user
        name:
          type: string
          description: Display name of the user
      required:
      - avatarUrl
      - htmlUrl
      - id
      - login
      - name
    UserSettings:
      type: object
      description: User preferences and settings
      properties:
        aiReviewEnabled:
          type: boolean
          description: Whether the user wants to receive AI-generated practice review
            comments on pull requests
        participateInResearch:
          type: boolean
          description: Whether the user consents to participate in research studies
      required:
      - aiReviewEnabled
      - participateInResearch
    UserTeams:
      type: object
      properties:
        email:
          type: string
        hidden:
          type: boolean
        id:
          type: integer
          format: int64
        login:
          type: string
        name:
          type: string
        teams:
          type: array
          items:
            $ref: "#/components/schemas/TeamSummary"
          uniqueItems: true
        url:
          type: string
      required:
      - id
      - login
      - name
      - teams
      - url
    Workspace:
      type: object
      description: Complete workspace information including configuration and settings
      properties:
        accountLogin:
          type: string
          description: Git provider account login associated with this workspace
        achievementsEnabled:
          type: boolean
          description: Whether the achievements system is enabled
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the workspace was created
        displayName:
          type: string
          description: Human-readable name of the workspace
        gitlabWebhookRegistered:
          type: boolean
          description: Whether a GitLab webhook has been auto-registered for this
            workspace
        hasPersonalAccessToken:
          type: boolean
          description: Whether a Personal Access Token is configured
        hasSlackToken:
          type: boolean
          description: Whether Slack token is configured
        id:
          type: integer
          format: int64
          description: Unique identifier of the workspace
        installationId:
          type: integer
          format: int64
          description: "GitHub App installation ID, if linked"
        installationLinkedAt:
          type: string
          format: date-time
          description: Timestamp when the GitHub App installation was linked
        isPubliclyViewable:
          type: boolean
          description: Whether the workspace is publicly viewable without authentication
        kind:
          type: string
          description: Integration kind backing this workspace (GITHUB or GITLAB)
        leaderboardEnabled:
          type: boolean
          description: Whether the leaderboard is enabled
        leaderboardNotificationChannelId:
          type: string
          description: Slack channel ID for leaderboard notifications
        leaderboardNotificationEnabled:
          type: boolean
          description: Whether leaderboard notifications are enabled
        leaderboardNotificationTeam:
          type: string
          description: Team name for leaderboard notifications
        leaderboardScheduleDay:
          type: integer
          format: int32
          description: "Day of week for leaderboard notifications (1=Monday, 7=Sunday)"
          example: 1
        leaderboardScheduleTime:
          type: string
          description: Time for leaderboard notifications in HH:mm format
          example: 09:00
        leaguesEnabled:
          type: boolean
          description: Whether league tiers and rankings are enabled
        mentorEnabled:
          type: boolean
          description: Whether the Pi mentor chat feature is enabled
        practiceReviewAutoTriggerEnabled:
          type: boolean
          description: Whether automatic practice reviews triggered by PR events are
            enabled
        practiceReviewManualTriggerEnabled:
          type: boolean
          description: Whether manual practice reviews triggered via bot command are
            enabled
        practicesEnabled:
          type: boolean
          description: Whether the practice review feature is enabled
        progressionEnabled:
          type: boolean
          description: Whether the league/progression system is enabled
        providerType:
          type: string
          description: High-level git provider type for the workspace's SCM connection
            (null if none bound)
          enum:
          - GITHUB
          - GITLAB
        serverUrl:
          type: string
          description: Custom server URL for self-hosted instances (null for cloud
            defaults)
        slackConnectionId:
          type: integer
          format: int64
          description: "ID of the active Slack connection, if any — addresses PATCH\
            \ /connections/{id}/status"
        status:
          type: string
          description: "Current lifecycle status of the workspace (PENDING, ACTIVE,\
            \ ARCHIVED)"
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the workspace was last updated
        workspaceSlug:
          type: string
          description: URL-friendly identifier for the workspace
          example: my-workspace
      required:
      - accountLogin
      - achievementsEnabled
      - createdAt
      - displayName
      - gitlabWebhookRegistered
      - hasPersonalAccessToken
      - hasSlackToken
      - id
      - isPubliclyViewable
      - leaderboardEnabled
      - leaguesEnabled
      - mentorEnabled
      - practiceReviewAutoTriggerEnabled
      - practiceReviewManualTriggerEnabled
      - practicesEnabled
      - progressionEnabled
      - status
      - updatedAt
      - workspaceSlug
    WorkspaceListItem:
      type: object
      description: Summary information about a workspace for list views
      properties:
        accountLogin:
          type: string
          description: Git provider account login associated with this workspace
        achievementsEnabled:
          type: boolean
          description: Whether the achievements system is enabled
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the workspace was created
        displayName:
          type: string
          description: Human-readable name of the workspace
        id:
          type: integer
          format: int64
          description: Unique identifier of the workspace
        leaderboardEnabled:
          type: boolean
          description: Whether the leaderboard is enabled
        leaguesEnabled:
          type: boolean
          description: Whether league tiers and rankings are enabled
        mentorEnabled:
          type: boolean
          description: Whether the Pi mentor chat feature is enabled
        practicesEnabled:
          type: boolean
          description: Whether the practice review feature is enabled
        progressionEnabled:
          type: boolean
          description: Whether the league/progression system is enabled
        providerType:
          type: string
          description: "High-level git provider type (GITHUB or GITLAB), or null if\
            \ no SCM connection bound"
          enum:
          - GITHUB
          - GITLAB
        status:
          type: string
          description: "Current lifecycle status of the workspace (PENDING, ACTIVE,\
            \ ARCHIVED)"
        workspaceSlug:
          type: string
          description: URL-friendly identifier for the workspace
          example: my-workspace
      required:
      - accountLogin
      - achievementsEnabled
      - createdAt
      - displayName
      - id
      - leaderboardEnabled
      - leaguesEnabled
      - mentorEnabled
      - practicesEnabled
      - progressionEnabled
      - status
      - workspaceSlug
    WorkspaceMembership:
      type: object
      description: A user's membership in a workspace
      properties:
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the membership was created
        hidden:
          type: boolean
          description: Whether the member is hidden from the leaderboard
        leaguePoints:
          type: integer
          format: int32
          description: League points earned by the user in this workspace
          example: 150
        role:
          type: string
          description: "Role of the user in this workspace (OWNER, ADMIN, MEMBER)"
          enum:
          - OWNER
          - ADMIN
          - MEMBER
        userId:
          type: integer
          format: int64
          description: Unique identifier of the user
        userLogin:
          type: string
          description: Login/username of the user
        userName:
          type: string
          description: Display name of the user
    WorkspaceProviders:
      type: object
      description: Available workspace creation providers and their configuration
      properties:
        creationPolicy:
          type: string
          description: Who may create workspaces — ADMIN_ONLY restricts creation to
            instance admins
          enum:
          - ADMIN_ONLY
          - SELF_SERVICE
        github:
          $ref: "#/components/schemas/GitHubProvider"
          description: "GitHub workspace provider config, null if not available"
        gitlab:
          $ref: "#/components/schemas/GitLabProvider"
          description: "GitLab workspace provider config, null if not available"
    WorkspaceTeamRepositorySettings:
      type: object
      description: Repository contribution visibility settings for a specific team
        within a workspace
      properties:
        hiddenFromContributions:
          type: boolean
          description: Whether contributions from this repository are hidden from
            leaderboard calculations
        repositoryId:
          type: integer
          format: int64
          description: The repository ID these settings apply to
        teamId:
          type: integer
          format: int64
          description: The team ID these settings apply to
        workspaceId:
          type: integer
          format: int64
          description: The workspace ID these settings belong to
      required:
      - hiddenFromContributions
      - repositoryId
      - teamId
      - workspaceId
    WorkspaceTeamSettings:
      type: object
      description: Team visibility settings for a specific workspace
      properties:
        hidden:
          type: boolean
          description: Whether the team is hidden in the leaderboard for this workspace
        teamId:
          type: integer
          format: int64
          description: The team ID these settings apply to
        workspaceId:
          type: integer
          format: int64
          description: The workspace ID these settings belong to
      required:
      - hidden
      - teamId
      - workspaceId
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      description: Hephaestus-native JWT bearer authentication. The SPA normally authenticates
        via the `__Host-HEPHAESTUS_AT` session cookie; this scheme documents the equivalent
        bearer token.
      scheme: bearer
      type: http
