    WorkspaceLlmUsageReport:
      type: object
      description: "One calendar month of a workspace's LLM spend, rolled up from\
        \ the usage ledger"
      properties:
        byDay:
          type: array
          items:
            $ref: "#/components/schemas/LlmUsageByDay"
        byJobType:
          type: array
          items:
            $ref: "#/components/schemas/LlmUsageByJobType"
        byoTotalCostUsd:
          type: number
          description: "This month's spend on this workspace's own connected provider(s),\
            \ in USD. Shown separately — it never counts toward the monthly budget\
            \ and must never be added to pricedTotalCostUsd."
        month:
          type: string
          description: "Calendar month (UTC), ISO yyyy-MM"
          example: 2026-07
        monthlyBudgetUsd:
          type: number
          description: Monthly budget cap in USD; null = uncapped
        pricedTotalCostUsd:
          type: number
          description: "This month's confirmed spend on shared (instance) models,\
            \ in USD — the figure the monthly budget compares against. When unpricedEventCount\
            \ is non-zero this is a floor, not the full total: render it as \"at least\
            \ $X\"."
        unpricedEventCount:
          type: integer
          format: int64
          description: "Calls this month (any provider) whose price is not yet known.\
            \ They are excluded from both totals above, so a non-zero value means\
            \ the real spend may be higher than shown."
        verdict:
          type: string
          description: "Whether this month's confirmed spend is within the cap, has\
            \ reached it (work is paused), or can't be fully confirmed yet because\
            \ some usage above has no price set."
          enum:
          - WITHIN
          - EXHAUSTED
          - UNVERIFIABLE
      required:
      - byDay
      - byJobType
      - byoTotalCostUsd
      - month
      - pricedTotalCostUsd
      - unpricedEventCount
      - verdict
