          type: string
          description: "Current lifecycle status of the workspace (PENDING, ACTIVE,\
            \ ARCHIVED)"
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the workspace was last updated
        workspaceSlug:
          type: string
          description: URL-friendly identifier for the workspace
          example: my-workspace
      required:
      - accountLogin
      - achievementsEnabled
      - createdAt
      - displayName
      - gitlabWebhookRegistered
      - hasPersonalAccessToken
      - hasSlackToken
      - healthVisibility
      - id
      - isPubliclyViewable
      - mentorEnabled
      - practiceReviewAutoTriggerEnabled
      - practiceReviewManualTriggerEnabled
      - practicesEnabled
      - status
      - updatedAt
      - workspaceSlug
    WorkspaceListItem:
      type: object
      description: Summary information about a workspace for list views
      properties:
        accountLogin:
          type: string
          description: Git provider account login associated with this workspace
        achievementsEnabled:
          type: boolean
          description: Whether the achievements system is enabled
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the workspace was created
        displayName:
          type: string
          description: Human-readable name of the workspace
        healthVisibility:
          type: string
          description: Audience for the k-anonymised workspace health aggregate on
            the practice overview
          enum:
          - MENTORS_ONLY
          - EVERYONE
        id:
          type: integer
          format: int64
          description: Unique identifier of the workspace
        mentorEnabled:
          type: boolean
          description: Whether the Pi mentor chat feature is enabled
        practicesEnabled:
          type: boolean
          description: Whether the practice review feature is enabled
        providerType:
          type: string
          description: "High-level git provider type (GITHUB or GITLAB), or null if\
            \ no SCM connection bound"
          enum:
          - GITHUB
          - GITLAB
          - SLACK
        status:
          type: string
          description: "Current lifecycle status of the workspace (PENDING, ACTIVE,\
            \ ARCHIVED)"
        workspaceSlug:
          type: string
          description: URL-friendly identifier for the workspace
          example: my-workspace
      required:
      - accountLogin
      - achievementsEnabled
      - createdAt
      - displayName
      - healthVisibility
      - id
      - mentorEnabled
      - practicesEnabled
      - status
      - workspaceSlug
    WorkspaceMembership:
      type: object
      description: A user's membership in a workspace
      properties:
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the membership was created
        hidden:
          type: boolean
          description: Whether the member is hidden from the practice roster / overview
        role:
          type: string
          description: "Role of the user in this workspace (OWNER, ADMIN, MEMBER)"
          enum:
          - OWNER
          - ADMIN
          - MEMBER
        userId:
          type: integer
          format: int64
          description: Unique identifier of the user
        userLogin:
          type: string
          description: Login/username of the user
        userName:
          type: string
          description: Display name of the user
    WorkspaceProviders:
      type: object
      description: Available workspace creation providers and their configuration
      properties:
        creationPolicy:
          type: string
          description: Who may create workspaces — ADMIN_ONLY restricts creation to
            instance admins
          enum:
          - ADMIN_ONLY
          - SELF_SERVICE
        github:
          $ref: "#/components/schemas/GitHubProvider"
          description: "GitHub workspace provider config, null if not available"
        gitlab:
          $ref: "#/components/schemas/GitLabProvider"
          description: "GitLab workspace provider config, null if not available"
    WorkspaceTeamRepositorySettings:
      type: object
      description: Repository contribution visibility settings for a specific team
        within a workspace
      properties:
        hiddenFromContributions:
          type: boolean
          description: Whether contributions from this repository are hidden from
            the practice overview
        repositoryId:
          type: integer
          format: int64
          description: The repository ID these settings apply to
        teamId:
          type: integer
          format: int64
          description: The team ID these settings apply to
        workspaceId:
          type: integer
          format: int64
          description: The workspace ID these settings belong to
      required:
      - hiddenFromContributions
      - repositoryId
      - teamId
      - workspaceId
    WorkspaceTeamSettings:
      type: object
      description: Team visibility settings for a specific workspace
      properties:
        hidden:
          type: boolean
          description: Whether the team is hidden from the practice overview for this
            workspace
        teamId:
          type: integer
          format: int64
          description: The team ID these settings apply to
        workspaceId:
          type: integer
          format: int64
          description: The workspace ID these settings belong to
      required:
      - hidden
      - teamId
      - workspaceId
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      description: Hephaestus-native JWT bearer authentication. The SPA normally authenticates
        via the `__Host-HEPHAESTUS_AT` session cookie; this scheme documents the equivalent
        bearer token.
      scheme: bearer
      type: http
