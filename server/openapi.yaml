          example: rose
          maxLength: 32
          minLength: 0
          pattern: "^[a-z]+$"
        description:
          type: string
          description: What this area develops
          maxLength: 5000
          minLength: 0
        displayOrder:
          type: integer
          format: int32
          description: Sort order within the workspace. Defaults to 0 when omitted.
