components:
  schemas:
    AccountRef:
      type: object
      description: A human-readable account identity. <code>displayName</code>/<code>email</code>
        are null for deleted accounts.
      properties:
        displayName:
          type: string
        email:
          type: string
        id:
          type: integer
          format: int64
      required:
      - id
    Achievement:
      type: object
      description: Achievement with user-specific progress information
      properties:
        category:
          type: string
          description: Category for grouping achievements
          enum:
          - pull_requests
          - commits
          - communication
          - issues
          - milestones
          example: pull_requests
        id:
          type: string
          $ref: "#/components/schemas/AchievementId"
          description: Unique identifier for the achievement
          example: pr.merged.common.1
        isHidden:
          type: boolean
          description: Whether the achievement should be hidden until unlocked
        parent:
          type: string
          description: Parent achievement in progression chain
          example: first_pull
        progressData:
          description: The structured progress data based on the achievements evaluator
          oneOf:
          - $ref: "#/components/schemas/BinaryAchievementProgress"
          - $ref: "#/components/schemas/LinearAchievementProgress"
        rarity:
          type: string
          description: Visual level tier/rarity for badge styling
          enum:
          - common
          - uncommon
          - rare
          - epic
          - legendary
          - mythic
          example: common
        status:
          type: string
          description: Current status of the achievement for this user
          enum:
          - locked
          - available
          - unlocked
          - hidden
          example: unlocked
        unlockedAt:
          type: string
          format: date-time
          description: "Optional of when the achievement was unlocked, empty() if\
            \ not unlocked"
      required:
      - category
      - id
      - progressData
      - rarity
      - status
      - unlockedAt
    AchievementId:
      type: string
      enum:
      - commit.common.1
      - commit.common.2
      - commit.epic
      - commit.legendary
      - commit.mythic
      - commit.rare
      - commit.special.atomic_changes
      - commit.special.brute_force
      - commit.special.cross_boundary
      - commit.special.itsy_bitsy
      - commit.uncommon.1
      - commit.uncommon.2
      - issue.close.common.1
      - issue.close.common.2
      - issue.close.epic
      - issue.close.legendary
      - issue.close.rare
      - issue.close.uncommon
      - issue.open.common.1
      - issue.open.common.2
      - issue.open.epic
      - issue.open.legendary
      - issue.open.rare
      - issue.open.uncommon
      - issue.special.hive_mind
      - issue.special.necromancer
      - issue.special.oracle
      - milestone.all_epic
      - milestone.all_legendary
      - milestone.all_rare
      - milestone.first_action
      - milestone.long_time_return
      - milestone.night_owl
      - milestone.polyglot
      - pr.merged.common.1
      - pr.merged.common.2
      - pr.merged.epic
      - pr.merged.legendary
      - pr.merged.rare
      - pr.merged.uncommon
      - pr.special.speedster
      - review.common.1
      - review.common.2
      - review.epic
      - review.legendary
      - review.mythic
      - review.rare
      - review.uncommon.1
      - review.uncommon.2
    AchievementProgress:
      description: Polymorphic progress data
      discriminator:
        propertyName: type
      properties:
        type:
          type: string
      required:
      - type
    AdminAccountView:
      type: object
      properties:
        appRole:
          type: string
        displayName:
          type: string
        id:
          type: integer
          format: int64
        primaryEmail:
          type: string
        status:
          type: string
    AdminWorkspaceView:
      type: object
      description: Metadata-only workspace summary for the instance-admin overview
      properties:
        accountLogin:
          type: string
        createdAt:
          type: string
          format: date-time
        displayName:
          type: string
        id:
          type: integer
          format: int64
        memberCount:
          type: integer
          format: int64
        ownerLogin:
          type: string
        providerType:
          type: string
          enum:
          - GITHUB
          - GITLAB
          - SLACK
        status:
          type: string
        workspaceSlug:
          type: string
      required:
      - accountLogin
      - createdAt
      - displayName
      - id
      - memberCount
      - status
      - workspaceSlug
    AgentConfig:
      type: object
      description: Agent configuration for a workspace (API key redacted)
      properties:
        allowInternet:
          type: boolean
          description: Whether agent containers have internet access
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the config was created
        credentialMode:
          type: string
          description: Authentication mode
          enum:
          - PROXY
          - API_KEY
        enabled:
          type: boolean
          description: Whether the agent is enabled
        hasLlmApiKey:
          type: boolean
          description: Whether an LLM API key is configured
        id:
          type: integer
          format: int64
          description: Configuration ID
        llmBaseUrl:
          type: string
          description: Optional LLM base URL override
        llmProvider:
          type: string
          description: LLM provider
          enum:
          - ANTHROPIC
          - OPENAI
          - AZURE_OPENAI
        maxConcurrentJobs:
          type: integer
          format: int32
          description: Maximum concurrent jobs
        modelName:
          type: string
          description: LLM model name
          example: gpt-5.4-mini
        name:
          type: string
          description: Unique name within the workspace
        timeoutSeconds:
          type: integer
          format: int32
          description: Job timeout in seconds
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the config was last updated
      required:
      - allowInternet
      - createdAt
      - credentialMode
      - enabled
      - hasLlmApiKey
      - id
      - llmProvider
      - maxConcurrentJobs
      - name
      - timeoutSeconds
    AgentJob:
      type: object
      description: Agent job execution record (job_token intentionally omitted)
      properties:
        completedAt:
          type: string
          format: date-time
          description: Timestamp when the job completed
        configId:
          type: integer
          format: int64
          description: ID of the agent config that ran this job (from the frozen snapshot)
        configName:
          type: string
          description: Name of the agent config that ran this job (from the frozen
            snapshot)
        configSnapshot:
          description: Frozen agent config at submit time
        containerId:
          type: string
          description: Docker container ID
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the job was created
        deliveryCommentId:
          type: string
          description: Git provider comment/note ID for posted feedback
        deliveryStatus:
          type: string
          description: "Delivery status: null = not applicable, PENDING = awaiting\
            \ delivery, DELIVERED = posted, FAILED = delivery error"
          enum:
          - PENDING
          - DELIVERED
          - FAILED
        errorMessage:
          type: string
          description: Human-readable error message
        exitCode:
          type: integer
          format: int32
          description: Container exit code
        id:
          type: string
          format: uuid
          description: Job ID
        jobType:
          type: string
          description: Job type
          enum:
          - PULL_REQUEST_REVIEW
          - ISSUE_REVIEW
          - CONVERSATION_REVIEW
        llmCacheReadTokens:
          type: integer
