    ResourceCounts:
      type: object
      description: Resource-level rollup for the connection overview badge
      properties:
        errored:
          type: integer
          format: int64
          description: Resources currently reporting a sync error
        pending:
          type: integer
          format: int64
          description: "Resources that have never completed a sync (no lastSyncedAt).\
            \ Defined on the timestamp rather than on a provider's status vocabulary\
            \ so it means the same thing for a repository, a Slack channel and an\
            \ Outline collection."
        stale:
          type: integer
          format: int64
          description: "Resources whose last sync is older than twice the connection's\
            \ scheduled cadence. Always 0 when the cadence is unknown or the schedule\
            \ is irregular — staleness is a judgement against a known cron, and without\
            \ one this declines to guess rather than flagging healthy resources."
        total:
          type: integer
          format: int64
          description: Total resources known to this connection
      required:
      - errored
      - pending
      - stale
      - total
