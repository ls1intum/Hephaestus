  /workspaces/{workspaceSlug}/outline/collections:
    get:
      operationId: listOutlineCollections
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OutlineCollection"
          description: Mirrored collections returned
        "404":
          description: The workspace has no ACTIVE Outline connection
      summary: List the workspace's mirrored Outline collections with their sync state
      tags:
      - Outline collections
    post:
      operationId: registerOutlineCollection
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterOutlineCollectionRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutlineCollection"
          description: Collection was already registered (idempotent repeat)
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutlineCollection"
          description: Collection registered; the Location header points at the collection
            resource
        "404":
          description: The workspace has no ACTIVE Outline connection
        "409":
          description: A concurrent registration of the same collection won the race
        "422":
          description: Outline does not know the requested collection id
      summary: Register an Outline collection for mirroring (lands ENABLED + PENDING;
        idempotent on the id)
      tags:
      - Outline collections
  /workspaces/{workspaceSlug}/outline/collections/candidates:
    get:
      description: "Proxies Outline's collections.list with the stored token under\
        \ a bounded interactive page budget. Served with Cache-Control: no-store —\
        \ the live upstream view must not be cached."
      operationId: listOutlineCollectionCandidates
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OutlineCollectionCandidate"
          description: "Candidate collections returned (Cache-Control: no-store)"
        "404":
          description: The workspace has no ACTIVE Outline connection
        "502":
          description: The Outline server could not be reached or answered with an
            error
        "503":
          description: Outline is rate-limiting requests; the Retry-After header carries
            the seconds to wait before retrying
      summary: List the Outline collections available to mirror (live proxy; doubles
        as connectivity probe)
      tags:
      - Outline collections
  /workspaces/{workspaceSlug}/outline/collections/{collectionId}:
    delete:
      operationId: deleteOutlineCollection
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - in: path
        name: collectionId
        required: true
        schema:
          type: string
      responses:
        "204":
          description: Collection removed and its mirrored documents erased
        "404":
          description: "The collection is not registered for this workspace, or the\
            \ workspace has no ACTIVE Outline connection"
      summary: Remove a collection from the mirror and erase its mirrored documents
        (terminal)
      tags:
      - Outline collections
    get:
      operationId: getOutlineCollection
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - in: path
        name: collectionId
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutlineCollection"
          description: Mirrored collection returned
        "404":
          description: "The collection is not registered for this workspace, or the\
            \ workspace has no ACTIVE Outline connection"
      summary: One mirrored Outline collection with its sync state and live document
        count
      tags:
      - Outline collections
    patch:
      description: Resuming (PAUSED → ENABLED) resets the sync status to PENDING and
        kicks a targeted sync; requesting the current state is an idempotent no-op.
      operationId: updateOutlineCollectionState
      parameters:
      - description: Workspace slug
        in: path
        name: workspaceSlug
        required: true
        schema:
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{2,50}$"
      - in: path
        name: collectionId
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOutlineCollectionStateRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutlineCollection"
          description: Collection state after the transition returned
        "404":
          description: "The collection is not registered for this workspace, or the\
            \ workspace has no ACTIVE Outline connection"
      summary: Transition a mirrored collection to a target mirror state (pause /
        resume)
      tags:
      - Outline collections
