openapi: 3.1.0
info:
  contact:
    email: felixtj.dietrich@tum.de
    name: Felix T.J. Dietrich
  description: API documentation for the Hephaestus application server.
  license:
    name: MIT License
    url: https://github.com/ls1intum/Hephaestus/blob/develop/LICENSE
  title: Hephaestus API
  version: 0.0.0-development
servers:
- description: Default Server URL
  url: /
security:
- bearerAuth: []
tags:
- description: User achievement progress and unlocks
  name: Achievements
- description: Global contributor information
  name: Contributors
- description: User preferences
  name: Account
- description: Instance-admin login provider management
  name: Admin
- description: Per-workspace Slack channel consent + activation
  name: Slack channel activation
- description: Per-workspace LLM spend rollup and budget status
  name: LLM Usage
- description: Manage practice areas
  name: Practice Areas
- description: Workspace-scoped agent configuration management
  name: Agent Config
- description: Workspace-scoped mentor chat threads
  name: Mentor Threads
- description: |-
    Workspace registry endpoints under /workspaces that operate outside of a specific workspace slug;
     slugged routes live in {@link WorkspaceController WorkspaceController} via <code>@WorkspaceScopedController</code>.
  name: workspace-registry-controller
- description: |-
    Controller for managing workspace memberships and roles.
     Handles CRUD operations for workspace members and role assignments.
  name: workspace-membership-controller
- description: Workspace-scoped agent job monitoring
  name: Agent Jobs
- description: "User account management (settings, deletion)"
  name: Account
- description: Read-only access to practice evaluation observations
  name: Practice Observations
- description: Instance-admin account management
  name: Admin
- description: Current user's Slack privacy preferences
  name: Slack User Preferences
- description: Workspace-scoped "bring your own" AI provider models
  name: Workspace LLM
- description: Per-workspace Outline collection mirroring control plane
  name: Outline collections
- description: Team management within workspace
  name: Teams
- description: User profile and activity data
  name: Profile
- description: Contributor rankings and league statistics
  name: Leaderboard
- description: Session lifecycle
  name: Auth
- description: Active sessions
  name: Account
- description: Workspace-scoped "bring your own" AI provider connections
  name: Workspace LLM
- description: Workspace integration connection management
  name: Connections
- description: Instance-admin LLM connection and settings management
  name: Admin LLM
- description: Up/down votes on mentor assistant messages
  name: Mentor Votes
- description: Public JWK set for verifying Hephaestus session JWTs
  name: Auth discovery
- description: GDPR Art. 20 self-service data export
  name: Account
- description: Workspace-scoped history of admin configuration changes
  name: Config Audit
- description: |-
    Vendor OAuth redirect ingress at <code>/oauth/callback/{kind</code>}. Unauthenticated —
     identity comes from the HMAC-signed <code>state</code> param. Browsers get 302 redirects
     on both success and failure; only <code>Accept: application/json</code> requests get
     4xx JSON.
  name: o-auth-callback-controller
- description: Manage practice definitions
  name: Practice Catalog
- description: Workspace-scoped team settings management
  name: Team Settings
- description: Developer reactions to delivered feedback
  name: Feedback Reaction
- description: Identity provider discovery (public)
  name: Auth discovery
- description: |-
    GitLab-specific REST endpoints used during the workspace creation wizard:
     <code>POST /workspaces/gitlab/preflight</code> validates a PAT, <code>POST /workspaces/gitlab/groups</code>
     lists accessible groups for one. Split from <code>WorkspaceRegistryController</code> so the
     workspace module no longer imports {@link GitLabPreflightService GitLabPreflightService}; the routes keep the
     existing <code>/workspaces/gitlab/*</code> URL space for API stability.

     <p>Both endpoints are gated by the <code>GITLAB_WORKSPACE_CREATION</code> feature flag via
     <code>@PreAuthorize</code> — identical to the previous protection on the merged controller.
  name: git-lab-preflight-controller
- description: Workspace-scoped AI configuration (runtime bindings + practice-review
    policy)
  name: AI Settings
- description: Integration sync observability and manual controls
  name: Sync
- description: "Current user identity, linked accounts, deletion"
  name: Account
paths:
  /.well-known/jwks.json:
    get:
      operationId: getJwks
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: OK
      summary: JWK set (public keys only)
      tags:
      - Auth discovery
  /admin/audit:
    get:
      operationId: adminListAuthEvents
      parameters:
      - in: query
        name: page
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - in: query
        name: size
        required: false
        schema:
          type: integer
          format: int32
          default: 50
      - in: query
        name: accountId
        required: false
        schema:
          type: integer
          format: int64
      - in: query
        name: actingAccountId
        required: false
        schema:
          type: integer
          format: int64
      - in: query
        name: eventType
        required: false
        schema:
          type: array
          items:
            type: string
            enum:
            - LOGIN
            - LOGIN_FAILED
            - LOGOUT
            - TOKEN_REFRESH
            - JWT_REVOKED
            - IDENTITY_LINKED
            - IDENTITY_UNLINKED
            - IMPERSONATION_BEGIN
            - IMPERSONATION_END
            - ACCOUNT_DELETED
            - EXPORT_REQUESTED
            - APP_ROLE_CHANGED
            - RESEARCH_CONSENT_REVOKED
            - LLM_CONNECTION_CREATED
            - LLM_CONNECTION_UPDATED
            - LLM_CONNECTION_DELETED
            - LLM_MODEL_CREATED
            - LLM_MODEL_UPDATED
            - LLM_MODEL_DELETED
            - LLM_MODEL_PRICE_CHANGED
            - LLM_MODEL_SHARING_CHANGED
            - LLM_SETTINGS_CHANGED
      - in: query
        name: result
        required: false
        schema:
          type: array
          items:
            type: string
            enum:
            - SUCCESS
            - FAILURE
      - in: query
        name: from
        required: false
        schema:
          type: string
          format: date-time
      - in: query
        name: to
        required: false
        schema:
          type: string
          format: date-time
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageAuthEventView"
          description: OK
      summary: "List auth audit events (paged, newest first)"
      tags:
      - Admin
  /admin/audit/export:
    get:
      operationId: adminExportAuthEvents
      parameters:
      - in: query
        name: accountId
        required: false
        schema:
          type: integer
          format: int64
      - in: query
        name: actingAccountId
        required: false
        schema:
          type: integer
          format: int64
      - in: query
        name: eventType
        required: false
        schema:
          type: array
          items:
            type: string
            enum:
            - LOGIN
            - LOGIN_FAILED
            - LOGOUT
            - TOKEN_REFRESH
            - JWT_REVOKED
            - IDENTITY_LINKED
            - IDENTITY_UNLINKED
            - IMPERSONATION_BEGIN
            - IMPERSONATION_END
            - ACCOUNT_DELETED
            - EXPORT_REQUESTED
            - APP_ROLE_CHANGED
            - RESEARCH_CONSENT_REVOKED
            - LLM_CONNECTION_CREATED
            - LLM_CONNECTION_UPDATED
            - LLM_CONNECTION_DELETED
            - LLM_MODEL_CREATED
            - LLM_MODEL_UPDATED
            - LLM_MODEL_DELETED
            - LLM_MODEL_PRICE_CHANGED
            - LLM_MODEL_SHARING_CHANGED
            - LLM_SETTINGS_CHANGED
      - in: query
        name: result
        required: false
        schema:
          type: array
          items:
            type: string
            enum:
            - SUCCESS
            - FAILURE
      - in: query
        name: from
        required: false
        schema:
          type: string
          format: date-time
      - in: query
        name: to
        required: false
        schema:
          type: string
          format: date-time
      responses:
        "200":
          content:
            text/csv:
              schema:
                type: string
          description: OK
      summary: "Export the filtered audit log as CSV (newest first, capped)"
      tags:
      - Admin
  /admin/config-audit:
    get:
      operationId: adminListConfigAuditEvents
      parameters:
      - in: query
        name: workspaceId
        required: false
        schema:
          type: integer
          format: int64
      - in: query
        name: page
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - in: query
        name: size
        required: false
        schema:
          type: integer
          format: int32
          default: 50
      - in: query
        name: entityType
        required: false
        schema:
          type: array
          items:
            type: string
            enum:
            - PRACTICE_REVIEW_SETTINGS
            - AI_CONFIG_BINDING
            - AGENT_CONFIG
            - WORKSPACE_ROLE
            - WORKSPACE_FEATURES
            - WORKSPACE_STATUS
            - WORKSPACE_TOKEN
            - WORKSPACE_VISIBILITY
            - PRACTICE_ACTIVE
            - WORKSPACE_LLM_BUDGET
            - WORKSPACE_LLM_CONNECTION
            - WORKSPACE_LLM_MODEL
      - in: query
        name: entityId
        required: false
        schema:
          type: string
      - in: query
        name: changedKey
        required: false
        schema:
          type: string
      - in: query
        name: action
        required: false
        schema:
          type: array
          items:
            type: string
            enum:
            - CREATED
            - UPDATED
            - DELETED
      - in: query
        name: actorId
        required: false
        schema:
          type: integer
          format: int64
      - in: query
        name: from
        required: false
        schema:
          type: string
          format: date-time
      - in: query
        name: to
        required: false
        schema:
          type: string
          format: date-time
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageConfigAuditEntryView"
          description: OK
      summary: "List admin configuration changes across workspaces (paged, newest\
        \ first)"
      tags:
      - Admin
  /admin/llm-usage:
    get:
      operationId: adminListLlmUsage
      parameters:
      - in: query
        name: month
        required: false
        schema:
          type: string
          pattern: "\\d{4}-(0[1-9]|1[0-2])"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminWorkspaceLlmUsage"
          description: OK
      summary: Per-workspace LLM spend rollup for one month (all workspaces)
      tags:
      - Admin
  /admin/llm/connections:
    get:
      operationId: adminListLlmConnections
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LlmConnection"
          description: OK
      summary: List LLM connections
      tags:
      - Admin LLM
    post:
      operationId: adminCreateLlmConnection
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLlmConnectionRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmConnection"
          description: Connection created; URL in the Location header
        "409":
          description: An LLM connection with this slug already exists
      summary: Create an LLM connection
      tags:
      - Admin LLM
  /admin/llm/connections/probe:
    post:
      operationId: adminProbeLlmConnectionDraft
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProbeLlmConnectionRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmProbeResult"
          description: OK
      summary: Test a draft connection and fetch its models
      tags:
      - Admin LLM
  /admin/llm/connections/{connectionId}/models:
    post:
      operationId: adminCreateLlmModel
      parameters:
      - in: path
        name: connectionId
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLlmModelRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmModel"
          description: Model created; URL in the Location header
        "404":
          description: LLM connection not found
        "409":
          description: A model with this slug or upstream model id already exists
            on the connection
      summary: Create a model on an LLM connection
      tags:
      - Admin LLM
  /admin/llm/connections/{id}:
    delete:
      operationId: adminDeleteLlmConnection
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "204":
          description: Connection deleted
        "404":
          description: LLM connection not found
        "409":
          description: Cannot delete a connection still referenced by one or more
            models
      summary: Delete an LLM connection
      tags:
      - Admin LLM
    get:
      operationId: adminGetLlmConnection
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmConnection"
          description: OK
        "404":
          description: LLM connection not found
      summary: Get an LLM connection
      tags:
      - Admin LLM
    patch:
      operationId: adminUpdateLlmConnection
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLlmConnectionRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmConnection"
          description: OK
        "404":
          description: LLM connection not found
      summary: Update an LLM connection
      tags:
      - Admin LLM
  /admin/llm/connections/{id}/probe:
    post:
      operationId: adminProbeLlmConnection
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmProbeResult"
          description: OK
      summary: Test a stored connection and fetch its models
      tags:
      - Admin LLM
  /admin/llm/models:
    get:
      operationId: adminListLlmModels
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LlmModel"
          description: OK
      summary: List LLM catalog models
      tags:
      - Admin LLM
  /admin/llm/models/{id}:
    delete:
      operationId: adminDeleteLlmModel
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "204":
          description: Model deleted
        "404":
          description: LLM model not found
        "409":
          description: Cannot delete a model still bound to an agent configuration
      summary: Delete an LLM catalog model
      tags:
      - Admin LLM
    get:
      operationId: adminGetLlmModel
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmModel"
          description: OK
        "404":
          description: LLM model not found
      summary: Get an LLM catalog model
      tags:
      - Admin LLM
    patch:
      operationId: adminUpdateLlmModel
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLlmModelRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmModel"
          description: OK
        "404":
          description: LLM model not found
        "409":
          description: Another model on the connection already uses this upstream
            model id
      summary: Update a model's metadata
      tags:
      - Admin LLM
  /admin/llm/models/{id}/price:
    put:
      operationId: adminUpdateLlmModelPrice
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLlmModelPriceRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmModel"
          description: OK
        "404":
          description: LLM model not found
      summary: Reprice a model
      tags:
      - Admin LLM
  /admin/llm/models/{id}/sharing:
    put:
      operationId: adminUpdateLlmModelSharing
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLlmModelSharingRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmModel"
          description: OK
        "404":
          description: LLM model not found
      summary: Share a model with all or selected workspaces
      tags:
      - Admin LLM
  /admin/llm/settings:
    get:
      operationId: adminGetLlmSettings
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstanceLlmSettings"
          description: OK
      summary: Get instance-wide LLM governance settings
      tags:
      - Admin LLM
    put:
      operationId: adminUpdateLlmSettings
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInstanceLlmSettingsRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstanceLlmSettings"
          description: OK
      summary: Update instance-wide LLM governance settings
      tags:
      - Admin LLM
  /admin/login-providers:
    get:
      operationId: adminListLoginProviders
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LoginProviderView"
          description: OK
      summary: List login providers
      tags:
      - Admin
    post:
      operationId: adminCreateLoginProvider
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLoginProviderRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginProviderView"
          description: Login provider created; URL in the Location header
      summary: Create a login provider
      tags:
      - Admin
  /admin/login-providers/{registrationId}:
    delete:
      operationId: adminDeleteLoginProvider
      parameters:
      - in: path
        name: registrationId
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
      summary: Delete a login provider
      tags:
      - Admin
    patch:
      operationId: adminUpdateLoginProvider
      parameters:
      - in: path
        name: registrationId
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLoginProviderRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginProviderView"
          description: OK
      summary: Update a login provider
      tags:
      - Admin
  /admin/users:
    get:
      operationId: adminListUsers
      parameters:
      - in: query
        name: page
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - in: query
        name: size
        required: false
        schema:
          type: integer
          format: int32
          default: 50
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminAccountView"
          description: OK
      summary: List accounts (paged)
      tags:
      - Admin
  /admin/users/{id}:
    patch:
      operationId: adminUpdateUser
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAccountView"
          description: OK
      summary: Update an account's app role
      tags:
      - Admin
  /admin/users/{id}/sessions:
    delete:
      operationId: adminRevokeUserSessions
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevokeSessionsResult"
          description: OK
      summary: "Force sign-out: revoke all of an account's active sessions"
      tags:
      - Admin
  /admin/workspaces:
    get:
      operationId: adminListWorkspaces
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminWorkspaceView"
          description: OK
      summary: List all workspaces (metadata only)
      tags:
      - Admin
  /admin/workspaces/{workspaceId}/llm-budget:
    put:
      operationId: adminUpdateWorkspaceLlmBudget
      parameters:
      - in: path
        name: workspaceId
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceLlmBudgetRequest"
        required: true
      responses:
        "200":
          description: OK
      summary: Set or clear a workspace's monthly LLM budget cap
      tags:
      - Admin
  /auth/impersonate:
    post:
      operationId: impersonate
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImpersonateRequest"
        required: true
      responses:
        "200":
          description: OK
      summary: Begin impersonating another account
      tags:
      - Auth
  /auth/impersonate:exit:
    post:
      operationId: exitImpersonation
      responses:
        "200":
          description: OK
      summary: "Exit impersonation, restore operator session"
      tags:
      - Auth
  /auth/logout:
    post:
      operationId: logout
      responses:
        "200":
          description: OK
      summary: Log out — revoke the current token + clear the cookie
      tags:
      - Auth
  /auth/refresh:
    post:
      operationId: refresh
      responses:
        "200":
          description: OK
      summary: "Rotate the access token (new jti, old revoked)"
      tags:
      - Auth
  /contributors:
    get:
      description: Returns contributors to the Hephaestus project (for the About page)
      operationId: listGlobalContributors
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contributor"
          description: list of contributors sorted by contribution count
      security: []
      summary: List global contributors
      tags:
      - Contributors
  /identity-providers:
    get:
      operationId: listIdentityProviders
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IdentityProviderView"
          description: OK
      summary: List available identity providers
      tags:
      - Auth discovery
  /oauth/callback/{kind}:
    get:
      operationId: callbackGet
      parameters:
      - in: path
        name: kind
        required: true
        schema:
          type: string
      - in: query
        name: state
        required: false
        schema:
          type: string
      - in: query
        name: error
        required: false
        schema:
          type: string
