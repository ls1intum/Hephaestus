    SyncJob:
      type: object
      description: One sync_job row — a single INITIAL/RECONCILIATION/BACKFILL pass
        for a connection
      properties:
        cancelRequested:
          type: boolean
          description: Whether a cooperative cancel was requested
        createdAt:
          type: string
          format: date-time
          description: When the job row was created
        errorSummary:
          type: string
          description: "Truncated error summary, set on FAILED"
        finishedAt:
          type: string
          format: date-time
          description: When the job finished (any terminal status)
        id:
          type: integer
          format: int64
          description: Job id
        itemsProcessed:
          type: integer
          format: int32
          description: "Coarse progress: items processed so far"
        itemsTotal:
          type: integer
          format: int32
          description: "Coarse progress: total items, if known"
        progress:
          type: object
          additionalProperties: {}
          description: "Per-phase progress detail, integration-specific shape"
        startedAt:
          type: string
          format: date-time
          description: When the job started running
        status:
          type: string
          description: Job status
          enum:
          - PENDING
          - RUNNING
          - SUCCEEDED
          - SUCCEEDED_WITH_WARNINGS
          - FAILED
          - CANCELLED
        trigger:
          type: string
          description: What initiated this job
          enum:
          - SCHEDULED
          - MANUAL
          - LIFECYCLE
          - SYSTEM
        triggeredByUserId:
          type: integer
          format: int64
          description: "Account id of the admin who triggered this job, if MANUAL"
        type:
          type: string
          description: What kind of pass this is
          enum:
          - INITIAL
          - RECONCILIATION
          - BACKFILL
      required:
      - cancelRequested
      - createdAt
      - id
      - status
      - trigger
      - type
    SyncResourceCount:
      type: object
      description: "One entity class mirrored within a resource (issues, pull requests,\
        \ comments, messages, …)"
      properties:
        count:
          type: integer
          format: int64
          description: Mirrored row count for this class
        key:
          type: string
          description: Stable machine token for this class
          enum:
          - issues
          - pullRequests
          - issueComments
          - reviews
          - reviewComments
          - commits
          - messages
          - documents
          example: pullRequests
        label:
          type: string
          description: Display name
          example: Pull requests
        lastSyncedAt:
          type: string
          format: date-time
          description: When this class was last synced. Null means the integration
            does not track a per-class watermark — not that the class has never synced.
      required:
      - count
      - key
      - label
    SyncResourceState:
      type: object
      description: One synced resource (repository / channel / collection) — unified
        read-model row
      properties:
        backfillCompletedThrough:
          type: string
          format: date-time
          description: Per-resource backfill horizon
        backfillPercent:
          type: integer
          format: int32
          description: Per-resource backfill percent
        counts:
          type: array
          description: "Per-entity-class breakdown behind itemCount. One entry per\
            \ class the integration actually mirrors — 6 for an SCM repository, 1\
            \ for a Slack channel or Outline collection. Never null; empty when the\
            \ resource has never synced."
          items:
            $ref: "#/components/schemas/SyncResourceCount"
        externalId:
          type: string
          description: Vendor-side identifier
        id:
          type: integer
          format: int64
          description: The integration's own row id
        itemCount:
          type: integer
          format: int64
          description: Headline mirrored item count — the rollup of `counts`
        lastError:
          type: string
          description: "Last sync error, if any"
        lastSyncedAt:
          type: string
          format: date-time
          description: Last successful sync timestamp across all entity classes
        name:
          type: string
          description: Display name
        state:
          type: string
          description: Integration-defined status string
        type:
          type: string
          description: Resource kind
          enum:
          - REPOSITORY
          - CHANNEL
          - COLLECTION
        upstreamCount:
          type: integer
          format: int64
          description: "Vendor-reported upstream count, if cheaply available"
      required:
      - counts
      - externalId
      - id
      - name
      - state
      - type
